blueprint:
  name: "SHA - Unified Room Heating"
  author: bubuplanet
  description: |
    🌡️ Smart Heating Advisor — Unified Room Heating Blueprint

    AI-driven smart heating for any room. Pre-heat timing is calculated
    dynamically from the current room temperature, the AI-calibrated
    heating rate, and the next schedule start time — so the room is
    always at the right temperature exactly when needed.

    ✨ Features
    - 🤖 AI-driven pre-heat: timing calculated from room temp + heating rate
    - 📅 Unlimited schedules — add as many HA Schedule helpers as you need
    - 🌡️ Per-schedule target temperature — encoded in the schedule name (e.g. "Morning Shower 26C")
    - 🔥 Fixed-temperature TRVs — for towel rails, floor heating, etc.
    - 🏖️ Vacation mode via calendar keyword
    - 🪟 Window & door detection with configurable reaction delays
    - ✋ Manual override with automatic resume via HA Timer
    - 🔔 Toggleable notifications for all key events

    📝 Schedule naming convention
    Name each Schedule helper with the target temperature at the end:
      ✅ "Morning Shower 26C"
      ✅ "Evening Bath 28C"
      ✅ "Night Standby 16C"
      ✅ "Weekend 20C"
    The blueprint reads the temperature automatically from the name.

    🛠️ Required helpers (auto-created by SHA integration if installed)
    - Heating Rate Number:  input_number.ROOM_heating_rate
    - Automation Guard:     input_boolean.ROOM_automation_running
    - Override Timer:       timer.ROOM_override
    - Airing Mode Toggle:   input_boolean.ROOM_airing_mode (only if using window sensors)

  source_url: https://github.com/bubuplanet/smart-heating-advisor/blob/master/blueprints/automation/smart_heating_advisor/sha_unified_heating.yaml
  domain: automation

  input:

    # ─────────────────────────────────────────────
    # ROOM & DEVICES
    # ─────────────────────────────────────────────
    room_section:
      name: "🏠 Room & Devices"
      icon: mdi:radiator
      input:

        room_name:
          name: Room Name
          description: Used in notifications (e.g. Bathroom, Office, Bedroom)
          default: Room
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          description: The sensor measuring actual room temperature
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        heating_rate_helper:
          name: Heating Rate Helper
          description: |
            input_number updated daily by the Smart Heating Advisor AI.
            Entity ID: input_number.ROOM_heating_rate
            Range: 0.05–0.30 °C/min — Initial: 0.15
            The AI calibrates this automatically based on your room history.
          selector:
            entity:
              filter:
                - domain: input_number

        schedule_trvs:
          name: Schedule TRVs
          description: >
            TRVs that follow the schedule target temperature.
            These are set to each schedule's target temp during active periods
            and to the default temperature (or off) outside schedules.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trvs:
          name: Fixed-Temperature TRVs (optional)
          description: >
            TRVs that always heat to a fixed temperature regardless of schedule
            (e.g. towel rail, floor heating). Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trv_temperature:
          name: Fixed TRV Temperature
          description: >
            Temperature applied to fixed TRVs when heating is active.
            Has no effect if no fixed TRVs are selected above.
          default: 30
          selector:
            number:
              min: 15
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # SCHEDULES
    # ─────────────────────────────────────────────
    schedule_section:
      name: "📅 Schedules"
      icon: mdi:clock-outline
      input:

        schedules:
          name: Schedule Helpers
          description: |
            Select one or more HA Schedule helpers.
            Name each helper with the target temperature at the end:
              ✅ "Morning Shower 26C"
              ✅ "Evening Bath 28C"
              ✅ "Weekend 20C"
            The blueprint reads the target temperature automatically from the name.
            Create Schedule helpers in: Settings → Helpers → Schedule
          selector:
            entity:
              filter:
                - domain: schedule
              multiple: true

    # ─────────────────────────────────────────────
    # DEFAULT (NO ACTIVE SCHEDULE)
    # ─────────────────────────────────────────────
    default_section:
      name: "🌡️ Default — No Active Schedule"
      icon: mdi:thermostat-auto
      collapsed: true
      input:

        default_hvac_mode:
          name: Default Heating Mode
          description: >
            What to do when no schedule is currently active.
            Off — disables heating completely outside schedule windows.
            Heat — maintains the default temperature at all times.
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating outside schedules)"
                  value: "off"
                - label: "Heat (maintain default temperature)"
                  value: heat

        default_temp:
          name: Default Temperature
          description: >
            Temperature to maintain when no schedule is active
            and Default Heating Mode is set to Heat.
          default: 16
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # WINDOW & DOOR DETECTION
    # ─────────────────────────────────────────────
    window_section:
      name: "🪟 Window & Door Detection"
      icon: mdi:door-open
      collapsed: true
      input:

        window_sensors:
          name: Window & Door Sensors
          description: >
            Optional. Select binary sensors for windows and doors.
            When any sensor is open for at least the reaction time below,
            heating is paused. Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: true

        window_airing_boolean:
          name: Airing Mode Toggle Helper
          description: |
            Required when using window sensors.
            Entity ID: input_boolean.ROOM_airing_mode
            Auto-created by SHA integration if installed.
            Tracks whether airing mode is currently active.
          default:
          selector:
            entity:
              filter:
                - domain: input_boolean

        window_open_reaction_time:
          name: Open Reaction Time
          description: >
            How long a window must stay open before heating is paused.
            Set to 0 seconds to pause immediately.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

        window_close_reaction_time:
          name: Close Reaction Time
          description: >
            How long after all windows close before heating resumes.
            Set to 0 seconds to resume immediately.
          default:
            hours: 0
            minutes: 0
            seconds: 30
          selector:
            duration:

        window_open_temperature:
          name: Window Open Temperature
          description: >
            Temperature to set TRVs to while a window is open.
            Set to 0 to turn TRVs fully off during airing.
            Use a low value like 5°C for frost protection instead of fully off.
          default: 0
          selector:
            number:
              min: 0
              max: 15
              step: 1
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # VACATION
    # ─────────────────────────────────────────────
    vacation_section:
      name: "🏖️ Vacation"
      icon: mdi:calendar-clock
      collapsed: true
      input:

        vacation_enabled:
          name: Enable Vacation Mode
          description: >
            When disabled, the calendar is never checked and heating
            follows the normal schedule at all times.
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          description: Calendar entity that contains your vacation events.
          default: calendar.home
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: >
            Event title must start with this keyword to trigger vacation mode.
            Case insensitive. Example: "Vacation Portugal" matches keyword "vacation".
          default: vacation
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          description: >
            Off — disables heating completely during vacation.
            Frost — keeps a low anti-freeze temperature.
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating)"
                  value: "off"
                - label: "Frost protection"
                  value: frost

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior is set to Frost protection.
          default: 12
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # MANUAL OVERRIDE
    # ─────────────────────────────────────────────
    override_section:
      name: "✋ Manual Override"
      icon: mdi:hand-back-right
      collapsed: true
      input:

        override_timer:
          name: Override Timer Helper
          description: |
            HA Timer helper used to pause automation after manual TRV changes.
            Entity ID: timer.ROOM_override
            Auto-created by SHA integration if installed.
          selector:
            entity:
              filter:
                - domain: timer

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change.
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        automation_guard_boolean:
          name: Automation Guard Boolean
          description: |
            Toggle helper set by the automation while it changes TRVs.
            Prevents the override from triggering on the automation's own changes.
            Entity ID: input_boolean.ROOM_automation_running
            Auto-created by SHA integration if installed.
          selector:
            entity:
              filter:
                - domain: input_boolean

    # ─────────────────────────────────────────────
    # NOTIFICATIONS
    # ─────────────────────────────────────────────
    notifications_section:
      name: "🔔 Notifications"
      icon: mdi:bell
      collapsed: true
      input:

        notify_preheat:
          name: Notify when pre-heat starts
          default: true
          selector:
            boolean:

        notify_target_reached:
          name: Notify when target temperature reached
          default: true
          selector:
            boolean:

        notify_standby:
          name: Notify when standby mode starts
          default: true
          selector:
            boolean:

        notify_window:
          name: Notify when window opens or closes
          default: true
          selector:
            boolean:

        notify_override:
          name: Notify when override is activated or resumed
          default: true
          selector:
            boolean:

# ─────────────────────────────────────────────────────────────────────
# VARIABLES
# ─────────────────────────────────────────────────────────────────────
variables:
  room_name: !input room_name
  temperature_sensor: !input temperature_sensor
  heating_rate_helper: !input heating_rate_helper
  schedule_trvs: !input schedule_trvs
  fixed_trvs: !input fixed_trvs
  fixed_trv_temperature: !input fixed_trv_temperature
  schedules: !input schedules
  default_hvac_mode: !input default_hvac_mode
  default_temp: !input default_temp
  window_sensors: !input window_sensors
  window_airing_boolean: !input window_airing_boolean
  window_open_temp: !input window_open_temperature
  override_timer: !input override_timer
  override_minutes: !input override_minutes
  automation_guard_boolean: !input automation_guard_boolean
  vacation_enabled: !input vacation_enabled
  vacation_calendar: !input vacation_calendar
  vacation_keyword: !input vacation_keyword
  vacation_mode: !input vacation_mode
  vacation_temperature: !input vacation_temperature
  notify_preheat: !input notify_preheat
  notify_target_reached: !input notify_target_reached
  notify_standby: !input notify_standby
  notify_window: !input notify_window
  notify_override: !input notify_override

  # Current room temperature
  room_temp: "{{ states(temperature_sensor) | float(18) }}"

  # AI-calibrated heating rate
  heating_rate: "{{ states(heating_rate_helper) | float(0.15) }}"

  # Override active?
  override_active: "{{ is_state(override_timer, 'active') }}"

  # Airing mode active?
  windows_open: >
    {% if window_airing_boolean %}
      {{ is_state(window_airing_boolean, 'on') }}
    {% else %}
      false
    {% endif %}

  # Vacation active?
  vacation_active: >
    {% if not vacation_enabled %}
      false
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | default('') | string %}
      {{ is_state(vacation_calendar, 'on') and
         message | lower | regex_search('^' ~ vacation_keyword | lower) }}
    {% endif %}

  # ── Active schedule: find which schedule is currently ON
  # Returns dict {active: bool, temp: float, name: str} or {active: false}
  active_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='') %}
    {% for s in schedules %}
      {% if not ns.found and is_state(s, 'on') %}
        {% set fname = state_attr(s, 'friendly_name') | default('') %}
        {% set match = fname | regex_search('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
        {% if match %}
          {% set ns.found = true %}
          {% set ns.temp = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) | first | float %}
          {% set ns.name = fname %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name} }}

  in_comfort: "{{ active_schedule.active }}"
  comfort_temp: "{{ active_schedule.temp | float(0) }}"

  # ── Pre-heat: find which schedule will start soon and needs pre-heating now
  # Uses AI heating rate to calculate exactly when to start
  preheat_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='', mins_needed=0) %}
    {% if not in_comfort %}
      {% for s in schedules %}
        {% if not ns.found and is_state(s, 'off') %}
          {% set fname = state_attr(s, 'friendly_name') | default('') %}
          {% set nev = state_attr(s, 'next_event') %}
          {% set match = fname | regex_search('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
          {% if match and nev %}
            {% set target_temp = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) | first | float %}
            {% set mins_needed = [((target_temp - room_temp) / heating_rate) | int(10), 5] | max %}
            {% set mins_to_start = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
            {% if 0 <= mins_to_start <= mins_needed %}
              {% set ns.found = true %}
              {% set ns.temp = target_temp %}
              {% set ns.name = fname %}
              {% set ns.mins_needed = mins_needed %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name, 'mins_needed': ns.mins_needed} }}

  in_preheat: "{{ preheat_schedule.active }}"
  preheat_temp: "{{ preheat_schedule.temp | float(0) }}"

  # ── Final target temperature and HVAC mode
  target_temperature: >
    {% if windows_open and window_open_temp | float > 0 %}
      {{ window_open_temp | float }}
    {% elif vacation_active and vacation_mode == 'frost' %}
      {{ vacation_temperature | float }}
    {% elif in_comfort %}
      {{ comfort_temp }}
    {% elif in_preheat %}
      {{ preheat_temp }}
    {% else %}
      {{ default_temp | float }}
    {% endif %}

  target_mode: >
    {% if windows_open and window_open_temp | float == 0 %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% elif not in_comfort and not in_preheat and default_hvac_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

  # ── Target reached? (for notification — only fire once per schedule)
  target_reached: >
    {{ in_comfort and room_temp >= (comfort_temp - 0.3) }}

# ─────────────────────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────────────────────
triggers:
  # Main control loop — every 5 minutes
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  # Immediate response when any schedule changes state
  - trigger: state
    entity_id: !input schedules
    id: schedule_changed

  # Window opened long enough
  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  # All windows closed long enough
  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    for: !input window_close_reaction_time
    id: window_airing_end

  # Vacation calendar changed
  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed

  # Manual TRV temperature change
  - trigger: state
    entity_id: !input schedule_trvs
    attribute: temperature
    id: manual_override

  # Manual TRV mode change
  - trigger: state
    entity_id: !input schedule_trvs
    attribute: hvac_mode
    id: manual_override

  # Override timer expired
  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input override_timer
    id: override_ended

conditions: []

# ─────────────────────────────────────────────────────────────────────
# ACTIONS
# ─────────────────────────────────────────────────────────────────────
action:
  - choose:

      # ── Window opened: activate airing mode ──────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ window_airing_boolean not in ['', none] }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ window_airing_boolean }}"
              - if:
                  - condition: template
                    value_template: "{{ notify_window }}"
                then:
                  - action: notify.notify
                    data:
                      title: "🪟 {{ room_name }} — Window Open"
                      message: >
                        Heating paused — window open.
                        Room: {{ room_temp | round(1) }}°C.

      # ── All windows closed: deactivate airing mode ───────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ window_airing_boolean not in ['', none] and
                     expand(window_sensors)
                     | selectattr('state', 'in', ['on', 'open'])
                     | list | count == 0 }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ window_airing_boolean }}"
              - if:
                  - condition: template
                    value_template: "{{ notify_window }}"
                then:
                  - action: notify.notify
                    data:
                      title: "🪟 {{ room_name }} — Window Closed"
                      message: >
                        All windows closed. Heating resumed.
                        Room: {{ room_temp | round(1) }}°C.

      # ── Manual TRV change: start override timer ──────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ is_state(automation_guard_boolean, 'off') and
                     not windows_open }}
            then:
              - action: timer.start
                target:
                  entity_id: !input override_timer
                data:
                  duration: >
                    {% set m = override_minutes | int(120) %}
                    {{ '%02d:%02d:00' | format((m // 60), (m % 60)) }}
              - if:
                  - condition: template
                    value_template: "{{ notify_override }}"
                then:
                  - action: notify.notify
                    data:
                      title: "✋ {{ room_name }} — Override Active"
                      message: >
                        Manual change detected on {{ trigger.to_state.attributes.friendly_name }}.
                        Smart heating paused for {{ override_minutes }} min until
                        {{ (now() + timedelta(minutes=override_minutes | int)).strftime('%H:%M') }}.

      # ── Override active: skip control loop ───────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ override_active and
                 trigger.id not in ['override_ended', 'manual_override'] }}
        sequence:
          - stop: "Override active — skipping control loop."

    # ── DEFAULT: main heating control ──────────────────────────────
    default:
      # Set automation guard ON — prevents override false trigger
      - action: input_boolean.turn_on
        target:
          entity_id: !input automation_guard_boolean

      # ── Control schedule TRVs ──────────────────────────────────
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: "off"

          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input schedule_trvs
                data:
                  temperature: "{{ target_temperature | float }}"

      # ── Control fixed TRVs ─────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ fixed_trvs | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: "off"
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      temperature: "{{ fixed_trv_temperature | float }}"

      # Set automation guard OFF
      - action: input_boolean.turn_off
        target:
          entity_id: !input automation_guard_boolean

      # ── Notifications ──────────────────────────────────────────

      # Pre-heat started
      - if:
          - condition: template
            value_template: "{{ notify_preheat and in_preheat }}"
        then:
          - action: notify.notify
            data:
              title: "🌅 {{ room_name }} — Pre-heat Started"
              message: >
                Pre-heating for "{{ preheat_schedule.name }}".
                Room: {{ room_temp | round(1) }}°C → target {{ preheat_temp }}°C.
                Est. {{ preheat_schedule.mins_needed }} min to reach target.

      # Target reached
      - if:
          - condition: template
            value_template: "{{ notify_target_reached and target_reached }}"
        then:
          - action: notify.notify
            data:
              title: "✅ {{ room_name }} — Target Reached"
              message: >
                {{ room_name }} reached {{ room_temp | round(1) }}°C
                for "{{ active_schedule.name }}" at {{ now().strftime('%H:%M') }}.

      # Standby mode started (no schedule active, heating off)
      - if:
          - condition: template
            value_template: >
              {{ notify_standby and
                 not in_comfort and
                 not in_preheat and
                 not vacation_active and
                 not windows_open }}
        then:
          - action: notify.notify
            data:
              title: "🌡️ {{ room_name }} — Standby"
              message: >
                No active schedule. 
                {% if default_hvac_mode == 'heat' %}
                  Maintaining {{ default_temp }}°C standby.
                {% else %}
                  Heating off.
                {% endif %}
                Room: {{ room_temp | round(1) }}°C.

      # Override ended
      - if:
          - condition: template
            value_template: "{{ notify_override and trigger.id == 'override_ended' }}"
        then:
          - action: notify.notify
            data:
              title: "🔄 {{ room_name }} — Heating Resumed"
              message: >
                Manual override ended. Smart heating resumed.
                Room: {{ room_temp | round(1) }}°C.

      # Vacation active
      - if:
          - condition: template
            value_template: "{{ vacation_active }}"
        then:
          - action: notify.notify
            data:
              title: "🏖️ {{ room_name }} — Vacation Mode"
              message: >
                Vacation mode active.
                {% if vacation_mode == 'frost' %}
                  Maintaining frost protection at {{ vacation_temperature }}°C.
                {% else %}
                  Heating off.
                {% endif %}

mode: queued
max: 10
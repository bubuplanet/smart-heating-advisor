blueprint:
  name: "Smart Heating Advisor"
  author: bubuplanet
  description: |
    **version: 0.0.16**

    🌡️ Smart Heating Advisor — Unified Room Heating Blueprint

    This blueprint requires the Smart Heating Advisor (SHA) HACS integration.
    It provides AI-powered heating rate calibration based on your room's
    historical data and outside weather conditions — delivering a self-improving
    smart heating system that gets more accurate over time.

    ✨ Features
    - ⏱️ Smart pre-heat: timing calculated from room temp + heating rate
    - 📅 Unlimited schedules — add as many HA Schedule helpers as you need
    - 🌡️ Per-schedule target temperature — encoded in the schedule name (e.g. "Morning Shower 26C")
    - 🔥 Optional fixed-temperature radiator thermostat (towel rails, floor heating, etc.)
    - 🏖️ Vacation mode via calendar keyword
    - 🪟 Window & door detection with configurable reaction delays
    - ✋ Manual override with automatic resume
    - 🔔 Toggleable notifications — each fires only once per event
    - 🤖 AI heating rate calibration — auto-adjusted daily by SHA

    📝 Schedule naming convention
    Name each Schedule helper with the target temperature at the end:
      ✅ "Morning Shower 26C"
      ✅ "Evening Bath 28C"
      ✅ "Night Standby 16C"
      ✅ "Weekend 20C"
    The blueprint reads the temperature automatically from the name.
    If no temperature is found in the name, the configured fallback temperature is used.

    🛠️ Setup
    Install SHA via HACS, then complete the setup wizard:
    1. Connect Ollama and InfluxDB
    2. Select your rooms from HA Areas
    3. SHA creates helper entities and automations automatically
    4. Open each room's automation and add your Schedule helpers
    5. Enable the automation

    Required entities (auto-created by SHA):
    - number.sha_ROOM_heating_rate
    - number.sha_ROOM_trv_setpoint
    - switch.sha_ROOM_airing_mode
    - switch.sha_ROOM_override

  source_url: https://raw.githubusercontent.com/bubuplanet/smart-heating-advisor/main/blueprints/automation/smart_heating_advisor/smart_heating_advisor.yaml
  domain: automation

  input:

    room_section:
      name: "🏠 Room — Mandatory"
      icon: mdi:radiator
      collapsed: true
      description: Required. Room name, temperature sensor, and TRV thermostats.
      input:

        room_name:
          name: Room Name
          description: |
            Friendly name of the room — used in notifications and to
            derive the SHA helper entity IDs automatically.
            Use the exact same name you configured in the SHA integration.
            Examples: Bathroom, Alessio's Bedroom, Living Room, Office
          default: Bathroom
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          description: The sensor measuring actual room temperature.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        radiator_thermostats:
          name: Radiator Thermostat
          description: >
            Main room radiators that follow the schedule target temperature.
            These are commanded to the schedule comfort temperature (e.g. 26°C)
            during pre-heat and comfort phases.
            Do NOT add towel rails or fixed-temperature devices here —
            use the Fixed Radiator Thermostats input for those.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_thermostats:
          name: Fixed Radiator Thermostat (optional)
          description: >
            Optional. Devices that always heat to a fixed temperature when heating
            is active — typically heated towel rails.
            These are NOT controlled by the schedule temperature.
            Set their target temperature using the Fixed Radiator Temperature input
            below. Leave empty if you have no fixed-temperature devices.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_temperature:
          name: Fixed Radiator Temperature (optional)
          description: >
            Target temperature for fixed radiator thermostats such as heated towel
            rails. This value is used during pre-heat, comfort and window-close
            resume phases. Ignored if Fixed Radiator Thermostats is empty.
            Typical value: 30–35°C.
          default: 30
          selector:
            number:
              min: 15
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedule_section:
      name: "📅 Schedules — Mandatory"
      icon: mdi:clock-outline
      collapsed: true
      description: Required. Schedule helpers, fallback temperature, and notification templates.
      input:

        schedules:
          name: Schedule Helpers
          description: |
            Select one or more HA Schedule helpers.
            Name each helper with the target temperature at the end:
              ✅ "Morning Shower 26C"
              ✅ "Evening Bath 28C"
              ✅ "Weekend 20C"
            Create Schedule helpers in: Settings → Helpers → Schedule
          selector:
            entity:
              filter:
                - domain: schedule
              multiple: true

        schedule_fallback_temp:
          name: Schedule Fallback Temperature
          description: >
            Temperature used when no temperature is found in the schedule name.
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    default_section:
      name: "🌡️ Default — No Active Schedule"
      icon: mdi:thermostat-auto
      collapsed: true
      description: Heating behaviour when no schedule is active.
      input:

        default_hvac_mode:
          name: Default Heating Mode
          description: >
            Off — disables heating outside schedules.
            Heat — maintains the default temperature at all times.
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating outside schedules)"
                  value: "off"
                - label: "Heat (maintain default temperature)"
                  value: heat

        default_temp:
          name: Default Temperature
          description: >
            Temperature to maintain when no schedule is active
            and Default Heating Mode is set to Heat.
          default: 16
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    window_section:
      name: "🪟 Window & Door Detection"
      icon: mdi:door-open
      collapsed: true
      description: Optional. Pause heating when windows or doors are open.
      input:

        window_sensors:
          name: Window & Door Sensors
          description: >
            Optional. Select binary sensors for windows and doors.
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: true

        window_open_reaction_time:
          name: Open Reaction Time
          description: How long a window must stay open before heating is paused.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

    vacation_section:
      name: "🏖️ Vacation"
      icon: mdi:calendar-clock
      collapsed: true
      description: Optional. Automatically reduce heating during calendar vacation events.
      input:

        vacation_enabled:
          name: Enable Vacation Mode
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          description: Leave empty if vacation mode is disabled.
          default: ""
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title must start with this keyword. Case insensitive.
          default: vacation
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating)"
                  value: "off"
                - label: "Frost protection"
                  value: frost

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior is set to Frost protection.
          default: 12
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    override_section:
      name: "✋ Manual Override"
      icon: mdi:hand-back-right
      collapsed: true
      description: Pause automation temporarily when the TRV is adjusted manually.
      input:

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change.
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min


variables:
  room_name:                  !input room_name
  temperature_sensor:         !input temperature_sensor
  radiator_thermostats:       !input radiator_thermostats
  fixed_radiator_thermostats: !input fixed_radiator_thermostats
  fixed_radiator_temperature: !input fixed_radiator_temperature
  schedules:                  !input schedules
  schedule_fallback_temp:     !input schedule_fallback_temp
  default_hvac_mode:          !input default_hvac_mode
  default_temp:               !input default_temp
  window_sensors:             !input window_sensors
  vacation_enabled:           !input vacation_enabled
  vacation_calendar:          !input vacation_calendar
  vacation_keyword:           !input vacation_keyword
  vacation_mode:              !input vacation_mode
  vacation_temperature:       !input vacation_temperature
  override_minutes:           !input override_minutes
  room_id: >
    {{ room_name | lower
                 | replace("'", '')
                 | regex_replace('[\s\-]+', '_')
                 | regex_replace('[^a-z0-9_]', '') }}

  sha_heating_rate:    "number.sha_{{ room_id }}_heating_rate"
  sha_override_switch: "switch.sha_{{ room_id }}_override"

  room_temp:    "{{ states(temperature_sensor) | float(18) }}"
  heating_rate: "{{ states(sha_heating_rate) | float(0.15) }}"

  override_active: "{{ is_state(sha_override_switch, 'on') }}"
  windows_open:    "{{ is_state('switch.sha_' ~ room_id ~ '_airing_mode', 'on') }}"

  vacation_active: >
    {% if not vacation_enabled or not vacation_calendar %}
      false
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | default('') | string %}
      {{ is_state(vacation_calendar, 'on') and
         message | lower | regex_search('^' ~ vacation_keyword | lower) }}
    {% endif %}

  active_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='') %}
    {% for s in schedules %}
      {% if not ns.found and is_state(s, 'on') %}
        {% set fname = state_attr(s, 'friendly_name') | default('') %}
        {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
        {% set ns.found = true %}
        {% set ns.temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
        {% set ns.name = fname %}
      {% endif %}
    {% endfor %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name} | tojson }}

  in_comfort:          "{{ (active_schedule | from_json).active }}"
  comfort_temp:        "{{ (active_schedule | from_json).temp | float(0) }}"
  active_schedule_name: "{{ (active_schedule | from_json).name | default('') }}"

  sha_trv_setpoint: >
    {{ states('number.sha_' ~ room_id ~ '_trv_setpoint')
       | float(comfort_temp) }}

  preheat_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='', mins_needed=0) %}
    {% if not (in_comfort | bool(false)) %}
      {% for s in schedules %}
        {% if not ns.found and is_state(s, 'off') %}
          {% set fname = state_attr(s, 'friendly_name') | default('') %}
          {% set nev = state_attr(s, 'next_event') %}
          {% if nev %}
            {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
            {% set target_temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
            {% set temp_delta = target_temp - room_temp %}
            {% set mins_needed = [(temp_delta / heating_rate) | int(10), 5] | max %}
            {% set mins_to_start = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
            {% if temp_delta > 0.5 and 0 <= mins_to_start <= mins_needed %}
              {% set ns.found = true %}
              {% set ns.temp = target_temp %}
              {% set ns.name = fname %}
              {% set ns.mins_needed = mins_needed %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name, 'mins_needed': ns.mins_needed} | tojson }}

  in_preheat:           "{{ (preheat_schedule | from_json).active }}"
  preheat_temp:         "{{ (preheat_schedule | from_json).temp | float(0) }}"
  preheat_schedule_name: "{{ (preheat_schedule | from_json).name | default('') }}"
  preheat_schedule_mins: "{{ (preheat_schedule | from_json).mins_needed | int(10) }}"
  in_comfort_bool:      "{{ in_comfort | bool(false) }}"
  in_preheat_bool:      "{{ in_preheat | bool(false) }}"
  windows_open_bool:    "{{ windows_open | bool(false) }}"
  override_active_bool: "{{ override_active | bool(false) }}"
  vacation_active_bool: "{{ vacation_active | bool(false) }}"

  target_temperature: >
    {% if vacation_active_bool and vacation_mode == 'frost' %}
      {{ [vacation_temperature | float, 4.0] | max }}
    {% elif in_comfort_bool %}
      {{ [comfort_temp | float, 4.0] | max }}
    {% elif in_preheat_bool %}
      {{ [preheat_temp | float, 4.0] | max }}
    {% else %}
      {{ [default_temp | float, 4.0] | max }}
    {% endif %}

  target_mode: >
    {% if windows_open_bool %}
      off
    {% elif vacation_active_bool and vacation_mode == 'off' %}
      off
    {% elif not in_comfort_bool and not in_preheat_bool and default_hvac_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

  target_reached: "{{ in_comfort_bool and room_temp >= (comfort_temp - 0.3) }}"

  main_trv_setpoint: >
    {% if vacation_active_bool and vacation_mode == 'frost' %}
      {{ [vacation_temperature | float, 4.0] | max }}
    {% elif in_comfort_bool or in_preheat_bool %}
      {{ [sha_trv_setpoint | float, 4.0] | max }}
    {% else %}
      {{ [default_temp | float, 4.0] | max }}
    {% endif %}

triggers:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: state
    entity_id: !input schedules
    id: schedule_changed

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    id: window_airing_end

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: sha_override_ended
    id: override_ended

conditions: []

action:

  - choose:

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'override_ended' and
                 trigger.event.data.get('room_id') != room_id }}
        sequence:
          - stop: "Override ended for a different room — ignoring."

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] WINDOW OPEN — HEATING SUSPENDED
                Open sensor(s): {{ expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='name') | list | join(', ') }}
                Room: {{ room_temp | round(1) }}°C
                TRVs commanded off.
                Heating will resume automatically when all windows close.
              level: info
              logger: custom_components.smart_heating_advisor
          - action: switch.turn_on
            target:
              entity_id: "switch.sha_{{ room_id }}_airing_mode"
          - action: climate.set_hvac_mode
            target:
              entity_id: !input radiator_thermostats
            data:
              hvac_mode: "off"
          - if:
              - condition: template
                value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
            then:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ fixed_radiator_thermostats }}"
                data:
                  hvac_mode: "off"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ expand(window_sensors)
                     | selectattr('state', 'in', ['on', 'open'])
                     | list | count == 0 }}
            then:
              - action: switch.turn_off
                target:
                  entity_id: "switch.sha_{{ room_id }}_airing_mode"
              - action: system_log.write
                data:
                  message: |
                    SHA [{{ room_name }}] WINDOW CLOSED — HEATING RESUMED
                    Room: {{ room_temp | round(1) }}°C
                    Resume mode: {{ 'PRE-HEAT' if in_preheat_bool else ('SCHEDULE' if in_comfort_bool else 'STANDBY') }}
                    Resume target: {{ target_temperature | round(1) }}°C
                    {{ 'In comfort phase: ' ~ active_schedule_name if in_comfort_bool else ('In pre-heat for: ' ~ preheat_schedule_name if in_preheat_bool else 'Returning to standby.') }}
                  level: info
                  logger: custom_components.smart_heating_advisor
              - if:
                  - condition: template
                    value_template: "{{ not override_active_bool }}"
                then:
                  - variables:
                      resume_target_mode: >
                        {% if vacation_active_bool and vacation_mode == 'off' %}
                          off
                        {% elif in_comfort_bool or in_preheat_bool or (vacation_active_bool and vacation_mode == 'frost') %}
                          heat
                        {% elif default_hvac_mode == 'heat' %}
                          heat
                        {% else %}
                          off
                        {% endif %}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ resume_target_mode == 'off' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              hvac_mode: "off"
                      - conditions:
                          - condition: template
                            value_template: "{{ resume_target_mode == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              temperature: "{{ main_trv_setpoint | float }}"
                          - if:
                              - condition: template
                                value_template: >
                                  {{ fixed_radiator_thermostats | list | count > 0 }}
                            then:
                              - action: system_log.write
                                data:
                                  message: |
                                    SHA [{{ room_name }}] Fixed TRV — commanding heat on window close resume
                                    Target: {{ fixed_radiator_temperature | float(30) }}°C
                                    Entities: {{ fixed_radiator_thermostats }}
                                  level: info
                                  logger: custom_components.smart_heating_advisor
                              - action: climate.set_hvac_mode
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  hvac_mode: heat
                              - action: climate.set_temperature
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  temperature: "{{ fixed_radiator_temperature | float(30) }}"
                  - if:
                      - condition: template
                        value_template: "{{ fixed_radiator_thermostats | list | count > 0 and resume_target_mode == 'off' }}"
                    then:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: "{{ fixed_radiator_thermostats }}"
                        data:
                          hvac_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'schedule_changed' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'on' }}"
                sequence:
                  - variables:
                      slot_end_time: >
                        {% set nev = state_attr(trigger.entity_id, 'next_event') %}
                        {% if nev %}
                          {{ (as_datetime(nev) | as_local).strftime('%H:%M') }}
                        {% else %}
                          unknown
                        {% endif %}
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'off' }}"
                sequence: []
          - if:
              - condition: template
                value_template: "{{ not override_active_bool }}"
            then:
              - variables:
                  schedule_trigger_mode: >
                    {% set new_state = trigger.to_state.state %}
                    {% if windows_open_bool %}
                      off
                    {% elif vacation_active_bool and vacation_mode == 'off' %}
                      off
                    {% elif new_state == 'on' %}
                      heat
                    {% elif in_comfort_bool %}
                      heat
                    {% elif default_hvac_mode == 'heat' %}
                      heat
                    {% else %}
                      off
                    {% endif %}
                  schedule_trigger_temp: >
                    {% if trigger.to_state.state == 'on' %}
                      {% set fname = state_attr(trigger.entity_id, 'friendly_name') | default('') %}
                      {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
                      {{ temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float }}
                    {% else %}
                      {{ default_temp | float }}
                    {% endif %}
              - if:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'on' }}"
                then:
                  - action: system_log.write
                    data:
                      message: |
                        SHA [{{ room_name }}] {{ 'SCHEDULE STARTED' if trigger.to_state.state == 'on' else 'SCHEDULE ENDED' }}
                        Schedule: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }}"
                        Room: {{ room_temp | round(1) }}°C
                        {{ 'Comfort target: ' ~ schedule_trigger_temp ~ '°C — TRV setpoint: ' ~ (sha_trv_setpoint | round(1) | string) ~ '°C (SHA learned) (mode: ' ~ schedule_trigger_mode ~ ').' if trigger.to_state.state == 'on' else 'Returning to ' ~ default_hvac_mode ~ ' at ' ~ default_temp ~ '°C.' }}
                      level: info
                      logger: custom_components.smart_heating_advisor
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ schedule_trigger_mode == 'off' }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          hvac_mode: "off"
                  - conditions:
                      - condition: template
                        value_template: "{{ schedule_trigger_mode == 'heat' }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          temperature: "{{ sha_trv_setpoint | float }}"
              - if:
                  - condition: template
                    value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
                then:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ schedule_trigger_mode == 'off' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              hvac_mode: "off"
                      - conditions:
                          - condition: template
                            value_template: "{{ schedule_trigger_mode == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              temperature: "{{ fixed_radiator_temperature | float(30) }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ not windows_open_bool and
                     not override_active_bool and
                     is_state(sha_override_switch, 'off') and
                     trigger.to_state is not none and
                     trigger.to_state.context.parent_id is none and
                     trigger.from_state is not none and (
                       (trigger.attribute == 'temperature' and
                        (trigger.to_state.attributes.temperature | float(-1)) != (target_temperature | float(0))) or
                       (trigger.attribute == 'hvac_mode' and
                        trigger.to_state.attributes.hvac_mode != target_mode)
                     ) }}
            then:
              - action: system_log.write
                data:
                  message: |
                    SHA [{{ room_name }}] MANUAL OVERRIDE ACTIVATED
                    Changed by user on: {{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }}
                    Duration: {{ override_minutes }} min
                    Auto-resume at: {{ (now() + timedelta(minutes=override_minutes | int)).strftime('%H:%M') }}
                    Room: {{ room_temp | round(1) }}°C
                    SHA heating suspended for {{ override_minutes }} min.
                  level: info
                  logger: custom_components.smart_heating_advisor
              - action: smart_heating_advisor.start_override
                data:
                  room_name: "{{ room_name }}"
                  duration_minutes: "{{ override_minutes | int(120) }}"

      - conditions:
          - condition: template
            value_template: >
              {{ override_active_bool and
                 trigger.id not in ['override_ended', 'manual_override',
                                    'window_airing_start', 'window_airing_end',
                                    'schedule_changed'] }}
        sequence:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] Control loop skipped — override active.
                Room: {{ room_temp | round(1) }}°C
              level: debug
              logger: custom_components.smart_heating_advisor
          - stop: "Override active — skipping control loop."

    default:

      - action: system_log.write
        data:
          message: |
            {%- set _scheds = schedules | select('match', '.+') | list -%}
            {%- set _ns = namespace(slines=[]) -%}
            {%- for s in _scheds -%}
              {%- set _nev = state_attr(s, 'next_event') -%}
              {%- set _nev_str = (_nev | string)[:16] if _nev else '—' -%}
              {%- set _ns.slines = _ns.slines + ['  ' ~ s ~ ': ' ~ states(s) | upper ~ ' (next: ' ~ _nev_str ~ ')'] -%}
            {%- endfor -%}
            SHA [{{ room_name }}] ─── Control loop ──────────────────────────────────────
            Room: {{ room_temp | round(1) }}°C
            Mode: {{ target_mode | upper }}  Target: {{ target_temperature | round(1) }}°C
            Schedules ({{ _scheds | count }}):
            {{ _ns.slines | join('\n') }}
            Active now: {{ active_schedule_name if in_comfort_bool else ('Pre-heating for ' ~ preheat_schedule_name if in_preheat_bool else 'none') }}
            Pre-heat: {{ 'yes — ' ~ preheat_schedule_mins ~ ' min needed' if in_preheat_bool else 'no' }}
            Override: {{ 'yes' if override_active_bool else 'no' }}
            Windows: {{ 'open' if windows_open_bool else 'closed' }}
            Vacation: {{ 'yes' if vacation_active_bool else 'no' }}
            Heating rate: {{ heating_rate }}°C/min
            ──────────────────────────────────────────────────────────────────────────────
          level: debug
          logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: >
              {% if in_preheat_bool or in_comfort_bool %}
                {{ false }}
              {% else %}
                {% set ns = namespace(found=false) %}
                {% for s in schedules if s != '' and is_state(s, 'off') %}
                  {% set nev = state_attr(s, 'next_event') %}
                  {% if nev and not ns.found %}
                    {% set m = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
                    {% if 0 <= m <= 60 %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.found }}
              {% endif %}
        then:
          - action: system_log.write
            data:
              message: |
                {%- set ns = namespace(mins=9999, name='', temp=0.0) -%}
                {%- for s in schedules if s != '' and is_state(s, 'off') -%}
                  {%- set nev = state_attr(s, 'next_event') -%}
                  {%- if nev -%}
                    {%- set m = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) -%}
                    {%- if 0 <= m <= 60 and m < ns.mins -%}
                      {%- set fname = state_attr(s, 'friendly_name') | default('') -%}
                      {%- set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) -%}
                      {%- set ns.mins = m -%}
                      {%- set ns.name = fname -%}
                      {%- set ns.temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set gap = (ns.temp - room_temp) | round(1) -%}
                {%- set mins_needed = [(gap / heating_rate) | int(10), 5] | max if gap > 0.5 else 0 -%}
                SHA [{{ room_name }}] Pre-heat countdown — {{ ns.mins }} min to schedule start
                Schedule: "{{ ns.name }}"
                Target: {{ ns.temp }}°C  Room now: {{ room_temp | round(1) }}°C  Gap: {{ gap }}°C
                Heating rate: {{ heating_rate }}°C/min  Est. pre-heat needed: {{ mins_needed }} min
                Status: {{ 'no pre-heat needed (room warm enough)' if gap <= 0.5 else ('overdue — pre-heat was due at ' ~ (now() - timedelta(minutes=(mins_needed - ns.mins))).strftime('%H:%M') if ns.mins < mins_needed else 'Pre-heat will start at: ' ~ (now() + timedelta(minutes=(ns.mins - mins_needed))).strftime('%H:%M')) }}
              level: info
              logger: custom_components.smart_heating_advisor

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input radiator_thermostats
                data:
                  temperature: "{{ main_trv_setpoint | float }}"
              - if:
                  - condition: template
                    value_template: >
                      {{ fixed_radiator_thermostats | list | count > 0 }}
                then:
                  - action: system_log.write
                    data:
                      message: |
                        SHA [{{ room_name }}] Fixed TRV — commanding heat (control loop)
                        Phase: {{ 'comfort' if in_comfort_bool else ('pre-heat' if in_preheat_bool else 'default') }}
                        Target: {{ fixed_radiator_temperature | float(30) }}°C
                        Entities: {{ fixed_radiator_thermostats }}
                      level: info
                      logger: custom_components.smart_heating_advisor
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      temperature: "{{ fixed_radiator_temperature | float(30) }}"

      - if:
          - condition: template
            value_template: "{{ fixed_radiator_thermostats | list | count > 0 and target_mode == 'off' }}"
        then:
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ fixed_radiator_thermostats }}"
            data:
              hvac_mode: "off"

      - if:
          - condition: template
            value_template: "{{ in_preheat_bool and not windows_open_bool }}"
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] PRE-HEAT STARTED
                Schedule: "{{ preheat_schedule_name }}"
                Comfort target: {{ preheat_temp }}°C
                TRV setpoint: {{ sha_trv_setpoint | round(1) }}°C (SHA learned)
                Room now: {{ room_temp | round(1) }}°C
                Gap to close: {{ (preheat_temp - room_temp) | round(1) }}°C
                Heating rate: {{ heating_rate }}°C/min
                Estimated time needed: {{ preheat_schedule_mins }} min
                TRVs commanding: {{ radiator_thermostats }}
                Fixed TRVs: {{ fixed_radiator_thermostats if fixed_radiator_thermostats | list | count > 0 else 'none' }}
              level: info
              logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' }}"
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] OVERRIDE ENDED — RESUMING
                Room: {{ room_temp | round(1) }}°C
                Resuming: {{ 'comfort phase' if in_comfort_bool else ('pre-heat' if in_preheat_bool else 'standby') }}
                Target: {{ target_temperature | round(1) }}°C
                Mode: {{ target_mode | upper }}
              level: info
              logger: custom_components.smart_heating_advisor


mode: queued
max: 10
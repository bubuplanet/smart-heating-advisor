blueprint:
  name: "Smart Heating Advisor - Override Activated"
  description: >
    Detects any manual TRV change and pauses the smart heating
    automation for a configurable duration. Ignores changes made
    by the automation itself or when windows are open.
    Runs 24/7 all week.
  domain: automation
  input:
    radiator:
      name: Radiator Climate Entity
      selector:
        entity:
          domain: climate

    towel_rail:
      name: Towel Rail Climate Entity
      selector:
        entity:
          domain: climate

    window_sensor_1:
      name: Window Sensor 1
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class: window

    window_sensor_2:
      name: Window Sensor 2 (optional)
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class: window

    override_boolean:
      name: Override Boolean Helper
      selector:
        entity:
          domain: input_boolean

    override_datetime:
      name: Override DateTime Helper
      selector:
        entity:
          domain: input_datetime

    automation_running_boolean:
      name: Automation Running Boolean Helper
      selector:
        entity:
          domain: input_boolean

    override_duration:
      name: Override Duration (hours)
      default: 2
      selector:
        number:
          min: 1
          max: 8
          step: 1
          unit_of_measurement: "h"

triggers:
  - trigger: state
    entity_id: !input radiator
    attribute: temperature
  - trigger: state
    entity_id: !input radiator
    attribute: hvac_mode
  - trigger: state
    entity_id: !input towel_rail
    attribute: temperature
  - trigger: state
    entity_id: !input towel_rail
    attribute: hvac_mode

conditions:
  - condition: template
    value_template: "{{ states(!input automation_running_boolean) == 'off' }}"
  - condition: template
    value_template: >
      {% set w1 = !input window_sensor_1 %}
      {% set w2 = !input window_sensor_2 %}
      {{ (w1 == '' or is_state(w1, 'off')) and
         (w2 == '' or is_state(w2, 'off')) }}
  - condition: template
    value_template: "{{ states(!input override_boolean) == 'off' }}"

actions:
  - action: input_boolean.turn_on
    target:
      entity_id: !input override_boolean
  - action: input_datetime.set_datetime
    target:
      entity_id: !input override_datetime
    data:
      datetime: >
        {{ (now() + timedelta(hours=!input override_duration)).strftime('%Y-%m-%d %H:%M:%S') }}
  - action: notify.notify
    data:
      title: "🖐️ Heating Override Active"
      message: >
        Manual change detected on {{ trigger.to_state.attributes.friendly_name }}.
        Smart heating paused for {{ !input override_duration }} hours until
        {{ (now() + timedelta(hours=!input override_duration)).strftime('%H:%M') }}.

mode: single
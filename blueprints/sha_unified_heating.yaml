blueprint:
  name: "SHA - Unified Room Heating"
  author: bubuplanet
  description: |
    🌡️ Smart Heating Advisor — Unified Room Heating Blueprint

    AI-driven smart heating for any room. Pre-heat timing is calculated
    dynamically from the current room temperature, the AI-calibrated
    heating rate, and the next schedule start time — so the room is
    always at the right temperature exactly when needed.

    ✨ Features
    - 🤖 AI-driven pre-heat: timing calculated from room temp + heating rate
    - 📅 Unlimited schedules — add as many HA Schedule helpers as you need
    - 🌡️ Per-schedule target temperature — encoded in the schedule name (e.g. "Morning Shower 26C")
    - 🔥 Optional fixed-temperature radiator thermostat (towel rails, floor heating, etc.)
    - 🏖️ Vacation mode via calendar keyword
    - 🪟 Window & door detection with configurable reaction delays
    - ✋ Manual override with automatic resume via HA Timer
    - 🔔 Toggleable notifications — each fires only once per event

    📝 Schedule naming convention
    Name each Schedule helper with the target temperature at the end:
      ✅ "Morning Shower 26C"
      ✅ "Evening Bath 28C"
      ✅ "Night Standby 16C"
      ✅ "Weekend 20C"
    The blueprint reads the temperature automatically from the name.
    If no temperature is found in the name, the configured fallback temperature is used.

    ⚠️ Requires Smart Heating Advisor (SHA) HACS integration
    The SHA integration automatically creates all required helpers based
    on the room name you provide. Make sure SHA is installed and configured
    before creating automations from this blueprint.

    🛠️ Helpers auto-created by SHA for each room:
    Room name "Bathroom" → room_id "bathroom":
    - input_number.sha_bathroom_heating_rate
    - input_boolean.sha_bathroom_automation_running
    - input_boolean.sha_bathroom_airing_mode
    - input_boolean.sha_bathroom_preheat_notified
    - input_boolean.sha_bathroom_target_notified
    - input_boolean.sha_bathroom_standby_notified
    - input_boolean.sha_bathroom_vacation_notified
    - timer.sha_bathroom_override

  source_url: https://github.com/bubuplanet/smart-heating-advisor/blob/master/blueprints/automation/smart_heating_advisor/sha_unified_heating.yaml
  domain: automation

  input:

    # ─────────────────────────────────────────────
    # ROOM
    # ─────────────────────────────────────────────
    room_section:
      name: "🏠 Room"
      icon: mdi:radiator
      input:

        room_name:
          name: Room Name
          description: |
            Friendly name of the room — used in notifications and to
            derive the SHA helper entity IDs automatically.
            Use the exact same name you configured in the SHA integration.
            Examples: Bathroom, Alessio's Bedroom, Living Room, Office
          default: Bathroom
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          description: The sensor measuring actual room temperature.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        radiator_thermostats:
          name: Radiator Thermostat
          description: >
            One or more TRVs that follow the schedule target temperature.
            These are set to each schedule's target temp during active periods
            and to the default temperature (or off) outside schedules.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_thermostats:
          name: Fixed Radiator Thermostat (optional)
          description: >
            Optional. One or more TRVs that always heat to a fixed temperature
            regardless of schedule (e.g. towel rail, floor heating).
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_temperature:
          name: Fixed Radiator Temperature
          description: >
            Temperature applied to fixed radiator thermostats when heating is active.
            Has no effect if no fixed radiator thermostats are selected above.
          default: 30
          selector:
            number:
              min: 15
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # SCHEDULES
    # ─────────────────────────────────────────────
    schedule_section:
      name: "📅 Schedules"
      icon: mdi:clock-outline
      input:

        schedules:
          name: Schedule Helpers
          description: |
            Select one or more HA Schedule helpers.
            Name each helper with the target temperature at the end:
              ✅ "Morning Shower 26C"
              ✅ "Evening Bath 28C"
              ✅ "Weekend 20C"
            The blueprint reads the target temperature automatically from the name.
            If no temperature is found, the fallback temperature below is used.
            Create Schedule helpers in: Settings → Helpers → Schedule
          selector:
            entity:
              filter:
                - domain: schedule
              multiple: true

        schedule_fallback_temp:
          name: Schedule Fallback Temperature
          description: >
            Temperature used when a schedule is active but no temperature
            is found in the schedule name (e.g. name is just "Morning" with no "26C").
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # DEFAULT (NO ACTIVE SCHEDULE)
    # ─────────────────────────────────────────────
    default_section:
      name: "🌡️ Default — No Active Schedule"
      icon: mdi:thermostat-auto
      collapsed: true
      input:

        default_hvac_mode:
          name: Default Heating Mode
          description: >
            What to do when no schedule is currently active.
            Off — disables heating completely outside schedule windows.
            Heat — maintains the default temperature at all times.
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating outside schedules)"
                  value: "off"
                - label: "Heat (maintain default temperature)"
                  value: heat

        default_temp:
          name: Default Temperature
          description: >
            Temperature to maintain when no schedule is active
            and Default Heating Mode is set to Heat.
          default: 16
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # WINDOW & DOOR DETECTION
    # ─────────────────────────────────────────────
    window_section:
      name: "🪟 Window & Door Detection"
      icon: mdi:door-open
      collapsed: true
      input:

        window_sensors:
          name: Window & Door Sensors
          description: >
            Optional. Select binary sensors for windows and doors.
            When any sensor is open for at least the reaction time below,
            heating is paused. Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: true

        window_open_reaction_time:
          name: Open Reaction Time
          description: >
            How long a window must stay open before heating is paused.
            Set to 0 seconds to pause immediately.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

        window_close_reaction_time:
          name: Close Reaction Time
          description: >
            How long after all windows close before heating resumes.
            Set to 0 seconds to resume immediately.
          default:
            hours: 0
            minutes: 0
            seconds: 30
          selector:
            duration:

    # ─────────────────────────────────────────────
    # VACATION
    # ─────────────────────────────────────────────
    vacation_section:
      name: "🏖️ Vacation"
      icon: mdi:calendar-clock
      collapsed: true
      input:

        vacation_enabled:
          name: Enable Vacation Mode
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          default: calendar.home
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: >
            Event title must start with this keyword to trigger vacation mode.
            Case insensitive.
          default: vacation
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating)"
                  value: "off"
                - label: "Frost protection"
                  value: frost

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior is set to Frost protection.
          default: 12
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    # ─────────────────────────────────────────────
    # MANUAL OVERRIDE
    # ─────────────────────────────────────────────
    override_section:
      name: "✋ Manual Override"
      icon: mdi:hand-back-right
      collapsed: true
      input:

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change.
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

    # ─────────────────────────────────────────────
    # NOTIFICATIONS
    # ─────────────────────────────────────────────
    notifications_section:
      name: "🔔 Notifications"
      icon: mdi:bell
      collapsed: true
      input:

        notify_preheat:
          name: Notify when pre-heat starts
          description: Fires once per schedule event — not every 5 minutes.
          default: true
          selector:
            boolean:

        notify_target_reached:
          name: Notify when target temperature reached
          description: Fires once per schedule event.
          default: true
          selector:
            boolean:

        notify_standby:
          name: Notify when standby mode starts
          description: Fires once when transitioning to standby.
          default: true
          selector:
            boolean:

        notify_window:
          name: Notify when window opens or closes
          default: true
          selector:
            boolean:

        notify_override:
          name: Notify when override is activated or resumed
          default: true
          selector:
            boolean:

# ─────────────────────────────────────────────────────────────────────
# VARIABLES
# ─────────────────────────────────────────────────────────────────────
variables:
  room_name:                  !input room_name
  temperature_sensor:         !input temperature_sensor
  radiator_thermostats:       !input radiator_thermostats
  fixed_radiator_thermostats: !input fixed_radiator_thermostats
  fixed_radiator_temperature: !input fixed_radiator_temperature
  schedules:                  !input schedules
  schedule_fallback_temp:     !input schedule_fallback_temp
  default_hvac_mode:          !input default_hvac_mode
  default_temp:               !input default_temp
  window_sensors:             !input window_sensors
  vacation_enabled:           !input vacation_enabled
  vacation_calendar:          !input vacation_calendar
  vacation_keyword:           !input vacation_keyword
  vacation_mode:              !input vacation_mode
  vacation_temperature:       !input vacation_temperature
  override_minutes:           !input override_minutes
  notify_preheat:             !input notify_preheat
  notify_target_reached:      !input notify_target_reached
  notify_standby:             !input notify_standby
  notify_window:              !input notify_window
  notify_override:            !input notify_override

  # ── Room ID derived from room name ───────────────────────────────
  room_id: >
    {{ room_name | lower
                 | replace("'", '')
                 | replace(' ', '_')
                 | replace('-', '_') }}

  # ── SHA helper entity IDs — all derived from room_id ─────────────
  sha_heating_rate:        "input_number.sha_{{ room_id }}_heating_rate"
  sha_guard:               "input_boolean.sha_{{ room_id }}_automation_running"
  sha_airing:              "input_boolean.sha_{{ room_id }}_airing_mode"
  sha_override_timer:      "timer.sha_{{ room_id }}_override"
  sha_preheat_notified:    "input_boolean.sha_{{ room_id }}_preheat_notified"
  sha_target_notified:     "input_boolean.sha_{{ room_id }}_target_notified"
  sha_standby_notified:    "input_boolean.sha_{{ room_id }}_standby_notified"
  sha_vacation_notified:   "input_boolean.sha_{{ room_id }}_vacation_notified"

  # ── Sensor readings ──────────────────────────────────────────────
  room_temp:    "{{ states(temperature_sensor) | float(18) }}"
  heating_rate: "{{ states(sha_heating_rate) | float(0.15) }}"

  # ── State flags ──────────────────────────────────────────────────
  override_active: "{{ is_state(sha_override_timer, 'active') }}"
  windows_open:    "{{ is_state(sha_airing, 'on') }}"

  # ── Vacation active? ─────────────────────────────────────────────
  vacation_active: >
    {% if not vacation_enabled %}
      false
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | default('') | string %}
      {{ is_state(vacation_calendar, 'on') and
         message | lower | regex_search('^' ~ vacation_keyword | lower) }}
    {% endif %}

  # ── Active schedule ──────────────────────────────────────────────
  # Finds which schedule is currently ON
  # Reads target temp from name (e.g. "Morning Shower 26C")
  # Falls back to schedule_fallback_temp if no temp found
  active_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='') %}
    {% for s in schedules %}
      {% if not ns.found and is_state(s, 'on') %}
        {% set fname = state_attr(s, 'friendly_name') | default('') %}
        {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
        {% set ns.found = true %}
        {% set ns.temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
        {% set ns.name = fname %}
      {% endif %}
    {% endfor %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name} }}

  in_comfort:   "{{ active_schedule.active }}"
  comfort_temp: "{{ active_schedule.temp | float(0) }}"

  # ── Pre-heat schedule ────────────────────────────────────────────
  # Finds which schedule will start soon and needs pre-heating now
  # Uses AI heating rate to calculate exactly when to start
  preheat_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='', mins_needed=0) %}
    {% if not in_comfort %}
      {% for s in schedules %}
        {% if not ns.found and is_state(s, 'off') %}
          {% set fname = state_attr(s, 'friendly_name') | default('') %}
          {% set nev = state_attr(s, 'next_event') %}
          {% if nev %}
            {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
            {% set target_temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
            {% set mins_needed = [((target_temp - room_temp) / heating_rate) | int(10), 5] | max %}
            {% set mins_to_start = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
            {% if 0 <= mins_to_start <= mins_needed %}
              {% set ns.found = true %}
              {% set ns.temp = target_temp %}
              {% set ns.name = fname %}
              {% set ns.mins_needed = mins_needed %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name, 'mins_needed': ns.mins_needed} }}

  in_preheat:   "{{ preheat_schedule.active }}"
  preheat_temp: "{{ preheat_schedule.temp | float(0) }}"

  # ── Final target temperature and HVAC mode ───────────────────────
  target_temperature: >
    {% if vacation_active and vacation_mode == 'frost' %}
      {{ vacation_temperature | float }}
    {% elif in_comfort %}
      {{ comfort_temp }}
    {% elif in_preheat %}
      {{ preheat_temp }}
    {% else %}
      {{ default_temp | float }}
    {% endif %}

  target_mode: >
    {% if windows_open %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% elif not in_comfort and not in_preheat and default_hvac_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

  # ── Target reached? ──────────────────────────────────────────────
  target_reached: "{{ in_comfort and room_temp >= (comfort_temp - 0.3) }}"

# ─────────────────────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────────────────────
triggers:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: state
    entity_id: !input schedules
    id: schedule_changed

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    for: !input window_close_reaction_time
    id: window_airing_end

  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: "timer.sha_{{ room_id }}_override"
    id: override_ended

conditions: []

# ─────────────────────────────────────────────────────────────────────
# ACTIONS
# ─────────────────────────────────────────────────────────────────────
action:
  - choose:

      # ── Window opened: activate airing mode ──────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ sha_airing }}"
          - if:
              - condition: template
                value_template: "{{ notify_window }}"
            then:
              - action: notify.notify
                data:
                  title: "🪟 {{ room_name }} — Window Open"
                  message: >
                    Heating paused — window open.
                    Room: {{ room_temp | round(1) }}°C.

      # ── All windows closed: deactivate airing mode ───────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ expand(window_sensors)
                     | selectattr('state', 'in', ['on', 'open'])
                     | list | count == 0 }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ sha_airing }}"
              - if:
                  - condition: template
                    value_template: "{{ notify_window }}"
                then:
                  - action: notify.notify
                    data:
                      title: "🪟 {{ room_name }} — Window Closed"
                      message: >
                        All windows closed. Heating resumed.
                        Room: {{ room_temp | round(1) }}°C.

      # ── Schedule changed: reset relevant notification flags ───────
      # When a schedule turns ON  → reset preheat + standby flags
      # When a schedule turns OFF → reset target reached flag
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'schedule_changed' }}"
        sequence:
          - choose:
              # Schedule turned ON → reset preheat + standby notified flags
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'on' }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - "{{ sha_preheat_notified }}"
                        - "{{ sha_standby_notified }}"
              # Schedule turned OFF → reset target + preheat notified flags
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'off' }}"
                sequence:
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - "{{ sha_target_notified }}"
                        - "{{ sha_preheat_notified }}"

      # ── Manual TRV change: start override timer ──────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ is_state(sha_guard, 'off') and not windows_open }}
            then:
              - action: timer.start
                target:
                  entity_id: "{{ sha_override_timer }}"
                data:
                  duration: >
                    {% set m = override_minutes | int(120) %}
                    {{ '%02d:%02d:00' | format((m // 60), (m % 60)) }}
              - if:
                  - condition: template
                    value_template: "{{ notify_override }}"
                then:
                  - action: notify.notify
                    data:
                      title: "✋ {{ room_name }} — Override Active"
                      message: >
                        Manual change detected on {{ trigger.to_state.attributes.friendly_name }}.
                        Smart heating paused for {{ override_minutes }} min until
                        {{ (now() + timedelta(minutes=override_minutes | int)).strftime('%H:%M') }}.

      # ── Override active: skip control loop ───────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ override_active and
                 trigger.id not in ['override_ended', 'manual_override',
                                    'window_airing_start', 'window_airing_end',
                                    'schedule_changed'] }}
        sequence:
          - stop: "Override active — skipping control loop."

    # ── DEFAULT: main heating control ──────────────────────────────
    default:

      # Set automation guard ON
      - action: input_boolean.turn_on
        target:
          entity_id: "{{ sha_guard }}"

      # ── Control radiator thermostats ───────────────────────────
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input radiator_thermostats
                data:
                  temperature: "{{ target_temperature | float }}"

      # ── Control fixed radiator thermostats ─────────────────────
      - if:
          - condition: template
            value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      hvac_mode: "off"
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      temperature: "{{ fixed_radiator_temperature | float }}"

      # Set automation guard OFF
      - action: input_boolean.turn_off
        target:
          entity_id: "{{ sha_guard }}"

      # ── Notifications — each fires only once per event ────────

      # Pre-heat started — once per schedule event
      - if:
          - condition: template
            value_template: >
              {{ notify_preheat and
                 in_preheat and
                 is_state(sha_preheat_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: "🌅 {{ room_name }} — Pre-heat Started"
              message: >
                Pre-heating for "{{ preheat_schedule.name }}".
                Room: {{ room_temp | round(1) }}°C → target {{ preheat_temp }}°C.
                Est. {{ preheat_schedule.mins_needed }} min to reach target.
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ sha_preheat_notified }}"

      # Target reached — once per schedule event
      - if:
          - condition: template
            value_template: >
              {{ notify_target_reached and
                 target_reached and
                 is_state(sha_target_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: "✅ {{ room_name }} — Target Reached"
              message: >
                {{ room_name }} reached {{ room_temp | round(1) }}°C
                for "{{ active_schedule.name }}" at {{ now().strftime('%H:%M') }}.
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ sha_target_notified }}"

      # Standby mode — once per transition
      - if:
          - condition: template
            value_template: >
              {{ notify_standby and
                 not in_comfort and
                 not in_preheat and
                 not vacation_active and
                 not windows_open and
                 is_state(sha_standby_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: "🌡️ {{ room_name }} — Standby"
              message: >
                No active schedule.
                {% if default_hvac_mode == 'heat' %}
                  Maintaining {{ default_temp }}°C standby.
                {% else %}
                  Heating off.
                {% endif %}
                Room: {{ room_temp | round(1) }}°C.
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ sha_standby_notified }}"

      # Override ended — fires on override_ended trigger
      - if:
          - condition: template
            value_template: "{{ notify_override and trigger.id == 'override_ended' }}"
        then:
          - action: notify.notify
            data:
              title: "🔄 {{ room_name }} — Heating Resumed"
              message: >
                Manual override ended. Smart heating resumed.
                Room: {{ room_temp | round(1) }}°C.

      # Vacation mode — once per vacation event
      - if:
          - condition: template
            value_template: >
              {{ vacation_active and
                 is_state(sha_vacation_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: "🏖️ {{ room_name }} — Vacation Mode"
              message: >
                Vacation mode active.
                {% if vacation_mode == 'frost' %}
                  Maintaining frost protection at {{ vacation_temperature }}°C.
                {% else %}
                  Heating off.
                {% endif %}
          - action: input_boolean.turn_on
            target:
              entity_id: "{{ sha_vacation_notified }}"

      # Reset vacation notified when vacation ends
      - if:
          - condition: template
            value_template: >
              {{ not vacation_active and
                 is_state(sha_vacation_notified, 'on') }}
        then:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ sha_vacation_notified }}"


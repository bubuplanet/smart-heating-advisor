blueprint:
  name: "Smart Heating Advisor"
  author: bubuplanet
  description: |
    **version: 0.0.2**

    🌡️ Smart Heating Advisor — Unified Room Heating Blueprint

    This blueprint requires the Smart Heating Advisor (SHA) HACS integration.
    It provides AI-powered heating rate calibration based on your room's
    historical data and outside weather conditions — delivering a self-improving
    smart heating system that gets more accurate over time.

    ✨ Features
    - ⏱️ Smart pre-heat: timing calculated from room temp + heating rate
    - 📅 Unlimited schedules — add as many HA Schedule helpers as you need
    - 🌡️ Per-schedule target temperature — encoded in the schedule name (e.g. "Morning Shower 26C")
    - 🔥 Optional fixed-temperature radiator thermostat (towel rails, floor heating, etc.)
    - 🏖️ Vacation mode via calendar keyword
    - 🪟 Window & door detection with configurable reaction delays
    - ✋ Manual override with automatic resume
    - 🔔 Toggleable notifications — each fires only once per event
    - 🤖 AI heating rate calibration — auto-adjusted daily by SHA

    📝 Schedule naming convention
    Name each Schedule helper with the target temperature at the end:
      ✅ "Morning Shower 26C"
      ✅ "Evening Bath 28C"
      ✅ "Night Standby 16C"
      ✅ "Weekend 20C"
    The blueprint reads the temperature automatically from the name.
    If no temperature is found in the name, the configured fallback temperature is used.

    🛠️ Setup
    Install the SHA integration first, then create one automation per room
    from this blueprint. Use the exact room name you configured in SHA.
    On first run, each room is auto-registered in SHA's internal registry.
    Reload SHA once after first run to create helper entities for new rooms.

    Required entities (auto-created by SHA):
    - number.sha_ROOM_heating_rate
    - switch.sha_ROOM_preheat_notified
    - switch.sha_ROOM_target_notified
    - switch.sha_ROOM_standby_notified
    - switch.sha_ROOM_window_timeout_notified
    - switch.sha_ROOM_vacation_notified
    - switch.sha_ROOM_airing_mode
    - switch.sha_ROOM_override

  source_url: https://raw.githubusercontent.com/bubuplanet/smart-heating-advisor/main/blueprints/automation/smart_heating_advisor/sha_unified_heating.yaml
  domain: automation

  input:

    room_section:
      name: "⚠️ 🏠 Room — Mandatory"
      icon: mdi:radiator
      collapsed: true
      description: Required. Room name, temperature sensor, and TRV thermostats.
      input:

        room_name:
          name: Room Name
          description: |
            Friendly name of the room — used in notifications and to
            derive the SHA helper entity IDs automatically.
            Use the exact same name you configured in the SHA integration.
            Examples: Bathroom, Alessio's Bedroom, Living Room, Office
          default: Bathroom
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          description: The sensor measuring actual room temperature.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        radiator_thermostats:
          name: Radiator Thermostat
          description: >
            One or more TRVs that follow the schedule target temperature.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_thermostats:
          name: Fixed Radiator Thermostat (optional)
          description: >
            Optional. TRVs that always heat to a fixed temperature
            regardless of schedule (e.g. towel rail, floor heating).
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_temperature:
          name: Fixed Radiator Temperature (optional)
          description: >
            Temperature applied to fixed radiator thermostats when heating is active.
          default: 30
          selector:
            number:
              min: 15
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedule_section:
      name: "⚠️ 📅 Schedules — Mandatory"
      icon: mdi:clock-outline
      collapsed: true
      description: Required. Schedule helpers, fallback temperature, and notification templates.
      input:

        schedules:
          name: Schedule Helpers
          description: |
            Select one or more HA Schedule helpers.
            Name each helper with the target temperature at the end:
              ✅ "Morning Shower 26C"
              ✅ "Evening Bath 28C"
              ✅ "Weekend 20C"
            Create Schedule helpers in: Settings → Helpers → Schedule
          selector:
            entity:
              filter:
                - domain: schedule
              multiple: true

        schedule_fallback_temp:
          name: Schedule Fallback Temperature
          description: >
            Temperature used when no temperature is found in the schedule name.
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

        notify_preheat:
          name: Notify when pre-heat starts
          description: >
            Fires once when pre-heating begins — typically minutes before the schedule starts.
            Only sent if the room needs warming up before the schedule activates.
          default: true
          selector:
            boolean:

        tpl_preheat_started_body:
          name: Pre-heat Started — Message Body
          description: "Sent when pre-heating begins. Variables: {{ room_name }}, {{ room_temp }}, {{ target_temp }}, {{ schedule_name }}, {{ eta_minutes }}"
          default: >-
            Pre-heating {{ room_name }} for "{{ schedule_name }}".
            Target: {{ target_temp }}°C — ETA {{ eta_minutes }} min.
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

        tpl_preheat_suspended_body:
          name: Pre-heat Suspended — Message Body
          description: "Sent when pre-heat is due but blocked by an open window. Variables: {{ room_name }}, {{ room_temp }}, {{ target_temp }}, {{ schedule_name }}, {{ window_name }}"
          default: >-
            Pre-heating for "{{ schedule_name }}" in {{ room_name }} is suspended
            while a window is open. Target: {{ target_temp }}°C.
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

        notify_target_reached:
          name: Notify when target temperature reached
          description: >
            Fires once when the room reaches its target temperature during a schedule.
            Also sent when a schedule starts if no pre-heat was needed.
          default: true
          selector:
            boolean:

        tpl_schedule_header:
          name: Schedule Notification Header
          description: >
            Shared header for all schedule notifications.
            Variables: {{ room_name }}, {{ status }}
          default: "🔔 {{ room_name }} — {{ status }}"
          selector:
            text:

        tpl_schedule_started_body:
          name: Schedule Started — Message Body
          description: "Sent when a schedule activates. Variables: {{ room_name }}, {{ room_temp }}, {{ schedule_name }}, {{ target_temp }}"
          default: >-
            "{{ schedule_name }}" is now active in {{ room_name }}.
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

        tpl_target_reached_body:
          name: Target Reached — Message Body
          description: "Sent when the room reaches its target temperature. Variables: {{ room_name }}, {{ room_temp }}, {{ schedule_name }}, {{ time }}, {{ target_temp }}"
          default: >-
            {{ room_name }} reached {{ room_temp }}°C
            for "{{ schedule_name }}" at {{ time }}.
          selector:
            text:
              multiline: true

        tpl_schedule_finished_body:
          name: Schedule Finished — Message Body
          description: "Sent when a schedule ends and heating returns to default. Variables: {{ room_name }}, {{ room_temp }}, {{ default_hvac_mode }}, {{ default_temp }}"
          default: >-
            Schedule ended in {{ room_name }}.
            Switching to {{ default_hvac_mode }} at {{ default_temp }}°C.
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

    default_section:
      name: "🌡️ Default — No Active Schedule"
      icon: mdi:thermostat-auto
      collapsed: true
      description: Heating behaviour when no schedule is active.
      input:

        default_hvac_mode:
          name: Default Heating Mode
          description: >
            Off — disables heating outside schedules.
            Heat — maintains the default temperature at all times.
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating outside schedules)"
                  value: "off"
                - label: "Heat (maintain default temperature)"
                  value: heat

        default_temp:
          name: Default Temperature
          description: >
            Temperature to maintain when no schedule is active
            and Default Heating Mode is set to Heat.
          default: 16
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

        notify_standby:
          name: Notify when standby mode starts
          description: Fires once when transitioning to standby.
          default: true
          selector:
            boolean:

        tpl_default_header:
          name: Standby Notification Header
          description: >
            Header for standby notifications.
            Variables: {{ room_name }}, {{ status }}
          default: "🔔 {{ room_name }} — {{ status }}"
          selector:
            text:

        tpl_standby_body:
          name: Standby — Message Body
          description: "Sent when no schedule is active and heating enters standby. Variables: {{ room_name }}, {{ room_temp }}, {{ default_hvac_mode }}, {{ default_temp }}"
          default: >-
            No active schedule in {{ room_name }}.
            Heating set to {{ default_hvac_mode }} at {{ default_temp }}°C.
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

    window_section:
      name: "🪟 Window & Door Detection"
      icon: mdi:door-open
      collapsed: true
      description: Optional. Pause heating when windows or doors are open.
      input:

        window_sensors:
          name: Window & Door Sensors
          description: >
            Optional. Select binary sensors for windows and doors.
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: true

        window_open_reaction_time:
          name: Open Reaction Time
          description: How long a window must stay open before heating is paused.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

        notify_window:
          name: Notify when heating is paused by a window
          description: Send a notification when heating is paused because a window has been open too long.
          default: true
          selector:
            boolean:

        tpl_window_header:
          name: Window Notification Header
          description: >
            Header for window notifications.
            Variables: {{ room_name }}, {{ window_name }}, {{ status }}
          default: "🪟 {{ room_name }} - {{ window_name }} {{ status }}"
          selector:
            text:

        tpl_window_timeout_body:
          name: Window Paused — Message Body
          description: >
            Sent when heating is paused because a window has been open longer than the reaction time.
            Variables: {{ room_name }}, {{ window_name }}, {{ room_temp }}
          default: >-
            Heating in {{ room_name }} has been paused because a window is open.
            It will resume automatically when all windows are closed.
            Current temperature: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

        tpl_window_closed_body:
          name: Window Closed — Message Body
          description: >
            Sent only when windows close after a pause was previously triggered.
            Variables: {{ room_name }}, {{ window_name }}, {{ room_temp }}, {{ resume_mode }}
          default: >-
            All windows in {{ room_name }} are now closed.
            Heating resumed ({{ resume_mode }}).
            Current temperature: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

    vacation_section:
      name: "🏖️ Vacation"
      icon: mdi:calendar-clock
      collapsed: true
      description: Optional. Automatically reduce heating during calendar vacation events.
      input:

        vacation_enabled:
          name: Enable Vacation Mode
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          description: Leave empty if vacation mode is disabled.
          default: ""
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title must start with this keyword. Case insensitive.
          default: vacation
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating)"
                  value: "off"
                - label: "Frost protection"
                  value: frost

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior is set to Frost protection.
          default: 12
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    override_section:
      name: "✋ Manual Override"
      icon: mdi:hand-back-right
      collapsed: true
      description: Pause automation temporarily when the TRV is adjusted manually.
      input:

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change.
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        notify_override:
          name: Notify when override is activated or ended
          default: true
          selector:
            boolean:

        tpl_override_header:
          name: Override Notification Header
          description: >
            Header for override active and override ended notifications.
            Variables: {{ room_name }}, {{ status }}
          default: "🔔 {{ room_name }} — {{ status }}"
          selector:
            text:

        tpl_override_active_body:
          name: Override Active — Message Body
          description: "Sent when a manual TRV change triggers an override. Variables: {{ room_name }}, {{ device_name }}, {{ override_minutes }}, {{ resume_time }}, {{ room_temp }}"
          default: >-
            Manual override on {{ device_name }} in {{ room_name }}.
            Resumes in {{ override_minutes }} min ({{ resume_time }}).
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

        tpl_override_ended_body:
          name: Override Ended — Message Body
          description: "Sent when the override expires and smart heating resumes. Variables: {{ room_name }}, {{ room_temp }}, {{ target_temp }}"
          default: >-
            Override in {{ room_name }} has ended.
            Resuming scheduled heating.
            Current: {{ room_temp }}°C.
          selector:
            text:
              multiline: true

    ai_report_section:
      name: "🤖 AI Report"
      icon: mdi:robot
      collapsed: true
      description: Enable daily and weekly AI-generated heating analysis reports.
      input:

        notify_daily_report:
          name: Notify daily analysis report
          description: Show a persistent daily analysis report notification for this room.
          default: true
          selector:
            boolean:

        notify_weekly_report:
          name: Notify weekly analysis report
          description: Show a persistent weekly analysis report notification for this room.
          default: true
          selector:
            boolean:

variables:
  room_name:                  !input room_name
  temperature_sensor:         !input temperature_sensor
  radiator_thermostats:       !input radiator_thermostats
  fixed_radiator_thermostats: !input fixed_radiator_thermostats
  fixed_radiator_temperature: !input fixed_radiator_temperature
  schedules:                  !input schedules
  schedule_fallback_temp:     !input schedule_fallback_temp
  default_hvac_mode:          !input default_hvac_mode
  default_temp:               !input default_temp
  window_sensors:             !input window_sensors
  vacation_enabled:           !input vacation_enabled
  vacation_calendar:          !input vacation_calendar
  vacation_keyword:           !input vacation_keyword
  vacation_mode:              !input vacation_mode
  vacation_temperature:       !input vacation_temperature
  override_minutes:           !input override_minutes
  notify_preheat:             !input notify_preheat
  notify_target_reached:      !input notify_target_reached
  notify_standby:             !input notify_standby
  notify_window:              !input notify_window
  notify_override:            !input notify_override
  tpl_window_header:            !input tpl_window_header
  tpl_window_timeout_body:      !input tpl_window_timeout_body
  tpl_window_closed_body:       !input tpl_window_closed_body
  tpl_schedule_header:          !input tpl_schedule_header
  tpl_default_header:           !input tpl_default_header
  tpl_override_header:          !input tpl_override_header
  tpl_preheat_started_body:     !input tpl_preheat_started_body
  tpl_preheat_suspended_body:   !input tpl_preheat_suspended_body
  tpl_schedule_started_body:    !input tpl_schedule_started_body
  tpl_schedule_finished_body:   !input tpl_schedule_finished_body
  tpl_target_reached_body:      !input tpl_target_reached_body
  tpl_standby_body:             !input tpl_standby_body
  tpl_override_active_body:     !input tpl_override_active_body
  tpl_override_ended_body:      !input tpl_override_ended_body
  notify_daily_report:        !input notify_daily_report
  notify_weekly_report:       !input notify_weekly_report

  room_id: >
    {{ room_name | lower
                 | replace("'", '')
                 | replace(' ', '_')
                 | replace('-', '_') }}

  sha_heating_rate:      "number.sha_{{ room_id }}_heating_rate"
  sha_override_switch:   "switch.sha_{{ room_id }}_override"
  sha_preheat_notified:  "switch.sha_{{ room_id }}_preheat_notified"
  sha_target_notified:   "switch.sha_{{ room_id }}_target_notified"
  sha_standby_notified:  "switch.sha_{{ room_id }}_standby_notified"
  sha_vacation_notified:         "switch.sha_{{ room_id }}_vacation_notified"
  sha_window_timeout_notified:   "switch.sha_{{ room_id }}_window_timeout_notified"
  sha_notify_preheat_enabled:  "switch.sha_{{ room_id }}_preheat_notifications_enabled"
  sha_notify_target_enabled:   "switch.sha_{{ room_id }}_target_notifications_enabled"
  sha_notify_standby_enabled:  "switch.sha_{{ room_id }}_standby_notifications_enabled"
  sha_notify_window_enabled:   "switch.sha_{{ room_id }}_window_notifications_enabled"
  sha_notify_override_enabled: "switch.sha_{{ room_id }}_override_notifications_enabled"

  room_temp:    "{{ states(temperature_sensor) | float(18) }}"
  heating_rate: "{{ states(sha_heating_rate) | float(0.15) }}"

  override_active: "{{ is_state(sha_override_switch, 'on') }}"
  windows_open:    "{{ is_state('switch.sha_' ~ room_id ~ '_airing_mode', 'on') }}"

  notify_preheat_effective: >
    {% set s = states(sha_notify_preheat_enabled) %}
    {{ notify_preheat and (s == 'on' or s in ['unknown', 'unavailable']) }}

  notify_target_effective: >
    {% set s = states(sha_notify_target_enabled) %}
    {{ notify_target_reached and (s == 'on' or s in ['unknown', 'unavailable']) }}

  notify_standby_effective: >
    {% set s = states(sha_notify_standby_enabled) %}
    {{ notify_standby and (s == 'on' or s in ['unknown', 'unavailable']) }}

  notify_window_effective: >
    {% set s = states(sha_notify_window_enabled) %}
    {{ notify_window and (s == 'on' or s in ['unknown', 'unavailable']) }}

  notify_override_effective: >
    {% set s = states(sha_notify_override_enabled) %}
    {{ notify_override and (s == 'on' or s in ['unknown', 'unavailable']) }}

  vacation_active: >
    {% if not vacation_enabled or not vacation_calendar %}
      false
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | default('') | string %}
      {{ is_state(vacation_calendar, 'on') and
         message | lower | regex_search('^' ~ vacation_keyword | lower) }}
    {% endif %}

  active_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='') %}
    {% for s in schedules %}
      {% if not ns.found and is_state(s, 'on') %}
        {% set fname = state_attr(s, 'friendly_name') | default('') %}
        {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
        {% set ns.found = true %}
        {% set ns.temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
        {% set ns.name = fname %}
      {% endif %}
    {% endfor %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name} }}

  in_comfort:   "{{ active_schedule.active }}"
  comfort_temp: "{{ active_schedule.temp | float(0) }}"

  preheat_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='', mins_needed=0) %}
    {% if not in_comfort %}
      {% for s in schedules %}
        {% if not ns.found and is_state(s, 'off') %}
          {% set fname = state_attr(s, 'friendly_name') | default('') %}
          {% set nev = state_attr(s, 'next_event') %}
          {% if nev %}
            {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
            {% set target_temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
            {% set mins_needed = [((target_temp - room_temp) / heating_rate) | int(10), 5] | max %}
            {% set mins_to_start = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
            {% if 0 <= mins_to_start <= mins_needed %}
              {% set ns.found = true %}
              {% set ns.temp = target_temp %}
              {% set ns.name = fname %}
              {% set ns.mins_needed = mins_needed %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name, 'mins_needed': ns.mins_needed} }}

  in_preheat:   "{{ preheat_schedule.active }}"
  preheat_temp: "{{ preheat_schedule.temp | float(0) }}"

  target_temperature: >
    {% if vacation_active and vacation_mode == 'frost' %}
      {{ vacation_temperature | float }}
    {% elif in_comfort %}
      {{ comfort_temp }}
    {% elif in_preheat %}
      {{ preheat_temp }}
    {% else %}
      {{ default_temp | float }}
    {% endif %}

  target_mode: >
    {% if windows_open %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% elif not in_comfort and not in_preheat and default_hvac_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

  target_reached: "{{ in_comfort and room_temp >= (comfort_temp - 0.3) }}"

triggers:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: state
    entity_id: !input schedules
    id: schedule_changed

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    id: window_airing_end

  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed
    enabled: "{{ vacation_calendar | length > 0 }}"

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: sha_override_ended
    id: override_ended

conditions: []

action:

  - action: smart_heating_advisor.register_room
    data:
      room_name: !input room_name
      temperature_sensor: !input temperature_sensor
      schedules: !input schedules
      daily_report_enabled: !input notify_daily_report
      weekly_report_enabled: !input notify_weekly_report

  - choose:

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'override_ended' and
                 trigger.event.data.get('room_id') != room_id }}
        sequence:
          - stop: "Override ended for a different room — ignoring."

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - action: switch.turn_on
            target:
              entity_id: "switch.sha_{{ room_id }}_airing_mode"
          - if:
              - condition: template
                value_template: "{{ notify_window_effective }}"
            then:
              - action: notify.notify
                data:
                  title: >
                    {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                    {% set tpl = tpl_window_header | trim %}
                    {% set base = tpl if tpl else "🪟 {{ room_name }} - {{ window_name }} {{ status }}" %}
                    {{ base
                       | replace('{{ room_name }}', room_name)
                       | replace('{{ window_name }}', win_name)
                       | replace('{{ status }}', 'Open') }}
                  message: >
                    {% set body_tpl = tpl_window_timeout_body | trim %}
                    {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                    {% set body_base = body_tpl if body_tpl else "Heating in {{ room_name }} has been paused because a window is open. It will resume when all windows are closed. Current temperature: {{ room_temp }}°C." %}
                    {{ body_base
                       | replace('{{ room_name }}', room_name)
                       | replace('{{ window_name }}', win_name)
                       | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}
              - action: switch.turn_on
                target:
                  entity_id: "{{ sha_window_timeout_notified }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ expand(window_sensors)
                     | selectattr('state', 'in', ['on', 'open'])
                     | list | count == 0 }}
            then:
              - action: switch.turn_off
                target:
                  entity_id: "switch.sha_{{ room_id }}_airing_mode"
              - if:
                  - condition: template
                    value_template: "{{ notify_window_effective and is_state(sha_window_timeout_notified, 'on') }}"
                then:
                  - action: notify.notify
                    data:
                      title: >
                        {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                        {% set tpl = tpl_window_header | trim %}
                        {% set base = tpl if tpl else "🪟 {{ room_name }} - {{ window_name }} {{ status }}" %}
                        {{ base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ window_name }}', win_name)
                           | replace('{{ status }}', 'Closed') }}
                      message: >
                        {% set body_tpl = tpl_window_closed_body | trim %}
                        {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                        {% set resume_mode = 'Pre-heat' if in_preheat else ('Schedule' if in_comfort else 'Standby') %}
                        {% set body_base = body_tpl if body_tpl else "All windows in {{ room_name }} are now closed. Heating resumed ({{ resume_mode }}). Current temperature: {{ room_temp }}°C." %}
                        {{ body_base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ window_name }}', win_name)
                           | replace('{{ resume_mode }}', resume_mode)
                           | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ sha_window_timeout_notified }}"
              - if:
                  - condition: template
                    value_template: "{{ not override_active }}"
                then:
                  - variables:
                      resume_target_mode: >
                        {% if vacation_active and vacation_mode == 'off' %}
                          off
                        {% elif in_comfort or in_preheat or (vacation_active and vacation_mode == 'frost') %}
                          heat
                        {% elif default_hvac_mode == 'heat' %}
                          heat
                        {% else %}
                          off
                        {% endif %}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ resume_target_mode == 'off' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              hvac_mode: "off"
                      - conditions:
                          - condition: template
                            value_template: "{{ resume_target_mode == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              temperature: "{{ target_temperature | float }}"
                  - if:
                      - condition: template
                        value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ resume_target_mode == 'off' }}"
                            sequence:
                              - action: climate.set_hvac_mode
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  hvac_mode: "off"
                          - conditions:
                              - condition: template
                                value_template: "{{ resume_target_mode == 'heat' }}"
                            sequence:
                              - action: climate.set_hvac_mode
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  hvac_mode: heat
                              - action: climate.set_temperature
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  temperature: "{{ fixed_radiator_temperature | float }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'schedule_changed' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'on' }}"
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id:
                        - "{{ sha_standby_notified }}"
                  - if:
                      - condition: template
                        value_template: "{{ notify_target_effective and is_state(sha_target_notified, 'off') }}"
                    then:
                      - action: notify.notify
                        data:
                          title: >
                            {% set tpl = tpl_schedule_header | trim %}
                            {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                            {{ base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ status }}', 'Heating Started') }}
                          message: >
                            {% set body_tpl = tpl_schedule_started_body | trim %}
                            {% set body_base = body_tpl if body_tpl else "\"{{ schedule_name }}\" is now active in {{ room_name }}. Current: {{ room_temp }}°C." %}
                            {{ body_base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ room_temp }}', (room_temp | round(1) | string))
                               | replace('{{ schedule_name }}', active_schedule.name | default('n/a'))
                               | replace('{{ target_temp }}', (comfort_temp | string)) }}
                      - action: switch.turn_on
                        target:
                          entity_id: "{{ sha_target_notified }}"
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ sha_preheat_notified }}"
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'off' }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ notify_standby_effective and is_state(sha_standby_notified, 'off') }}"
                    then:
                      - action: notify.notify
                        data:
                          title: >
                            {% set tpl = tpl_schedule_header | trim %}
                            {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                            {{ base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ status }}', 'Heating Ended') }}
                          message: >
                            {% set body_tpl = tpl_schedule_finished_body | trim %}
                            {% set body_base = body_tpl if body_tpl else "Schedule ended in {{ room_name }}. Switching to {{ default_hvac_mode }} at {{ default_temp }}°C. Current: {{ room_temp }}°C." %}
                            {{ body_base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ room_temp }}', (room_temp | round(1) | string))
                               | replace('{{ default_hvac_mode }}', default_hvac_mode)
                               | replace('{{ default_temp }}', (default_temp | string)) }}
                      - action: switch.turn_on
                        target:
                          entity_id: "{{ sha_standby_notified }}"
                  - action: switch.turn_off
                    target:
                      entity_id:
                        - "{{ sha_target_notified }}"
                        - "{{ sha_preheat_notified }}"
          - if:
              - condition: template
                value_template: "{{ not override_active }}"
            then:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ target_mode == 'off' }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          hvac_mode: "off"
                  - conditions:
                      - condition: template
                        value_template: "{{ target_mode == 'heat' }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          temperature: "{{ target_temperature | float }}"
              - if:
                  - condition: template
                    value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
                then:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ target_mode == 'off' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              hvac_mode: "off"
                      - conditions:
                          - condition: template
                            value_template: "{{ target_mode == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              temperature: "{{ fixed_radiator_temperature | float }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ not windows_open and not override_active and
                     trigger.from_state is not none and (
                       (trigger.attribute == 'temperature' and
                        (trigger.to_state.attributes.temperature | float(-1)) != (target_temperature | float(0))) or
                       (trigger.attribute == 'hvac_mode' and
                        trigger.to_state.attributes.hvac_mode != target_mode)
                     ) }}
            then:
              - action: smart_heating_advisor.start_override
                data:
                  room_name: "{{ room_name }}"
                  duration_minutes: "{{ override_minutes | int(120) }}"
              - if:
                  - condition: template
                    value_template: "{{ notify_override_effective }}"
                then:
                  - action: notify.notify
                    data:
                      title: >
                        {% set tpl = tpl_override_header | trim %}
                        {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                        {{ base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ status }}', 'Override Active') }}
                      message: >
                        {% set body_tpl = tpl_override_active_body | trim %}
                        {% set resume = (now() + timedelta(minutes=override_minutes | int)).strftime('%H:%M') %}
                        {% set body_base = body_tpl if body_tpl else "Manual override on {{ device_name }} in {{ room_name }}. Resumes in {{ override_minutes }} min ({{ resume_time }}). Current: {{ room_temp }}°C." %}
                        {{ body_base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ device_name }}', trigger.to_state.attributes.friendly_name | default('device'))
                           | replace('{{ override_minutes }}', (override_minutes | string))
                           | replace('{{ resume_time }}', resume)
                           | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}

      - conditions:
          - condition: template
            value_template: >
              {{ override_active and
                 trigger.id not in ['override_ended', 'manual_override',
                                    'window_airing_start', 'window_airing_end'] }}
        sequence:
          - stop: "Override active — skipping control loop."

    default:

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input radiator_thermostats
                data:
                  temperature: "{{ target_temperature | float }}"

      - if:
          - condition: template
            value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      hvac_mode: "off"
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      temperature: "{{ fixed_radiator_temperature | float }}"

      - if:
          - condition: template
            value_template: >
              {{ notify_preheat_effective and
                 in_preheat and
                 not windows_open and
                 is_state(sha_preheat_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_schedule_header | trim %}
                {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Pre-heat Started') }}
              message: >
                {% set body_tpl = tpl_preheat_started_body | trim %}
                {% set body_base = body_tpl if body_tpl else "Pre-heating {{ room_name }} for \"{{ schedule_name }}\". Target: {{ target_temp }}°C — ETA {{ eta_minutes }} min. Current: {{ room_temp }}°C." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ target_temp }}', (preheat_temp | string))
                   | replace('{{ schedule_name }}', preheat_schedule.name | default('n/a'))
                   | replace('{{ eta_minutes }}', (preheat_schedule.mins_needed | string)) }}
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_preheat_notified }}"

      - if:
          - condition: template
            value_template: >
              {{ notify_preheat_effective and
                 in_preheat and
                 windows_open and
                 is_state(sha_preheat_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_schedule_header | trim %}
                {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Pre-heat Suspended') }}
              message: >
                {% set body_tpl = tpl_preheat_suspended_body | trim %}
                {% set win_name = expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='attributes.friendly_name') | list | join(', ') | default('a window') %}
                {% set body_base = body_tpl if body_tpl else "Pre-heating for \"{{ schedule_name }}\" in {{ room_name }} is suspended while a window is open. Target: {{ target_temp }}°C. Current: {{ room_temp }}°C." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ target_temp }}', (preheat_temp | string))
                   | replace('{{ schedule_name }}', preheat_schedule.name | default('n/a'))
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ window_name }}', win_name) }}
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_preheat_notified }}"

      - if:
          - condition: template
            value_template: >
              {{ notify_target_effective and
                 target_reached and
                 is_state(sha_target_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_schedule_header | trim %}
                {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Target Reached') }}
              message: >
                {% set body_tpl = tpl_target_reached_body | trim %}
                {% set body_base = body_tpl if body_tpl else "{{ room_name }} reached {{ room_temp }}°C for \"{{ schedule_name }}\" at {{ time }}." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ schedule_name }}', active_schedule.name | default('n/a'))
                   | replace('{{ time }}', now().strftime('%H:%M'))
                   | replace('{{ target_temp }}', (comfort_temp | string)) }}
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_target_notified }}"

      - if:
          - condition: template
            value_template: >
              {{ notify_standby_effective and
                 not in_comfort and
                 not in_preheat and
                 not vacation_active and
                 not windows_open and
                 is_state(sha_standby_notified, 'off') }}
        then:
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_default_header | trim %}
                {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Standby') }}
              message: >
                {% set body_tpl = tpl_standby_body | trim %}
                {% set body_base = body_tpl if body_tpl else "No active schedule in {{ room_name }}. Heating set to {{ default_hvac_mode }} at {{ default_temp }}°C. Current: {{ room_temp }}°C." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ default_hvac_mode }}', default_hvac_mode)
                   | replace('{{ default_temp }}', (default_temp | string)) }}
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_standby_notified }}"

      - if:
          - condition: template
            value_template: "{{ notify_override_effective and trigger.id == 'override_ended' }}"
        then:
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_override_header | trim %}
                {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Override Ended') }}
              message: >
                {% set body_tpl = tpl_override_ended_body | trim %}
                {% set body_base = body_tpl if body_tpl else "Override in {{ room_name }} has ended. Resuming scheduled heating. Current: {{ room_temp }}°C." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ target_temp }}', (target_temperature | string)) }}

      - if:
          - condition: template
            value_template: >
              {{ vacation_active and
                 is_state(sha_vacation_notified, 'off') }}
        then:
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_vacation_notified }}"

      - if:
          - condition: template
            value_template: >
              {{ not vacation_active and
                 is_state(sha_vacation_notified, 'on') }}
        then:
          - action: switch.turn_off
            target:
              entity_id: "{{ sha_vacation_notified }}"


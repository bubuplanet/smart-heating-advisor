# ============================================================
# SHA - End of Day Notification
# ============================================================
# Replace ROOM with your room prefix.
# ============================================================

alias: "ROOM - Heating Off for the Night"
description: Notifies when heating stops for the night
triggers:
  - trigger: time
    at: "23:00:00"
conditions:
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
actions:
  - action: notify.notify
    data:
      title: "🌙 Heating Off for the Night"
      message: >
        Heating stopped for the night.
        Current room: {{ states('sensor.ROOM_thermostat_temperature') }}°C.
mode: single
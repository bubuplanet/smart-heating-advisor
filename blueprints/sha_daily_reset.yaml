blueprint:
  name: "Smart Heating Advisor - Daily Reset"
  description: >
    Resets all Smart Heating Advisor boolean flags at midnight
    and again at the pre-heat window start time. Ensures flags
    never get stuck across days. Runs every day including weekends.
  domain: automation
  input:
    reset_time_1:
      name: First Reset Time
      description: Usually midnight
      default: "00:00:00"
      selector:
        time:

    reset_time_2:
      name: Second Reset Time
      description: Usually just before pre-heat starts (e.g. 03:00)
      default: "03:00:00"
      selector:
        time:

    room_notified_boolean:
      name: Room Target Notified Boolean
      selector:
        entity:
          domain: input_boolean

    towel_notified_boolean:
      name: Towel Target Notified Boolean
      selector:
        entity:
          domain: input_boolean

    mode_preheat_boolean:
      name: Mode Preheat Boolean
      selector:
        entity:
          domain: input_boolean

    mode_maintain_boolean:
      name: Mode Maintain Boolean
      selector:
        entity:
          domain: input_boolean

    mode_standby_boolean:
      name: Mode Standby Boolean
      selector:
        entity:
          domain: input_boolean

    override_boolean:
      name: Override Boolean Helper
      selector:
        entity:
          domain: input_boolean

    window_notified_boolean:
      name: Window Notified Boolean
      selector:
        entity:
          domain: input_boolean

    automation_running_boolean:
      name: Automation Running Boolean
      selector:
        entity:
          domain: input_boolean

triggers:
  - trigger: time
    at: !input reset_time_1
  - trigger: time
    at: !input reset_time_2

actions:
  - action: input_boolean.turn_off
    target:
      entity_id:
        - !input room_notified_boolean
        - !input towel_notified_boolean
        - !input mode_preheat_boolean
        - !input mode_maintain_boolean
        - !input mode_standby_boolean
        - !input override_boolean
        - !input window_notified_boolean
        - !input automation_running_boolean

mode: single
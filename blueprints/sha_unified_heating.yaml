blueprint:
  name: "Smart Heating Advisor - Unified Room Heating"
  author: bubuplanet
  description: |
    🌡️ Unified room heating control powered by Smart Heating AI.

    ✨ Features
    - 🤖 AI-driven pre-heat: timing calculated from room temp, heating rate & weather
    - 📅 Up to 5 schedule slots — each with its own target temperature
    - 🔥 Fixed-temperature TRVs (towel rails / floor heating) — or let AI set them
    - 🏖️ Optional vacation handling via calendar keyword
    - 🪟 Window & door airing detection with configurable reaction delays
    - ✋ Manual override with automatic resume

    🛠️ Before you start — create these helpers once per room:
    1. Schedule helpers — Settings → Helpers → Schedule (one or more)
       Each gives you a full weekly planner with unlimited time slots.
    2. Heating Rate Number — Settings → Helpers → Number
       Range 0.05 – 0.30, step 0.01, initial value 0.15.
       The Smart Heating AI will calibrate this automatically over time.
    3. Automation Guard Toggle — Settings → Helpers → Toggle
       Used to prevent the automation from triggering its own override.
    4. Override Timer — Settings → Helpers → Timer
    5. (Optional) Airing Mode Toggle — Settings → Helpers → Toggle
       Only needed if you use window/door sensors.

    📝 Notes
    - Create one automation instance per room.
    - Schedule 1 is mandatory. Schedules 2–5 must be enabled individually.
    - Each schedule has its own target comfort temperature.
    - When no schedule is active, the configurable default mode applies.
    - Pre-heat time is calculated dynamically — no manual pre-heat setting needed.
  source_url: https://github.com/bubuplanet/smart-heating-advisor/blob/master/blueprints/sha_unified_heating.yaml
  domain: automation
  input:
    room_section:
      name: "Room & Thermostats"
      icon: mdi:radiator
      input:
        room_name:
          name: Room Name
          description: e.g. Bathroom, Parents, Office
          default: Room
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        heating_rate_helper:
          name: Heating Rate Helper
          description: |
            input_number helper the Smart Heating AI writes to (°C/min).
            Create it in Settings → Helpers → Number with:
            Min: 0.05 — Max: 0.30 — Step: 0.01 — Initial: 0.15
            The AI calibrates this value automatically over time.
          selector:
            entity:
              filter:
                - domain: input_number

        schedule_trvs:
          name: Schedule TRVs
          description: >-
            TRVs that follow the calculated room target temperature.
            These are set to the schedule target temperature during active schedules
            and to the default temperature outside of them.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trvs:
          name: Fixed-Temperature TRVs
          description: >-
            Optional. TRVs that heat to a fixed setpoint regardless of the schedule
            (e.g. towel rail, floor heating).
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trv_temperature:
          name: Fixed TRV Temperature
          description: >-
            Temperature applied to fixed TRVs when heating is active.
            Set to 0 to let the Smart Heating AI determine the temperature.
            Has no effect if no fixed TRVs are selected above.
          default: 0
          selector:
            number:
              min: 0
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedule_1_section:
      name: "📅 Schedule 1 — Primary"
      icon: mdi:clock-outline
      input:
        schedule_1:
          name: Schedule 1 — Schedule Helper
          description: >-
            Select the Schedule helper for this slot.
            Create it in Settings → Helpers → Schedule.
          selector:
            entity:
              filter:
                - domain: schedule

        schedule_1_temp:
          name: Schedule 1 — Target Temperature
          description: The room temperature to maintain during this schedule.
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    schedule_2_section:
      name: "📅 Schedule 2 — Optional"
      icon: mdi:clock-outline
      collapsed: true
      input:
        schedule_2_enabled:
          name: Enable Schedule 2
          default: false
          selector:
            boolean:

        schedule_2:
          name: Schedule 2 — Schedule Helper
          description: Select only when Schedule 2 is enabled above.
          default:
          selector:
            entity:
              filter:
                - domain: schedule

        schedule_2_temp:
          name: Schedule 2 — Target Temperature
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    schedule_3_section:
      name: "📅 Schedule 3 — Optional"
      icon: mdi:clock-outline
      collapsed: true
      input:
        schedule_3_enabled:
          name: Enable Schedule 3
          default: false
          selector:
            boolean:

        schedule_3:
          name: Schedule 3 — Schedule Helper
          description: Select only when Schedule 3 is enabled above.
          default:
          selector:
            entity:
              filter:
                - domain: schedule

        schedule_3_temp:
          name: Schedule 3 — Target Temperature
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    schedule_4_section:
      name: "📅 Schedule 4 — Optional"
      icon: mdi:clock-outline
      collapsed: true
      input:
        schedule_4_enabled:
          name: Enable Schedule 4
          default: false
          selector:
            boolean:

        schedule_4:
          name: Schedule 4 — Schedule Helper
          description: Select only when Schedule 4 is enabled above.
          default:
          selector:
            entity:
              filter:
                - domain: schedule

        schedule_4_temp:
          name: Schedule 4 — Target Temperature
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    schedule_5_section:
      name: "📅 Schedule 5 — Optional"
      icon: mdi:clock-outline
      collapsed: true
      input:
        schedule_5_enabled:
          name: Enable Schedule 5
          default: false
          selector:
            boolean:

        schedule_5:
          name: Schedule 5 — Schedule Helper
          description: Select only when Schedule 5 is enabled above.
          default:
          selector:
            entity:
              filter:
                - domain: schedule

        schedule_5_temp:
          name: Schedule 5 — Target Temperature
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

    default_section:
      name: "Default (No Active Schedule)"
      icon: mdi:thermostat-auto
      collapsed: true
      input:
        default_hvac_mode:
          name: Default Heating Mode
          description: >-
            What to do when no schedule is currently active.
            Heat maintains the default temperature at all times.
            Off disables heating completely outside of schedule windows.
          default: heat
          selector:
            select:
              options:
                - label: Heat (always maintain default temperature)
                  value: heat
                - label: Off (no heating outside schedules)
                  value: "off"

        default_temp:
          name: Default Temperature
          description: >-
            Temperature to maintain when no schedule is active and Default
            Heating Mode is set to Heat.
          default: 17
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    window_section:
      name: Window & Door Detection
      icon: mdi:door
      collapsed: true
      input:
        window_sensors:
          name: Window & Door Sensors
          description: |
            Optional. Select binary_sensor or sensor entities for windows and doors.
            When any sensor is open for at least the reaction time below, heating is paused.
            Leave empty if you have no window/door sensors in this room.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
                - domain: sensor
              multiple: true

        window_airing_boolean:
          name: Window Airing Mode Boolean
          description: |
            Required when using window sensors.
            Create a Toggle helper in Settings → Helpers → Toggle (e.g. "Bedroom Airing Mode").
            The automation uses this to track whether airing is currently active.
            Leave empty if you have no window sensors.
          default:
          selector:
            entity:
              filter:
                - domain: input_boolean
              multiple: false

        window_open_reaction_time:
          name: Open Reaction Time
          description: >-
            How long a window must stay open before heating is paused.
            Set to 0 seconds to pause heating immediately when any window opens.
          default:
            hours: 0
            minutes: 30
            seconds: 0
          selector:
            duration:

        window_close_reaction_time:
          name: Close Reaction Time
          description: >-
            How long after all windows are closed before heating resumes.
            Set to 0 seconds to resume immediately.
          default:
            hours: 0
            minutes: 0
            seconds: 30
          selector:
            duration:

        window_open_temperature:
          name: Window Open Temperature
          description: >-
            Temperature to set TRVs to while a window is open.
            Set to 0 to turn TRVs fully off (if supported) during airing.
            Use a low value like 5°C for frost protection instead of fully off.
          default: 0
          selector:
            number:
              min: 0
              max: 15
              step: 1
              unit_of_measurement: "°C"

    vacation_section:
      name: Vacation
      icon: mdi:calendar
      collapsed: true
      input:
        vacation_enabled:
          name: Enable Vacation Mode
          description: >-
            When disabled, the calendar is never checked and heating follows
            the normal schedule.
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          description: Calendar entity that contains your vacation events.
          default: calendar.home
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title prefix that enables vacation mode.
          default: VACATION
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          description: Off disables heating. Frost keeps a low anti-freeze target.
          default: "off"
          selector:
            select:
              options:
                - label: Off (no heating)
                  value: "off"
                - label: Frost protection
                  value: "frost"

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior = Frost protection.
          default: 8
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    override_section:
      name: Manual Override
      icon: mdi:hand-back-right
      collapsed: true
      input:
        override_timer:
          name: Override Timer Helper
          description: Timer used to block automation after manual TRV changes.
          selector:
            entity:
              filter:
                - domain: timer

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change (up to 24 hours).
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        automation_guard_boolean:
          name: Automation Guard Boolean
          description: Set by automation to ignore its own TRV writes.
          selector:
            entity:
              filter:
                - domain: input_boolean

    notifications_section:
      name: Notifications
      icon: mdi:message-text
      collapsed: true
      input:
        send_notifications:
          name: Send Notifications
          default: true
          selector:
            boolean:

trigger:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  # Immediate response when the mandatory schedule changes state
  - trigger: state
    entity_id: !input schedule_1
    id: schedule_changed

  # Window/door reaction-time triggers
  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    for: !input window_close_reaction_time
    id: window_airing_end

  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input override_timer
    id: override_ended

variables:
  room_name: !input room_name
  temperature_sensor: !input temperature_sensor
  heating_rate_helper: !input heating_rate_helper
  schedule_trvs: !input schedule_trvs
  fixed_trvs: !input fixed_trvs
  fixed_trv_temperature: !input fixed_trv_temperature
  schedule_1: !input schedule_1
  schedule_1_temp: !input schedule_1_temp
  schedule_2_enabled: !input schedule_2_enabled
  schedule_2: !input schedule_2
  schedule_2_temp: !input schedule_2_temp
  schedule_3_enabled: !input schedule_3_enabled
  schedule_3: !input schedule_3
  schedule_3_temp: !input schedule_3_temp
  schedule_4_enabled: !input schedule_4_enabled
  schedule_4: !input schedule_4
  schedule_4_temp: !input schedule_4_temp
  schedule_5_enabled: !input schedule_5_enabled
  schedule_5: !input schedule_5
  schedule_5_temp: !input schedule_5_temp
  default_hvac_mode: !input default_hvac_mode
  default_temp: !input default_temp
  window_sensors: !input window_sensors
  window_airing_boolean: !input window_airing_boolean
  window_open_temp: !input window_open_temperature
  override_timer: !input override_timer
  override_minutes: !input override_minutes
  automation_guard_boolean: !input automation_guard_boolean
  send_notifications: !input send_notifications
  vacation_enabled: !input vacation_enabled
  vacation_calendar: !input vacation_calendar
  vacation_keyword: !input vacation_keyword
  vacation_mode: !input vacation_mode
  vacation_temperature: !input vacation_temperature

  room_temp: "{{ states(temperature_sensor) | float(18) }}"
  heating_rate: "{{ states(heating_rate_helper) | float(0.15) }}"

  # --- Comfort: which schedule is currently ON? Returns its target temp or -1 ---
  schedule_comfort_temp: >
    {% if is_state(schedule_1, 'on') %}
      {{ schedule_1_temp | float }}
    {% elif schedule_2_enabled and schedule_2 and is_state(schedule_2, 'on') %}
      {{ schedule_2_temp | float }}
    {% elif schedule_3_enabled and schedule_3 and is_state(schedule_3, 'on') %}
      {{ schedule_3_temp | float }}
    {% elif schedule_4_enabled and schedule_4 and is_state(schedule_4, 'on') %}
      {{ schedule_4_temp | float }}
    {% elif schedule_5_enabled and schedule_5 and is_state(schedule_5, 'on') %}
      {{ schedule_5_temp | float }}
    {% else %}
      {{ -1 }}
    {% endif %}

  in_comfort: "{{ schedule_comfort_temp | float(-1) >= 0 }}"

  # --- Pre-heat: which schedule will turn ON soon? Returns its target temp or -1 ---
  # Time needed = (target - current) / heating_rate minutes (AI-calibrated)
  schedule_preheat_temp: >
    {% if in_comfort %}
      {{ -1 }}
    {% else %}
      {% set ns = namespace(result=-1) %}
      {% if is_state(schedule_1, 'off') and ns.result < 0 %}
        {% set nev = state_attr(schedule_1, 'next_event') %}
        {% if nev %}
          {% set mins = [((schedule_1_temp | float - room_temp) / heating_rate) | int(30), 1] | max %}
          {% if 0 <= (as_datetime(nev) - now()).total_seconds() <= mins * 60 %}
            {% set ns.result = schedule_1_temp | float %}
          {% endif %}
        {% endif %}
      {% endif %}
      {% if schedule_2_enabled and schedule_2 and is_state(schedule_2, 'off') and ns.result < 0 %}
        {% set nev = state_attr(schedule_2, 'next_event') %}
        {% if nev %}
          {% set mins = [((schedule_2_temp | float - room_temp) / heating_rate) | int(30), 1] | max %}
          {% if 0 <= (as_datetime(nev) - now()).total_seconds() <= mins * 60 %}
            {% set ns.result = schedule_2_temp | float %}
          {% endif %}
        {% endif %}
      {% endif %}
      {% if schedule_3_enabled and schedule_3 and is_state(schedule_3, 'off') and ns.result < 0 %}
        {% set nev = state_attr(schedule_3, 'next_event') %}
        {% if nev %}
          {% set mins = [((schedule_3_temp | float - room_temp) / heating_rate) | int(30), 1] | max %}
          {% if 0 <= (as_datetime(nev) - now()).total_seconds() <= mins * 60 %}
            {% set ns.result = schedule_3_temp | float %}
          {% endif %}
        {% endif %}
      {% endif %}
      {% if schedule_4_enabled and schedule_4 and is_state(schedule_4, 'off') and ns.result < 0 %}
        {% set nev = state_attr(schedule_4, 'next_event') %}
        {% if nev %}
          {% set mins = [((schedule_4_temp | float - room_temp) / heating_rate) | int(30), 1] | max %}
          {% if 0 <= (as_datetime(nev) - now()).total_seconds() <= mins * 60 %}
            {% set ns.result = schedule_4_temp | float %}
          {% endif %}
        {% endif %}
      {% endif %}
      {% if schedule_5_enabled and schedule_5 and is_state(schedule_5, 'off') and ns.result < 0 %}
        {% set nev = state_attr(schedule_5, 'next_event') %}
        {% if nev %}
          {% set mins = [((schedule_5_temp | float - room_temp) / heating_rate) | int(30), 1] | max %}
          {% if 0 <= (as_datetime(nev) - now()).total_seconds() <= mins * 60 %}
            {% set ns.result = schedule_5_temp | float %}
          {% endif %}
        {% endif %}
      {% endif %}
      {{ ns.result }}
    {% endif %}

  in_preheat: "{{ schedule_preheat_temp | float(-1) >= 0 }}"

  # Airing mode driven by the input_boolean helper (set by reaction-time triggers)
  windows_open: >
    {% if window_airing_boolean %}
      {{ is_state(window_airing_boolean, 'on') }}
    {% else %}
      {{ false }}
    {% endif %}

  vacation_active: >
    {% if not vacation_enabled %}
      {{ false }}
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | string %}
      {% set kw = vacation_keyword | lower %}
      {{ is_state(vacation_calendar, 'on') and message | lower | regex_search('^' ~ kw) }}
    {% endif %}

  override_active: "{{ is_state(override_timer, 'active') }}"

  target_temperature: >
    {% if windows_open and window_open_temp | float > 0 %}
      {{ window_open_temp | float }}
    {% elif vacation_active %}
      {{ iif(vacation_mode == 'frost', vacation_temperature | float, 0) }}
    {% elif in_comfort %}
      {{ schedule_comfort_temp | float }}
    {% elif in_preheat %}
      {{ schedule_preheat_temp | float }}
    {% else %}
      {{ default_temp | float }}
    {% endif %}

  target_mode: >
    {% if windows_open and window_open_temp | float == 0 %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% elif not in_comfort and not in_preheat and default_hvac_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

condition: []

action:
  - choose:
      # --- Window opened long enough: activate airing mode ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ window_airing_boolean is not none and window_airing_boolean | length > 0 }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ window_airing_boolean }}"

      # --- All windows closed long enough: deactivate airing mode ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ window_airing_boolean is not none
                     and window_airing_boolean | length > 0
                     and expand(window_sensors)
                         | selectattr('state', 'in', ['on', 'open'])
                         | list | count == 0 }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ window_airing_boolean }}"

      # --- Manual TRV change: start override timer ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(automation_guard_boolean, 'off') }}"
              - condition: template
                value_template: "{{ not windows_open }}"
            then:
              - action: timer.start
                target:
                  entity_id: !input override_timer
                data:
                  duration: >
                    {% set m = override_minutes | int(120) %}
                    {{ '%02d:%02d:00' | format((m // 60), (m % 60)) }}
              - if:
                  - condition: template
                    value_template: "{{ send_notifications }}"
                then:
                  - action: notify.notify
                    data:
                      title: "Manual Override: {{ room_name }}"
                      message: >
                        Manual TRV change detected in {{ room_name }}.
                        Automation paused for {{ override_minutes }} minutes.

      # --- Override timer still active: skip ---
      - conditions:
          - condition: template
            value_template: "{{ override_active and trigger.id != 'override_ended' and trigger.id != 'manual_override' }}"
        sequence:
          - stop: "Override timer active; skip automation changes."

    default:
      - action: input_boolean.turn_on
        target:
          entity_id: !input automation_guard_boolean

      # --- Schedule TRVs: follow calculated target temperature ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: "off"

          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input schedule_trvs
                data:
                  temperature: "{{ target_temperature | float }}"

      # --- Fixed TRVs: heat to fixed_trv_temperature, or let AI control if set to 0 ---
      - if:
          - condition: template
            value_template: "{{ fixed_trvs | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: "off"

              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' and fixed_trv_temperature | float > 0 }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      temperature: "{{ fixed_trv_temperature | float }}"

              - conditions:
                  - condition: template
                    # fixed_trv_temperature == 0: AI controls temp — only ensure HVAC mode is heat
                    value_template: "{{ target_mode == 'heat' and fixed_trv_temperature | float == 0 }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat

      - action: input_boolean.turn_off
        target:
          entity_id: !input automation_guard_boolean

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' and send_notifications }}"
        then:
          - action: notify.notify
            data:
              title: "Override Ended: {{ room_name }}"
              message: >
                Manual override ended.
                Room temperature is {{ room_temp | round(1) }}°C.
                Schedule control resumed.

mode: queued
max: 10

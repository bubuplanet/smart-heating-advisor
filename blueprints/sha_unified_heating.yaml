blueprint:
  name: "Smart Heating Advisor - Unified Room Heating"
  author: bubuplanet
  description: |
    🌡️ Unified room heating control in one blueprint.

    ✨ Features
    - 📅 Unlimited schedule slots — define any number of daily time windows
    - 🔥 Fixed-temperature TRVs for towel rails or floor heating
    - 🏖️ Vacation handling via calendar keyword
    - 🪟 Window-open heating pause — no heat while any window is open
    - ✋ Manual override with automatic resume

    🛠️ During setup, this blueprint asks for:
    - 🏷️ Room name
    - 🌡️ Room temperature sensor
    - 🪟 Window sensors (heating stops immediately when any window opens)
    - 🔥 Schedule TRVs (follow room target temperature)
    - 📌 Fixed TRVs with their own temperature (e.g. towel rail)
    - 📅 Schedules — define as many slots as you need in YAML
    - 🗓️ Vacation calendar + keyword
    - ⏱️ Override duration (5 min – 24 hours)

    📝 Notes
    - Create one automation instance per room.
    - Each schedule entry specifies its own days, times, and temperatures.
    - Fixed TRVs always heat to their fixed temperature when heating is active.
    - Manual TRV changes pause automation for the override duration.
    - When override ends, schedule control resumes automatically.
  source_url: https://github.com/bubuplanet/smart-heating-advisor/blob/master/blueprints/sha_unified_heating.yaml
  domain: automation
  input:
    basics_section:
      name: Room Basics
      icon: mdi:radiator
      input:
        room_name:
          name: Room Name
          description: Like Bathroom or Parents or Office
          default: Room
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        window_sensors:
          name: Window Sensors
          description: |
            ⚠️ IMPORTANT: While ANY selected window is open ALL TRVs in this room are turned off immediately — regardless of schedule, override, or any other setting.
            Heating resumes automatically once every window is closed again.
            Leave empty if you have no window sensors in this room.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
                  device_class: window
              multiple: true

    trvs_section:
      name: Thermostats / TRVs
      icon: mdi:thermostat
      input:
        schedule_trvs:
          name: Schedule TRVs
          description: >-
            TRVs that follow the calculated room target temperature.
            Target temperature is determined by the active schedule and whether
            we are in pre-heat, comfort, or standby time.
            Select all radiators that heat the room to the comfort setpoint.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trvs:
          name: Fixed Temperature TRVs
          description: >-
            Optional. TRVs that always heat to a fixed temperature when
            the heating window is active (e.g. towel rail, floor heating).
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trv_temperature:
          name: Fixed TRV Temperature
          description: >-
            Temperature applied to fixed TRVs whenever heating is active.
            Has no effect if no fixed TRVs are selected above.
          default: 35
          selector:
            number:
              min: 20
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedules_section:
      name: Schedules
      icon: mdi:clock-outline
      input:
        schedules:
          name: Heating Schedules
          description: |
            Define one or more schedule entries. Each entry specifies which days it applies to plus pre-heat/comfort/standby times and temperatures.

            Fields per entry:
            • days — list of 3-letter abbreviations: mon tue wed thu fri sat sun
            • preheat_start — earliest time pre-heat begins (HH:MM:SS)
            • comfort_start — room should be warm by this time (HH:MM:SS)
            • comfort_end — switches to standby after this time (HH:MM:SS)
            • comfort_temp — target temperature during comfort period (°C)
            • standby_temp — target temperature outside comfort period (°C)

            You can add as many entries as you need (e.g. one per day if required).
          default:
            - days: [mon, tue, wed, thu, fri]
              preheat_start: "05:00:00"
              comfort_start: "06:30:00"
              comfort_end: "08:30:00"
              comfort_temp: 22
              standby_temp: 17
            - days: [sat, sun]
              preheat_start: "08:00:00"
              comfort_start: "09:00:00"
              comfort_end: "11:00:00"
              comfort_temp: 22
              standby_temp: 17
          selector:
            object:

    vacation_section:
      name: Vacation
      icon: mdi:calendar
      collapsed: true
      input:
        vacation_calendar:
          name: Vacation Calendar
          description: Calendar entity that contains your vacation events.
          default: calendar.home
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title prefix that enables vacation mode.
          default: VACATION
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          description: Off disables heating. Frost keeps a low anti-freeze target.
          default: "off"
          selector:
            select:
              options:
                - label: Off (no heating)
                  value: "off"
                - label: Frost protection
                  value: "frost"

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior = Frost protection.
          default: 8
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    override_section:
      name: Manual Override
      icon: mdi:hand-back-right
      collapsed: true
      input:
        override_timer:
          name: Override Timer Helper
          description: Timer used to block automation after manual TRV changes.
          selector:
            entity:
              filter:
                - domain: timer

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change (up to 24 hours).
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        automation_guard_boolean:
          name: Automation Guard Boolean
          description: Set by automation to ignore its own TRV writes.
          selector:
            entity:
              filter:
                - domain: input_boolean

    notifications_section:
      name: Notifications
      icon: mdi:message-text
      collapsed: true
      input:
        send_notifications:
          name: Send Notifications
          default: true
          selector:
            boolean:

trigger:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: state
    entity_id: !input window_sensors
    id: windows_changed

  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input override_timer
    id: override_ended

variables:
  room_name: !input room_name
  temperature_sensor: !input temperature_sensor
  schedule_trvs: !input schedule_trvs
  fixed_trvs: !input fixed_trvs
  fixed_trv_temperature: !input fixed_trv_temperature
  schedules: !input schedules
  vacation_calendar: !input vacation_calendar
  vacation_keyword: !input vacation_keyword
  vacation_mode: !input vacation_mode
  vacation_temperature: !input vacation_temperature
  window_sensors: !input window_sensors
  override_timer: !input override_timer
  override_minutes: !input override_minutes
  automation_guard_boolean: !input automation_guard_boolean
  send_notifications: !input send_notifications

  room_temp: "{{ states(temperature_sensor) | float(0) }}"
  today: "{{ now().strftime('%a') | lower }}"

  # Find whether today matches any schedule entry ('active' or 'none')
  active_schedule: >
    {% set ns = namespace(result='none') %}
    {% for s in schedules %}
      {% if today in s.get('days', []) %}
        {% set ns.result = 'active' %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  # Extract schedule fields for today — fall back to safe defaults if no match
  active_preheat_start: >
    {% set ns = namespace(result='05:00:00') %}
    {% for s in schedules %}
      {% if today in s.get('days', []) %}
        {% set ns.result = s.get('preheat_start', '05:00:00') %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  active_comfort_start: >
    {% set ns = namespace(result='06:30:00') %}
    {% for s in schedules %}
      {% if today in s.get('days', []) %}
        {% set ns.result = s.get('comfort_start', '06:30:00') %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  active_comfort_end: >
    {% set ns = namespace(result='08:30:00') %}
    {% for s in schedules %}
      {% if today in s.get('days', []) %}
        {% set ns.result = s.get('comfort_end', '08:30:00') %}
      {% endif %}
    {% endfor %}
    {{ ns.result }}

  active_comfort_temp: >
    {% set ns = namespace(result=18) %}
    {% for s in schedules %}
      {% if today in s.get('days', []) %}
        {% set ns.result = s.get('comfort_temp', 18) %}
      {% endif %}
    {% endfor %}
    {{ ns.result | float }}

  active_standby_temp: >
    {% set ns = namespace(result=16) %}
    {% for s in schedules %}
      {% if today in s.get('days', []) %}
        {% set ns.result = s.get('standby_temp', 16) %}
      {% endif %}
    {% endfor %}
    {{ ns.result | float }}

  windows_open: >
    {{ expand(window_sensors)
       | selectattr('state', 'in', ['on', 'open'])
       | list
       | count > 0 }}

  vacation_active: >
    {% set message = state_attr(vacation_calendar, 'message') | string %}
    {% set kw = vacation_keyword | lower %}
    {{ is_state(vacation_calendar, 'on') and message | lower | regex_search('^' ~ kw) }}

  override_active: "{{ is_state(override_timer, 'active') }}"

  in_preheat: >
    {% if active_schedule == 'none' %}
      {{ false }}
    {% else %}
      {% set now_t = now() %}
      {% set start = today_at(active_preheat_start | trim) %}
      {% set comfort = today_at(active_comfort_start | trim) %}
      {{ now_t >= start and now_t < comfort }}
    {% endif %}

  in_comfort: >
    {% if active_schedule == 'none' %}
      {{ false }}
    {% else %}
      {% set now_t = now() %}
      {% set start = today_at(active_comfort_start | trim) %}
      {% set stop = today_at(active_comfort_end | trim) %}
      {{ now_t >= start and now_t < stop }}
    {% endif %}

  target_temperature: >
    {% if vacation_active %}
      {{ iif(vacation_mode == 'frost', vacation_temperature | float, 0) }}
    {% elif active_schedule != 'none' and (in_preheat or in_comfort) %}
      {{ active_comfort_temp }}
    {% elif active_schedule != 'none' %}
      {{ active_standby_temp }}
    {% else %}
      16
    {% endif %}

  target_mode: >
    {% if windows_open %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

condition: []

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(automation_guard_boolean, 'off') }}"
              - condition: template
                value_template: "{{ not windows_open }}"
            then:
              - action: timer.start
                target:
                  entity_id: !input override_timer
                data:
                  duration: >
                    {% set m = override_minutes | int(120) %}
                    {{ '%02d:%02d:00' | format((m // 60), (m % 60)) }}
              - if:
                  - condition: template
                    value_template: "{{ send_notifications }}"
                then:
                  - action: notify.notify
                    data:
                      title: "Manual Override: {{ room_name }}"
                      message: >
                        Manual TRV change detected in {{ room_name }}.
                        Automation paused for {{ override_minutes }} minutes.

      - conditions:
          - condition: template
            value_template: "{{ override_active and trigger.id != 'override_ended' and trigger.id != 'manual_override' }}"
        sequence:
          - stop: "Override timer active; skip automation changes."

    default:
      - action: input_boolean.turn_on
        target:
          entity_id: !input automation_guard_boolean

      # --- Schedule TRVs: follow calculated target temperature ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: "off"

          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input schedule_trvs
                data:
                  temperature: "{{ target_temperature | float }}"

      # --- Fixed TRVs: always heat to fixed_trv_temperature when active ---
      - if:
          - condition: template
            value_template: "{{ fixed_trvs | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: "off"

              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      temperature: "{{ fixed_trv_temperature | float }}"

      - action: input_boolean.turn_off
        target:
          entity_id: !input automation_guard_boolean

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' and send_notifications }}"
        then:
          - action: notify.notify
            data:
              title: "Override Ended: {{ room_name }}"
              message: >
                Manual override ended.
                Room temperature is {{ room_temp | round(1) }}°C.
                Schedule control resumed.

mode: queued
max: 10

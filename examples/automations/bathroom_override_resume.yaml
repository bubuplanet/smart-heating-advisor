# ============================================================
# Bathroom - Override Auto Resume
# ============================================================
# Checks every 5 minutes if the 2 hour manual override has
# expired and automatically resumes smart heating.
# Runs 24/7 all week.
# ============================================================

alias: Bathroom - Override Auto Resume
description: Resumes smart heating after 2 hour manual override
triggers:
  - trigger: time_pattern
    minutes: /5
conditions:
  - condition: state
    entity_id: input_boolean.bathroom_heating_override
    state: "on"
  - condition: template
    value_template: >
      {{ now() > as_datetime(states('input_datetime.bathroom_override_until')).replace(tzinfo=now().tzinfo) }}
actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.bathroom_heating_override
  - action: notify.notify
    data:
      title: "🔄 Bathroom Automation Resumed"
      message: >
        Manual override ended. Smart heating resumed.
        Current room: {{ states('sensor.bathroom_thermostat_temperature') }}°C.
mode: single
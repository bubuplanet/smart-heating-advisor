blueprint:
  name: "Smart Heating Advisor"
  author: bubuplanet
  description: |
    **version: 0.0.18**

    🌡️ Smart Heating Advisor — Unified Room Heating Blueprint

    This blueprint requires the Smart Heating Advisor (SHA) HACS integration.
    It provides AI-powered heating rate calibration based on your room's
    historical data and outside weather conditions — delivering a self-improving
    smart heating system that gets more accurate over time.

    ✨ Features
    - ⏱️ Smart pre-heat: timing calculated from room temp + heating rate
    - 📅 Unlimited schedules — configured once in the SHA integration
    - 🌡️ Per-schedule target temperature — encoded in the schedule name (e.g. "Morning Shower 26C")
    - 🔥 Optional fixed-temperature radiator thermostat (towel rails, floor heating, etc.)
    - 🏖️ Vacation mode — configured once in SHA integration settings
    - 🪟 Window & door detection — configured once per room in SHA integration
    - ✋ Manual override switch — toggle switch.sha_ROOM_override
    - 🤖 AI heating rate calibration — auto-adjusted daily by SHA

    📝 Schedule naming convention
    Name each Schedule helper with the target temperature at the end:
      ✅ "Morning Shower 26C"
      ✅ "Evening Bath 28C"
      ✅ "Night Standby 16C"
      ✅ "Weekend 20C"
    The blueprint reads the temperature automatically from the name.
    If no temperature is found in the name, 21°C is used as fallback.

    🛠️ Setup
    Install SHA via HACS, then complete the setup wizard:
    1. Connect Ollama and InfluxDB
    2. Select your rooms from HA Areas
    3. Configure TRVs, schedules, window sensors, and vacation in the integration
    4. SHA creates this automation automatically — just enable it
    5. Vacation mode and all room config is managed centrally in SHA settings

    Required entities (auto-created by SHA):
    - number.sha_ROOM_heating_rate
    - number.sha_ROOM_trv_setpoint
    - switch.sha_ROOM_airing_mode
    - switch.sha_ROOM_override
    - binary_sensor.sha_ROOM_window_open
    - binary_sensor.sha_vacation

  source_url: https://raw.githubusercontent.com/bubuplanet/smart-heating-advisor/main/blueprints/automation/smart_heating_advisor/smart_heating_advisor.yaml
  domain: automation

  input:

    room_id:
      name: Room ID
      description: |
        The SHA room identifier — snake_case version of the room name.
        Examples: bathroom, living_room, alessios_bedroom, office
        This is set automatically when SHA creates the automation.
      default: bathroom
      selector:
        text:


trigger_variables:
  _room_id: !input room_id


triggers:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: event
    event_type: sha_override_ended
    id: override_ended

conditions: []

action:

  - choose:

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'override_ended' and
                 trigger.event.data.get('room_id') != _room_id }}
        sequence:
          - stop: "Override ended for a different room — ignoring."

  # ── Load room config from SHA ──────────────────────────────────────────
  - action: smart_heating_advisor.get_room_config
    data:
      room_id: !input room_id
    response_variable: room_cfg

  # ── Extract config from service response ───────────────────────────────
  - variables:
      room_id:           "{{ room_cfg.room_id }}"
      room_name:         "{{ room_cfg.room_name }}"
      temp_sensor:       "{{ room_cfg.temp_sensor }}"
      trvs:              "{{ room_cfg.trvs }}"
      fixed_trvs:        "{{ room_cfg.fixed_trvs }}"
      fixed_trv_temp:    "{{ room_cfg.fixed_trv_temp | float(30) }}"
      schedules:         "{{ room_cfg.schedules }}"
      default_hvac_mode: "{{ room_cfg.default_hvac_mode }}"
      vacation_mode:     "{{ room_cfg.vacation_mode }}"
      vacation_temp:     "{{ room_cfg.vacation_temp | float(7) }}"

  # ── Live state from SHA entities ───────────────────────────────────────
  - variables:
      room_temp:            "{{ states(temp_sensor) | float(18) }}"
      heating_rate:         "{{ states('number.sha_' ~ room_id ~ '_heating_rate') | float(0.15) }}"
      override_active_bool: "{{ is_state('switch.sha_' ~ room_id ~ '_override', 'on') }}"
      windows_open_bool: >
        {% set _we = 'binary_sensor.sha_' ~ room_id ~ '_window_open' %}
        {{ states(_we) not in ('unavailable', 'unknown', 'none', none) and is_state(_we, 'on') }}
      vacation_active_bool: "{{ is_state('binary_sensor.sha_vacation', 'on') }}"
      default_temp:         "{{ states('number.sha_' ~ room_id ~ '_default_temp') | float(18.0) }}"

  # ── Active schedule ────────────────────────────────────────────────────
  - variables:
      active_schedule: >
        {% set ns = namespace(found=false, temp=0.0, name='') %}
        {% for s in schedules %}
          {% if not ns.found and is_state(s, 'on') %}
            {% set fname = state_attr(s, 'friendly_name') | default('') %}
            {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
            {% set ns.found = true %}
            {% set ns.temp = temps | first | float(21) if temps else 21.0 %}
            {% set ns.name = fname %}
          {% endif %}
        {% endfor %}
        {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name} | tojson }}
      in_comfort_bool:       "{{ (active_schedule | from_json).active | bool(false) }}"
      comfort_temp:          "{{ (active_schedule | from_json).temp | float(0) }}"
      active_schedule_name:  "{{ (active_schedule | from_json).name | default('') }}"
      sha_trv_setpoint: >
        {{ states('number.sha_' ~ room_id ~ '_trv_setpoint')
           | float(comfort_temp) }}

  # ── Pre-heat (needs in_comfort_bool from above) ────────────────────────
  - variables:
      preheat_schedule: >
        {% set ns = namespace(found=false, temp=0.0, name='', mins_needed=0) %}
        {% if not in_comfort_bool %}
          {% for s in schedules %}
            {% if not ns.found and is_state(s, 'off') %}
              {% set fname = state_attr(s, 'friendly_name') | default('') %}
              {% set nev = state_attr(s, 'next_event') %}
              {% if nev %}
                {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
                {% set target_temp = temps | first | float(21) if temps else 21.0 %}
                {% set temp_delta = target_temp - room_temp %}
                {% set mins_needed = [(temp_delta / heating_rate) | int(10), 5] | max %}
                {% set mins_to_start = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
                {% if temp_delta > 0.5 and 0 <= mins_to_start <= mins_needed %}
                  {% set ns.found = true %}
                  {% set ns.temp = target_temp %}
                  {% set ns.name = fname %}
                  {% set ns.mins_needed = mins_needed %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name, 'mins_needed': ns.mins_needed} | tojson }}
      in_preheat_bool:        "{{ (preheat_schedule | from_json).active | bool(false) }}"
      preheat_temp:           "{{ (preheat_schedule | from_json).temp | float(0) }}"
      preheat_schedule_name:  "{{ (preheat_schedule | from_json).name | default('') }}"
      preheat_schedule_mins:  "{{ (preheat_schedule | from_json).mins_needed | int(10) }}"

  # ── Target temp / mode (needs in_comfort_bool, in_preheat_bool) ────────
  - variables:
      target_temperature: >
        {% if vacation_active_bool and vacation_mode in ['frost', 'eco'] %}
          {{ [vacation_temp | float, 4.0] | max }}
        {% elif in_comfort_bool %}
          {{ [comfort_temp | float, 4.0] | max }}
        {% elif in_preheat_bool %}
          {{ [preheat_temp | float, 4.0] | max }}
        {% else %}
          {{ [default_temp | float, 4.0] | max }}
        {% endif %}

      target_mode: >
        {% if windows_open_bool %}
          off
        {% elif vacation_active_bool and vacation_mode == 'off' %}
          off
        {% elif not in_comfort_bool and not in_preheat_bool and default_hvac_mode == 'off' %}
          off
        {% else %}
          heat
        {% endif %}

      target_reached: "{{ in_comfort_bool and room_temp >= (comfort_temp - 0.3) }}"

      main_trv_setpoint: >
        {% if vacation_active_bool and vacation_mode in ['frost', 'eco'] %}
          {{ [vacation_temp | float, 4.0] | max }}
        {% elif in_comfort_bool or in_preheat_bool %}
          {{ [sha_trv_setpoint | float, 4.0] | max }}
        {% else %}
          {{ [default_temp | float, 4.0] | max }}
        {% endif %}

  # ── Dispatch ───────────────────────────────────────────────────────────
  - choose:

      - conditions:
          - condition: template
            value_template: >
              {{ override_active_bool and trigger.id != 'override_ended' }}
        sequence:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] Control loop skipped — override active.
                Room: {{ room_temp | round(1) }}°C
              level: debug
              logger: custom_components.smart_heating_advisor
          - stop: "Override active — skipping control loop."

    default:

      - action: system_log.write
        data:
          message: |
            {%- set _scheds = schedules | select('match', '.+') | list -%}
            {%- set _ns = namespace(slines=[]) -%}
            {%- for s in _scheds -%}
              {%- set _nev = state_attr(s, 'next_event') -%}
              {%- set _nev_str = (_nev | string)[:16] if _nev else '—' -%}
              {%- set _ns.slines = _ns.slines + ['  ' ~ s ~ ': ' ~ states(s) | upper ~ ' (next: ' ~ _nev_str ~ ')'] -%}
            {%- endfor -%}
            SHA [{{ room_name }}] ─── Control loop ──────────────────────────────────────
            Room: {{ room_temp | round(1) }}°C
            Mode: {{ target_mode | upper }}  Target: {{ target_temperature | round(1) }}°C
            Schedules ({{ _scheds | count }}):
            {{ _ns.slines | join('\n') }}
            Active now: {{ active_schedule_name if in_comfort_bool else ('Pre-heating for ' ~ preheat_schedule_name if in_preheat_bool else 'none') }}
            Pre-heat: {{ 'yes — ' ~ preheat_schedule_mins ~ ' min needed' if in_preheat_bool else 'no' }}
            Override: {{ 'yes' if override_active_bool else 'no' }}
            Windows: {{ 'open' if windows_open_bool else 'closed' }}
            Vacation: {{ 'yes (' ~ vacation_mode ~ ')' if vacation_active_bool else 'no' }}
            Heating rate: {{ heating_rate }}°C/min
            ──────────────────────────────────────────────────────────────────────────────
          level: debug
          logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: >
              {% if in_preheat_bool or in_comfort_bool %}
                {{ false }}
              {% else %}
                {% set ns = namespace(found=false) %}
                {% for s in schedules if s != '' and is_state(s, 'off') %}
                  {% set nev = state_attr(s, 'next_event') %}
                  {% if nev and not ns.found %}
                    {% set m = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
                    {% if 0 <= m <= 60 %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.found }}
              {% endif %}
        then:
          - action: system_log.write
            data:
              message: |
                {%- set ns = namespace(mins=9999, name='', temp=0.0) -%}
                {%- for s in schedules if s != '' and is_state(s, 'off') -%}
                  {%- set nev = state_attr(s, 'next_event') -%}
                  {%- if nev -%}
                    {%- set m = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) -%}
                    {%- if 0 <= m <= 60 and m < ns.mins -%}
                      {%- set fname = state_attr(s, 'friendly_name') | default('') -%}
                      {%- set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) -%}
                      {%- set ns.mins = m -%}
                      {%- set ns.name = fname -%}
                      {%- set ns.temp = temps | first | float(21) if temps else 21.0 -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set gap = (ns.temp - room_temp) | round(1) -%}
                {%- set mins_needed = [(gap / heating_rate) | int(10), 5] | max if gap > 0.5 else 0 -%}
                SHA [{{ room_name }}] Pre-heat countdown — {{ ns.mins }} min to schedule start
                Schedule: "{{ ns.name }}"
                Target: {{ ns.temp }}°C  Room now: {{ room_temp | round(1) }}°C  Gap: {{ gap }}°C
                Heating rate: {{ heating_rate }}°C/min  Est. pre-heat needed: {{ mins_needed }} min
                Status: {{ 'no pre-heat needed (room warm enough)' if gap <= 0.5 else ('overdue — pre-heat was due at ' ~ (now() - timedelta(minutes=(mins_needed - ns.mins))).strftime('%H:%M') if ns.mins < mins_needed else 'Pre-heat will start at: ' ~ (now() + timedelta(minutes=(ns.mins - mins_needed))).strftime('%H:%M')) }}
              level: info
              logger: custom_components.smart_heating_advisor

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ trvs }}"
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ trvs }}"
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: "{{ trvs }}"
                data:
                  temperature: "{{ main_trv_setpoint | float }}"
              - if:
                  - condition: template
                    value_template: >
                      {{ fixed_trvs | list | count > 0 }}
                then:
                  - action: system_log.write
                    data:
                      message: |
                        SHA [{{ room_name }}] Fixed TRV — commanding heat (control loop)
                        Phase: {{ 'comfort' if in_comfort_bool else ('pre-heat' if in_preheat_bool else 'default') }}
                        Target: {{ fixed_trv_temp | float(30) }}°C
                        Entities: {{ fixed_trvs }}
                      level: info
                      logger: custom_components.smart_heating_advisor
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      temperature: "{{ fixed_trv_temp | float(30) }}"

      - if:
          - condition: template
            value_template: "{{ fixed_trvs | list | count > 0 and target_mode == 'off' }}"
        then:
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ fixed_trvs }}"
            data:
              hvac_mode: "off"

      - if:
          - condition: template
            value_template: "{{ in_preheat_bool and not windows_open_bool }}"
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] PRE-HEAT STARTED
                Schedule: "{{ preheat_schedule_name }}"
                Comfort target: {{ preheat_temp }}°C
                TRV setpoint: {{ sha_trv_setpoint | round(1) }}°C (SHA learned)
                Room now: {{ room_temp | round(1) }}°C
                Gap to close: {{ (preheat_temp - room_temp) | round(1) }}°C
                Heating rate: {{ heating_rate }}°C/min
                Estimated time needed: {{ preheat_schedule_mins }} min
                TRVs commanding: {{ trvs }}
                Fixed TRVs: {{ fixed_trvs if fixed_trvs | list | count > 0 else 'none' }}
              level: info
              logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' }}"
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] OVERRIDE ENDED — RESUMING
                Room: {{ room_temp | round(1) }}°C
                Resuming: {{ 'comfort phase' if in_comfort_bool else ('pre-heat' if in_preheat_bool else 'standby') }}
                Target: {{ target_temperature | round(1) }}°C
                Mode: {{ target_mode | upper }}
              level: info
              logger: custom_components.smart_heating_advisor


mode: queued
max: 10

blueprint:
  name: "Smart Heating Advisor - Unified Room Heating"
  author: bubuplanet
  description: |
    🌡️ Unified room heating control in one blueprint.

    ✨ Features
    - 📅 Uses native HA Schedule helpers — full weekly UI, unlimited slots
    - 🔥 Fixed-temperature TRVs for towel rails or floor heating
    - 🏖️ Optional vacation handling via calendar keyword
    - 🪟 Window & door airing detection with configurable reaction delays
    - ✋ Manual override with automatic resume

    🛠️ Before you start
    1. Create one or more Schedule helpers in Settings → Helpers → Schedule.
       Each gives you a full weekly planner with as many time slots as you need.
    2. If you use window/door sensors, also create one input_boolean helper per room
       (Settings → Helpers → Toggle) — the automation uses it to track airing state.

    📝 Notes
    - Create one automation instance per room.
    - Heating runs at comfort temperature whenever any selected schedule is active.
    - Pre-heat starts before the schedule so the room is warm on time.
    - When a window opens, heating only stops after the configured reaction delay.
      If the window is closed again within that delay, heating is never interrupted.
    - Manual TRV changes pause automation for the override duration.
    - When override ends, schedule control resumes automatically.
  source_url: https://github.com/bubuplanet/smart-heating-advisor/blob/master/blueprints/sha_unified_heating.yaml
  domain: automation
  input:
    basics_section:
      name: Room Basics
      icon: mdi:radiator
      input:
        room_name:
          name: Room Name
          description: Like Bathroom or Parents or Office
          default: Room
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

    trvs_section:
      name: Thermostats / TRVs
      icon: mdi:thermostat
      input:
        schedule_trvs:
          name: Schedule TRVs
          description: >-
            TRVs that follow the calculated room target temperature.
            Comfort temperature when a schedule is active, standby otherwise.
            Select all radiators that heat the room to the comfort setpoint.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trvs:
          name: Fixed Temperature TRVs
          description: >-
            Optional. TRVs that always heat to a fixed temperature when
            heating is active (e.g. towel rail, floor heating).
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trv_temperature:
          name: Fixed TRV Temperature
          description: >-
            Temperature applied to fixed TRVs whenever heating is active.
            Has no effect if no fixed TRVs are selected above.
          default: 35
          selector:
            number:
              min: 20
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedule_section:
      name: Schedules
      icon: mdi:clock-outline
      input:
        schedules:
          name: Heating Schedules
          description: |
            Select one or more Schedule helpers.
            Create them in Settings → Helpers → Schedule — each gives you a full
            weekly planner where you can add as many time slots as you need.
            Heating is active when ANY of the selected schedules is on.
          default: []
          selector:
            entity:
              filter:
                - domain: schedule
              multiple: true

        preheat_minutes:
          name: Pre-Heat Time
          description: >-
            Start heating this many minutes before the schedule turns on so the
            room is already warm when the comfort window begins.
            Set to 0 to disable pre-heating.
          default: 30
          selector:
            number:
              min: 0
              max: 120
              step: 5
              unit_of_measurement: min

        comfort_temp:
          name: Comfort Temperature
          description: Target temperature when a schedule is active (or during pre-heat).
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

        standby_temp:
          name: Standby Temperature
          description: Target temperature when no schedule is active.
          default: 17
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    window_section:
      name: Window & Door Detection
      icon: mdi:door
      collapsed: true
      input:
        window_sensors:
          name: Window & Door Sensors
          description: |
            Optional. Select binary_sensor or sensor entities for windows and doors.
            When any sensor is open for at least the reaction time below, heating is paused.
            Leave empty if you have no window/door sensors in this room.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
                - domain: sensor
              multiple: true

        window_airing_boolean:
          name: Window Airing Mode Boolean
          description: |
            Required when using window sensors.
            Create a Toggle helper in Settings → Helpers → Toggle (e.g. "Bedroom Airing Mode").
            The automation uses this to track whether airing is currently active.
            Leave empty if you have no window sensors.
          default: []
          selector:
            entity:
              filter:
                - domain: input_boolean
              multiple: false

        window_open_reaction_time:
          name: Open Reaction Time
          description: >-
            How long a window must stay open before heating is paused.
            Use this to avoid stopping heating for very brief opens (e.g. grabbing something).
            Set to 0 seconds to pause heating immediately when any window opens.
          default:
            hours: 0
            minutes: 30
            seconds: 0
          selector:
            duration:

        window_close_reaction_time:
          name: Close Reaction Time
          description: >-
            How long after all windows are closed before heating resumes.
            Useful to let fresh air dissipate before the room heats up again.
            Set to 0 seconds to resume heating immediately when every window closes.
          default:
            hours: 0
            minutes: 0
            seconds: 30
          selector:
            duration:

        window_open_temperature:
          name: Window Open Temperature
          description: >-
            Temperature to set TRVs to while a window is open.
            Set to 0 to turn TRVs fully off (if supported) during airing.
            Use a low value like 5°C for frost protection instead of fully off.
          default: 0
          selector:
            number:
              min: 0
              max: 15
              step: 1
              unit_of_measurement: "°C"

    vacation_section:
      name: Vacation
      icon: mdi:calendar
      collapsed: true
      input:
        vacation_enabled:
          name: Enable Vacation Mode
          description: >-
            When disabled, the calendar is never checked and heating follows
            the normal schedule.
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          description: Calendar entity that contains your vacation events.
          default: calendar.home
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title prefix that enables vacation mode.
          default: VACATION
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          description: Off disables heating. Frost keeps a low anti-freeze target.
          default: "off"
          selector:
            select:
              options:
                - label: Off (no heating)
                  value: "off"
                - label: Frost protection
                  value: "frost"

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior = Frost protection.
          default: 8
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    override_section:
      name: Manual Override
      icon: mdi:hand-back-right
      collapsed: true
      input:
        override_timer:
          name: Override Timer Helper
          description: Timer used to block automation after manual TRV changes.
          selector:
            entity:
              filter:
                - domain: timer

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change (up to 24 hours).
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        automation_guard_boolean:
          name: Automation Guard Boolean
          description: Set by automation to ignore its own TRV writes.
          selector:
            entity:
              filter:
                - domain: input_boolean

    notifications_section:
      name: Notifications
      icon: mdi:message-text
      collapsed: true
      input:
        send_notifications:
          name: Send Notifications
          default: true
          selector:
            boolean:

trigger:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: state
    entity_id: !input schedules
    id: schedule_changed

  # Fires only after a window/door has been open for the full reaction time.
  # If it closes before the delay expires the trigger is cancelled automatically.
  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  # Fires once all windows have been closed for the full reaction time.
  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    for: !input window_close_reaction_time
    id: window_airing_end

  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input override_timer
    id: override_ended

variables:
  room_name: !input room_name
  temperature_sensor: !input temperature_sensor
  schedule_trvs: !input schedule_trvs
  fixed_trvs: !input fixed_trvs
  fixed_trv_temperature: !input fixed_trv_temperature
  schedules: !input schedules
  preheat_minutes: !input preheat_minutes
  comfort_temp: !input comfort_temp
  standby_temp: !input standby_temp
  window_sensors: !input window_sensors
  window_airing_boolean: !input window_airing_boolean
  window_open_temp: !input window_open_temperature
  override_timer: !input override_timer
  override_minutes: !input override_minutes
  automation_guard_boolean: !input automation_guard_boolean
  send_notifications: !input send_notifications
  vacation_enabled: !input vacation_enabled
  vacation_calendar: !input vacation_calendar
  vacation_keyword: !input vacation_keyword
  vacation_mode: !input vacation_mode
  vacation_temperature: !input vacation_temperature

  room_temp: "{{ states(temperature_sensor) | float(0) }}"

  # Airing mode is on when the window_airing_boolean helper is on.
  # The helper is set/cleared by the reaction-time triggers below.
  # When no airing boolean is configured, windows_open is always false.
  windows_open: >
    {% if window_airing_boolean %}
      {{ is_state(window_airing_boolean, 'on') }}
    {% else %}
      {{ false }}
    {% endif %}

  # True when ANY selected schedule is currently active
  in_comfort: >
    {{ expand(schedules) | selectattr('state', 'eq', 'on') | list | count > 0 }}

  # True when ANY schedule will turn on within preheat_minutes and is currently off
  in_preheat: >
    {% if preheat_minutes <= 0 or in_comfort %}
      {{ false }}
    {% else %}
      {% set threshold = preheat_minutes * 60 %}
      {% set ns = namespace(found=false) %}
      {% for s in expand(schedules) %}
        {% if s.state == 'off' %}
          {% set next_ev = s.attributes.get('next_event') %}
          {% if next_ev %}
            {% set secs_until = (as_datetime(next_ev) - now()).total_seconds() %}
            {% if 0 <= secs_until <= threshold %}
              {% set ns.found = true %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.found }}
    {% endif %}

  vacation_active: >
    {% if not vacation_enabled %}
      {{ false }}
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | string %}
      {% set kw = vacation_keyword | lower %}
      {{ is_state(vacation_calendar, 'on') and message | lower | regex_search('^' ~ kw) }}
    {% endif %}

  override_active: "{{ is_state(override_timer, 'active') }}"

  target_temperature: >
    {% if windows_open and window_open_temp | float > 0 %}
      {{ window_open_temp | float }}
    {% elif vacation_active %}
      {{ iif(vacation_mode == 'frost', vacation_temperature | float, 0) }}
    {% elif in_comfort or in_preheat %}
      {{ comfort_temp | float }}
    {% else %}
      {{ standby_temp | float }}
    {% endif %}

  target_mode: >
    {% if windows_open and window_open_temp | float == 0 %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

condition: []

action:
  - choose:
      # --- Window opened long enough: activate airing mode ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ window_airing_boolean | length > 0 }}"
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ window_airing_boolean }}"

      # --- All windows closed long enough: deactivate airing mode ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ window_airing_boolean | length > 0
                     and expand(window_sensors)
                         | selectattr('state', 'in', ['on', 'open'])
                         | list | count == 0 }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ window_airing_boolean }}"

      # --- Manual TRV change: start override timer ---
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(automation_guard_boolean, 'off') }}"
              - condition: template
                value_template: "{{ not windows_open }}"
            then:
              - action: timer.start
                target:
                  entity_id: !input override_timer
                data:
                  duration: >
                    {% set m = override_minutes | int(120) %}
                    {{ '%02d:%02d:00' | format((m // 60), (m % 60)) }}
              - if:
                  - condition: template
                    value_template: "{{ send_notifications }}"
                then:
                  - action: notify.notify
                    data:
                      title: "Manual Override: {{ room_name }}"
                      message: >
                        Manual TRV change detected in {{ room_name }}.
                        Automation paused for {{ override_minutes }} minutes.

      # --- Override timer still active: skip ---
      - conditions:
          - condition: template
            value_template: "{{ override_active and trigger.id != 'override_ended' and trigger.id != 'manual_override' }}"
        sequence:
          - stop: "Override timer active; skip automation changes."

    default:
      - action: input_boolean.turn_on
        target:
          entity_id: !input automation_guard_boolean

      # --- Schedule TRVs: follow calculated target temperature ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: "off"

          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input schedule_trvs
                data:
                  temperature: "{{ target_temperature | float }}"

      # --- Fixed TRVs: always heat to fixed_trv_temperature when active ---
      - if:
          - condition: template
            value_template: "{{ fixed_trvs | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: "off"

              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      temperature: "{{ fixed_trv_temperature | float }}"

      - action: input_boolean.turn_off
        target:
          entity_id: !input automation_guard_boolean

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' and send_notifications }}"
        then:
          - action: notify.notify
            data:
              title: "Override Ended: {{ room_name }}"
              message: >
                Manual override ended.
                Room temperature is {{ room_temp | round(1) }}°C.
                Schedule control resumed.

mode: queued
max: 10

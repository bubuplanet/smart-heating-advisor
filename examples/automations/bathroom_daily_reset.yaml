# ============================================================
# Bathroom - Daily Reset
# ============================================================
# Resets all bathroom heating flags at midnight and 3AM.
# Runs every day including weekends to prevent flags
# getting stuck across days.
# ============================================================

alias: Bathroom - Daily Reset
description: Resets all bathroom heating flags at midnight and 3AM
triggers:
  - trigger: time
    at: "00:00:00"
  - trigger: time
    at: "03:00:00"
actions:
  - action: input_boolean.turn_off
    target:
      entity_id:
        - input_boolean.bathroom_room_target_notified
        - input_boolean.bathroom_towel_target_notified
        - input_boolean.bathroom_mode_preheat
        - input_boolean.bathroom_mode_maintain
        - input_boolean.bathroom_mode_standby
        - input_boolean.bathroom_heating_override
        - input_boolean.bathroom_window_notified
        - input_boolean.bathroom_automation_running
mode: single
# ============================================================
# SHA - Room Heating
# ============================================================
# Generic room heating automation.
# Replace ROOM with your room prefix (e.g. bathroom, office)
# Replace entity IDs with your actual device entities.
#
# Required entities:
#   - sensor.ROOM_thermostat_temperature
#   - climate.ROOM_radiator
#   - climate.ROOM_heated_towel_rail (optional)
#   - binary_sensor.ROOM_window (optional)
#   - binary_sensor.ROOM_window_2 (optional)
#   - calendar.home
#   - input_number.ROOM_heating_rate
# ============================================================

alias: "ROOM - Smart Heating Workdays"
description: >-
  Pre-heats to reach target temperature by target time,
  maintains during active window, then standby.
  Vacation mode, window detection and manual override included.
triggers:
  - trigger: time_pattern
    minutes: /5
conditions:
  - condition: time
    weekday:
      - mon
      - tue
      - wed
      - thu
      - fri
  - condition: time
    after: "03:00:00"
    before: "23:00:00"
  - condition: template
    value_template: >
      {{ states('input_boolean.ROOM_heating_override') == 'off' or
         now() > as_datetime(states('input_datetime.ROOM_override_until')).replace(tzinfo=now().tzinfo) }}
actions:
  - variables:
      room_temp: "{{ states('sensor.ROOM_thermostat_temperature') | float(0) }}"
      towel_temp: "{{ state_attr('climate.ROOM_heated_towel_rail', 'current_temperature') | float(0) }}"
      room_target: 26
      towel_target: 30
      standby_target: 16
      vacation_target: 12
      target_time: "06:00:00"
      active_end_time: "07:00:00"
      heating_rate: "{{ states('input_number.ROOM_heating_rate') | float(0.15) }}"
      windows_open: >
        {{ is_state('binary_sensor.ROOM_window', 'on') or
           is_state('binary_sensor.ROOM_window_2', 'on') }}
      on_vacation: >
        {{ states('calendar.home') == 'on' and
           state_attr('calendar.home', 'message') is not none and
           state_attr('calendar.home', 'message') | string | lower | truncate(8, true, '') == 'vacation' }}
      minutes_to_target: >
        {% set target = today_at('06:00:00') %}
        {% if now() >= target %}
          0
        {% else %}
          {{ ((target - now()).total_seconds() / 60) | round(1) }}
        {% endif %}
      room_needs_preheat: >
        {{ room_temp < room_target and
           (room_target - room_temp) / heating_rate <= (minutes_to_target | float) + 30 }}
      towel_needs_preheat: >
        {{ towel_temp < towel_target and
           (towel_target - towel_temp) / heating_rate <= (minutes_to_target | float) + 30 }}
      room_just_reached: >
        {{ room_temp >= room_target and
           states('input_boolean.ROOM_room_target_notified') == 'off' }}
      towel_just_reached: >
        {{ towel_temp >= towel_target and
           states('input_boolean.ROOM_towel_target_notified') == 'off' }}
      in_preheat_window: >
        {{ today_at('03:00:00') <= now() < today_at('06:00:00') }}
      in_active_window: >
        {{ today_at('06:00:00') <= now() < today_at('07:00:00') }}
      in_standby_window: >
        {{ today_at('07:00:00') <= now() < today_at('23:00:00') }}

  # === WINDOW OPEN: stop all heating ===
  - if:
      - condition: template
        value_template: "{{ windows_open }}"
    then:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.ROOM_automation_running
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.ROOM_radiator
        data:
          hvac_mode: "off"
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.ROOM_heated_towel_rail
        data:
          hvac_mode: "off"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ROOM_automation_running
      - if:
          - condition: state
            entity_id: input_boolean.ROOM_window_notified
            state: "off"
        then:
          - action: notify.notify
            data:
              title: "🪟 Window Open — Heating Paused"
              message: >
                Heating paused — window open.
                Room: {{ room_temp }}°C.
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.ROOM_window_notified
    else:
      - if:
          - condition: state
            entity_id: input_boolean.ROOM_window_notified
            state: "on"
        then:
          - action: notify.notify
            data:
              title: "🪟 Window Closed — Heating Resumed"
              message: >
                All windows closed. Heating resumed.
                Room: {{ room_temp }}°C.
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.ROOM_window_notified

      - choose:

          # === VACATION MODE ===
          - conditions:
              - condition: template
                value_template: "{{ on_vacation }}"
            sequence:
              - if:
                  - condition: state
                    entity_id: input_boolean.ROOM_mode_standby
                    state: "off"
                then:
                  - action: notify.notify
                    data:
                      title: "🏖️ Vacation Mode Active"
                      message: >
                        Vacation mode — frost protection at {{ vacation_target }}°C.
                        Current room: {{ room_temp }}°C.
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ROOM_mode_standby
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ROOM_automation_running
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ room_temp < (vacation_target - 0.5) }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          temperature: "{{ vacation_target }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ room_temp >= vacation_target }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: "off"
              - action: climate.set_hvac_mode
                target:
                  entity_id: climate.ROOM_heated_towel_rail
                data:
                  hvac_mode: "off"
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ROOM_automation_running

          # === PRE-HEAT ===
          - conditions:
              - condition: template
                value_template: "{{ in_preheat_window }}"
            sequence:
              - if:
                  - condition: state
                    entity_id: input_boolean.ROOM_mode_preheat
                    state: "off"
                then:
                  - action: notify.notify
                    data:
                      title: "🌅 Pre-heat Mode Started"
                      message: >
                        Pre-heat started at {{ now().strftime('%H:%M') }}.
                        Room: {{ room_temp }}°C → target {{ room_target }}°C,
                        Towel: {{ towel_temp }}°C → target {{ towel_target }}°C.
                        Est. time: room {{ ((room_target - room_temp) / heating_rate) | round(0) }} min,
                        towel {{ ((towel_target - towel_temp) / heating_rate) | round(0) }} min.
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ROOM_mode_preheat
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ROOM_automation_running
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ room_needs_preheat and not room_just_reached }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          temperature: "{{ room_target }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ room_just_reached }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: "off"
                      - action: notify.notify
                        data:
                          title: "✅ Room Target Reached"
                          message: >
                            Room reached {{ room_temp }}°C at {{ now().strftime('%H:%M') }},
                            {{ minutes_to_target | round(0) }} min before target time.
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.ROOM_room_target_notified
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ towel_needs_preheat and not towel_just_reached }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_heated_towel_rail
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: climate.ROOM_heated_towel_rail
                        data:
                          temperature: "{{ towel_target }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ towel_just_reached }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_heated_towel_rail
                        data:
                          hvac_mode: "off"
                      - action: notify.notify
                        data:
                          title: "✅ Towel Rail Target Reached"
                          message: >
                            Towel rail reached {{ towel_temp }}°C at {{ now().strftime('%H:%M') }},
                            {{ minutes_to_target | round(0) }} min before target time.
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.ROOM_towel_target_notified
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ROOM_automation_running

          # === MAINTAIN ===
          - conditions:
              - condition: template
                value_template: "{{ in_active_window }}"
            sequence:
              - if:
                  - condition: state
                    entity_id: input_boolean.ROOM_mode_maintain
                    state: "off"
                then:
                  - action: notify.notify
                    data:
                      title: "🛁 Heating Window Active"
                      message: >
                        Heating window started.
                        Room: {{ room_temp }}°C (target {{ room_target }}°C),
                        Towel: {{ towel_temp }}°C (target {{ towel_target }}°C).
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ROOM_mode_maintain
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ROOM_automation_running
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ room_temp < (room_target - 0.5) }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          temperature: "{{ room_target }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ room_temp >= room_target }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: "off"
                      - if:
                          - condition: template
                            value_template: "{{ room_just_reached }}"
                        then:
                          - action: notify.notify
                            data:
                              title: "✅ Room Target Reached"
                              message: >
                                Room reached {{ room_temp }}°C at {{ now().strftime('%H:%M') }}.
                          - action: input_boolean.turn_on
                            target:
                              entity_id: input_boolean.ROOM_room_target_notified
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ towel_temp < (towel_target - 0.5) }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_heated_towel_rail
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: climate.ROOM_heated_towel_rail
                        data:
                          temperature: "{{ towel_target }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ towel_temp >= towel_target }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_heated_towel_rail
                        data:
                          hvac_mode: "off"
                      - if:
                          - condition: template
                            value_template: "{{ towel_just_reached }}"
                        then:
                          - action: notify.notify
                            data:
                              title: "✅ Towel Rail Target Reached"
                              message: >
                                Towel rail reached {{ towel_temp }}°C at {{ now().strftime('%H:%M') }}.
                          - action: input_boolean.turn_on
                            target:
                              entity_id: input_boolean.ROOM_towel_target_notified
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ROOM_automation_running

          # === STANDBY ===
          - conditions:
              - condition: template
                value_template: "{{ in_standby_window }}"
            sequence:
              - if:
                  - condition: state
                    entity_id: input_boolean.ROOM_mode_standby
                    state: "off"
                then:
                  - action: notify.notify
                    data:
                      title: "🌡️ Standby Mode"
                      message: >
                        Heating window ended. Switching to {{ standby_target }}°C standby.
                        Final room: {{ room_temp }}°C,
                        Final towel: {{ towel_temp }}°C.
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.ROOM_mode_standby
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ROOM_automation_running
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ room_temp < (standby_target - 0.5) }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          temperature: "{{ standby_target }}"
                  - conditions:
                      - condition: template
                        value_template: "{{ room_temp >= standby_target }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: climate.ROOM_radiator
                        data:
                          hvac_mode: "off"
              - action: climate.set_hvac_mode
                target:
                  entity_id: climate.ROOM_heated_towel_rail
                data:
                  hvac_mode: "off"
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ROOM_automation_running

mode: single
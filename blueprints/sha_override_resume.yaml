blueprint:
  name: "Smart Heating Advisor - Override Resume"
  description: >
    Automatically resumes smart heating after the manual override
    duration has expired. Runs 24/7 all week.
  domain: automation
  input:
    temp_sensor:
      name: Room Temperature Sensor
      selector:
        entity:
          domain: sensor
          device_class: temperature

    override_boolean:
      name: Override Boolean Helper
      selector:
        entity:
          domain: input_boolean

    override_datetime:
      name: Override DateTime Helper
      selector:
        entity:
          domain: input_datetime

triggers:
  - trigger: time_pattern
    minutes: /5

conditions:
  - condition: template
    value_template: "{{ states(!input override_boolean) == 'on' }}"
  - condition: template
    value_template: >
      {{ now() > as_datetime(states(!input override_datetime)).replace(tzinfo=now().tzinfo) }}

actions:
  - action: input_boolean.turn_off
    target:
      entity_id: !input override_boolean
  - action: notify.notify
    data:
      title: "🔄 Heating Automation Resumed"
      message: >
        Manual override ended. Smart heating resumed.
        Current room: {{ states(!input temp_sensor) }}°C.

mode: single
blueprint:
  name: "Smart Heating Advisor"
  author: bubuplanet
  description: |
    **version: 0.0.15**

    🌡️ Smart Heating Advisor — Unified Room Heating Blueprint

    This blueprint requires the Smart Heating Advisor (SHA) HACS integration.
    It provides AI-powered heating rate calibration based on your room's
    historical data and outside weather conditions — delivering a self-improving
    smart heating system that gets more accurate over time.

    ✨ Features
    - ⏱️ Smart pre-heat: timing calculated from room temp + heating rate
    - 📅 Unlimited schedules — add as many HA Schedule helpers as you need
    - 🌡️ Per-schedule target temperature — encoded in the schedule name (e.g. "Morning Shower 26C")
    - 🔥 Optional fixed-temperature radiator thermostat (towel rails, floor heating, etc.)
    - 🏖️ Vacation mode via calendar keyword
    - 🪟 Window & door detection with configurable reaction delays
    - ✋ Manual override with automatic resume
    - 🔔 Toggleable notifications — each fires only once per event
    - 🤖 AI heating rate calibration — auto-adjusted daily by SHA

    📝 Schedule naming convention
    Name each Schedule helper with the target temperature at the end:
      ✅ "Morning Shower 26C"
      ✅ "Evening Bath 28C"
      ✅ "Night Standby 16C"
      ✅ "Weekend 20C"
    The blueprint reads the temperature automatically from the name.
    If no temperature is found in the name, the configured fallback temperature is used.

    🛠️ Setup
    Install SHA via HACS, then complete the setup wizard:
    1. Connect Ollama and InfluxDB
    2. Select your rooms from HA Areas
    3. SHA creates helper entities and automations automatically
    4. Open each room's automation and add your Schedule helpers
    5. Enable the automation

    Required entities (auto-created by SHA):
    - number.sha_ROOM_heating_rate
    - switch.sha_ROOM_preheat_notified
    - switch.sha_ROOM_schedule_notified
    - switch.sha_ROOM_standby_notified
    - switch.sha_ROOM_window_timeout_notified
    - switch.sha_ROOM_airing_mode
    - switch.sha_ROOM_override

  source_url: https://raw.githubusercontent.com/bubuplanet/smart-heating-advisor/main/blueprints/automation/smart_heating_advisor/smart_heating_advisor.yaml
  domain: automation

  input:

    room_section:
      name: "🏠 Room — Mandatory"
      icon: mdi:radiator
      collapsed: true
      description: Required. Room name, temperature sensor, and TRV thermostats.
      input:

        room_name:
          name: Room Name
          description: |
            Friendly name of the room — used in notifications and to
            derive the SHA helper entity IDs automatically.
            Use the exact same name you configured in the SHA integration.
            Examples: Bathroom, Alessio's Bedroom, Living Room, Office
          default: Bathroom
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          description: The sensor measuring actual room temperature.
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

        radiator_thermostats:
          name: Radiator Thermostat
          description: >
            Main room radiators that follow the schedule target temperature.
            These are commanded to the schedule comfort temperature (e.g. 26°C)
            during pre-heat and comfort phases.
            Do NOT add towel rails or fixed-temperature devices here —
            use the Fixed Radiator Thermostats input for those.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_thermostats:
          name: Fixed Radiator Thermostat (optional)
          description: >
            Optional. Devices that always heat to a fixed temperature when heating
            is active — typically heated towel rails.
            These are NOT controlled by the schedule temperature.
            Set their target temperature using the Fixed Radiator Temperature input
            below. Leave empty if you have no fixed-temperature devices.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_radiator_temperature:
          name: Fixed Radiator Temperature (optional)
          description: >
            Target temperature for fixed radiator thermostats such as heated towel
            rails. This value is used during pre-heat, comfort and window-close
            resume phases. Ignored if Fixed Radiator Thermostats is empty.
            Typical value: 30–35°C.
          default: 30
          selector:
            number:
              min: 15
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedule_section:
      name: "📅 Schedules — Mandatory"
      icon: mdi:clock-outline
      collapsed: true
      description: Required. Schedule helpers, fallback temperature, and notification templates.
      input:

        schedules:
          name: Schedule Helpers
          description: |
            Select one or more HA Schedule helpers.
            Name each helper with the target temperature at the end:
              ✅ "Morning Shower 26C"
              ✅ "Evening Bath 28C"
              ✅ "Weekend 20C"
            Create Schedule helpers in: Settings → Helpers → Schedule
          selector:
            entity:
              filter:
                - domain: schedule
              multiple: true

        schedule_fallback_temp:
          name: Schedule Fallback Temperature
          description: >
            Temperature used when no temperature is found in the schedule name.
          default: 21
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

        notify_preheat:
          name: Notify when pre-heat starts
          description: >
            Fires once when pre-heating begins — typically minutes before the schedule starts.
            Only sent if the room needs warming up before the schedule activates.
            Also fires when pre-heat is blocked by an open window.
          default: false
          selector:
            boolean:

        tpl_preheat_started_body:
          name: Pre-heat Started — Message Body
          description: "Sent when pre-heating begins. Variables: {{ room_name }}, {{ room_temp }}, {{ target_temp }}, {{ schedule_name }}, {{ eta_minutes }}, {{ start_time }}"
          default: >-
            Pre-heat started at {{ '{{ start_time }}' }} in {{ '{{ room_name }}' }} for "{{ '{{ schedule_name }}' }}".
            Room: {{ '{{ room_temp }}' }}°C → target {{ '{{ target_temp }}' }}°C.
            Ready in approx. {{ '{{ eta_minutes }}' }} min.
          selector:
            text:
              multiline: true

        notify_schedule:
          name: Notify when schedule starts or ends
          description: >
            Fires once when a schedule activates (Comfort Phase) and once when a
            schedule ends (Heating Ended). Enable per room using the Schedule
            Notifications Enabled switch.
          default: false
          selector:
            boolean:

        tpl_schedule_header:
          name: Schedule Notification Header
          description: >
            Shared header for all schedule notifications.
            Variables: {{ room_name }}, {{ status }}
          default: "🔔 {{ '{{ room_name }}' }} — {{ '{{ status }}' }}"
          selector:
            text:

        tpl_schedule_started_body:
          name: Schedule Started — Message Body
          description: "Sent when a schedule activates. Variables: {{ room_name }}, {{ room_temp }}, {{ schedule_name }}, {{ target_temp }}, {{ slot_end_time }}"
          default: >-
            Comfort Phase started in {{ '{{ room_name }}' }}.
            "{{ '{{ schedule_name }}' }}" active until {{ '{{ slot_end_time }}' }}.
            Target: {{ '{{ target_temp }}' }}°C — Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

        tpl_schedule_finished_body:
          name: Schedule Ended — Message Body
          description: "Sent when a schedule ends and heating returns to default. Variables: {{ room_name }}, {{ room_temp }}, {{ schedule_name }}, {{ mode_detail }}, {{ default_hvac_mode }}, {{ default_temp }}"
          default: >-
            "{{ '{{ schedule_name }}' }}" ended in {{ '{{ room_name }}' }}.
            {{ '{{ mode_detail }}' }}
            Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

    default_section:
      name: "🌡️ Default — No Active Schedule"
      icon: mdi:thermostat-auto
      collapsed: true
      description: Heating behaviour when no schedule is active.
      input:

        default_hvac_mode:
          name: Default Heating Mode
          description: >
            Off — disables heating outside schedules.
            Heat — maintains the default temperature at all times.
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating outside schedules)"
                  value: "off"
                - label: "Heat (maintain default temperature)"
                  value: heat

        default_temp:
          name: Default Temperature
          description: >
            Temperature to maintain when no schedule is active
            and Default Heating Mode is set to Heat.
          default: 16
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    window_section:
      name: "🪟 Window & Door Detection"
      icon: mdi:door-open
      collapsed: true
      description: Optional. Pause heating when windows or doors are open.
      input:

        window_sensors:
          name: Window & Door Sensors
          description: >
            Optional. Select binary sensors for windows and doors.
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
              multiple: true

        window_open_reaction_time:
          name: Open Reaction Time
          description: How long a window must stay open before heating is paused.
          default:
            hours: 0
            minutes: 5
            seconds: 0
          selector:
            duration:

        notify_window:
          name: Notify on window events
          description: >
            Fires when heating is paused (window open too long), when heating
            resumes (window closed), and when a schedule or pre-heat is blocked
            by an open window.
          default: false
          selector:
            boolean:

        tpl_window_header:
          name: Window Notification Header
          description: >
            Header for window notifications.
            Variables: {{ room_name }}, {{ window_name }}, {{ status }}
          default: "🪟 {{ '{{ room_name }}' }} — {{ '{{ window_name }}' }} is {{ '{{ status }}' }}"
          selector:
            text:

        tpl_window_timeout_body:
          name: Window Paused — Message Body
          description: >
            Sent when heating is paused because a window has been open longer than the reaction time.
            Variables: {{ room_name }}, {{ window_name }}, {{ room_temp }}
          default: >-
            {{ '{{ window_name }}' }} has been open too long in {{ '{{ room_name }}' }}.
            Heating paused to save energy. It will resume when all windows are closed.
            Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

        tpl_window_blocked_body:
          name: Heating Blocked — Message Body
          description: >
            Sent once when a schedule or pre-heat wants to start but cannot because
            a window is open.
            Variables: {{ room_name }}, {{ window_name }}, {{ schedule_name }}, {{ room_temp }}
          default: >-
            Heating cannot start in {{ '{{ room_name }}' }} — {{ '{{ window_name }}' }} is open.
            Schedule "{{ '{{ schedule_name }}' }}" is ready but blocked.
            Close {{ '{{ window_name }}' }} to allow heating to begin.
            Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

        tpl_window_closed_body:
          name: Window Closed — Message Body
          description: >
            Sent only when windows close after a pause was previously triggered.
            Variables: {{ room_name }}, {{ window_name }}, {{ room_temp }},
            {{ resume_mode }} (Pre-heat / Schedule / Standby),
            {{ phase_detail }} (phase-aware context — schedule name and target in
            comfort phase, pre-heat target in pre-heat phase, standby temperature
            otherwise). Also available: {{ in_comfort_bool }}, {{ in_preheat_bool }},
            {{ active_schedule_name }}, {{ comfort_temp }},
            {{ preheat_schedule_name }}, {{ preheat_temp }}, {{ default_temp }}.
          default: |
            All windows closed in {{ '{{ room_name }}' }}. Heating resumed.
            {{ '{{ phase_detail }}' }}
            Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

    vacation_section:
      name: "🏖️ Vacation"
      icon: mdi:calendar-clock
      collapsed: true
      description: Optional. Automatically reduce heating during calendar vacation events.
      input:

        vacation_enabled:
          name: Enable Vacation Mode
          default: false
          selector:
            boolean:

        vacation_calendar:
          name: Vacation Calendar
          description: Leave empty if vacation mode is disabled.
          default: ""
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title must start with this keyword. Case insensitive.
          default: vacation
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          default: "off"
          selector:
            select:
              options:
                - label: "Off (no heating)"
                  value: "off"
                - label: "Frost protection"
                  value: frost

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior is set to Frost protection.
          default: 12
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    override_section:
      name: "✋ Manual Override"
      icon: mdi:hand-back-right
      collapsed: true
      description: Pause automation temporarily when the TRV is adjusted manually.
      input:

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change.
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        notify_override:
          name: Notify when override is activated or ended
          default: false
          selector:
            boolean:

        tpl_override_header:
          name: Override Notification Header
          description: >
            Header for override active and override ended notifications.
            Variables: {{ room_name }}, {{ status }}
          default: "✋ Manual Override in {{ '{{ room_name }}' }} — {{ '{{ status }}' }}"
          selector:
            text:

        tpl_override_active_body:
          name: Override Active — Message Body
          description: "Sent when a manual TRV change triggers an override. Variables: {{ room_name }}, {{ device_name }}, {{ override_minutes }}, {{ resume_time }}, {{ room_temp }}"
          default: >-
            Manual adjustment detected on {{ '{{ device_name }}' }} in {{ '{{ room_name }}' }}.
            Smart heating paused for {{ '{{ override_minutes }}' }} min.
            Auto-resume at {{ '{{ resume_time }}' }}. Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

        tpl_override_ended_body:
          name: Override Ended — Message Body
          description: "Sent when the override expires and smart heating resumes. Variables: {{ room_name }}, {{ room_temp }}, {{ target_temp }}"
          default: >-
            Manual override in {{ '{{ room_name }}' }} has ended.
            Smart heating has resumed control.
            Current: {{ '{{ room_temp }}' }}°C.
          selector:
            text:
              multiline: true

    ai_report_section:
      name: "🤖 AI Report"
      icon: mdi:robot
      collapsed: true
      description: Enable daily and weekly AI-generated heating analysis reports.
      input:

        notify_daily_report:
          name: Notify daily analysis report
          description: Show a persistent daily analysis report notification for this room.
          default: false
          selector:
            boolean:

        notify_weekly_report:
          name: Notify weekly analysis report
          description: Show a persistent weekly analysis report notification for this room.
          default: false
          selector:
            boolean:

variables:
  room_name:                  !input room_name
  temperature_sensor:         !input temperature_sensor
  radiator_thermostats:       !input radiator_thermostats
  fixed_radiator_thermostats: !input fixed_radiator_thermostats
  fixed_radiator_temperature: !input fixed_radiator_temperature
  schedules:                  !input schedules
  schedule_fallback_temp:     !input schedule_fallback_temp
  default_hvac_mode:          !input default_hvac_mode
  default_temp:               !input default_temp
  window_sensors:             !input window_sensors
  vacation_enabled:           !input vacation_enabled
  vacation_calendar:          !input vacation_calendar
  vacation_keyword:           !input vacation_keyword
  vacation_mode:              !input vacation_mode
  vacation_temperature:       !input vacation_temperature
  override_minutes:           !input override_minutes
  notify_preheat:             !input notify_preheat
  notify_schedule:            !input notify_schedule
  notify_window:              !input notify_window
  notify_override:            !input notify_override
  tpl_window_header:            !input tpl_window_header
  tpl_window_timeout_body:      !input tpl_window_timeout_body
  tpl_window_blocked_body:      !input tpl_window_blocked_body
  tpl_window_closed_body:       !input tpl_window_closed_body
  tpl_schedule_header:          !input tpl_schedule_header
  tpl_override_header:          !input tpl_override_header
  tpl_preheat_started_body:     !input tpl_preheat_started_body
  tpl_schedule_started_body:    !input tpl_schedule_started_body
  tpl_schedule_finished_body:   !input tpl_schedule_finished_body
  tpl_override_active_body:     !input tpl_override_active_body
  tpl_override_ended_body:      !input tpl_override_ended_body
  notify_daily_report:        !input notify_daily_report
  notify_weekly_report:       !input notify_weekly_report

  room_id: >
    {{ room_name | lower
                 | replace("'", '')
                 | regex_replace('[\s\-]+', '_')
                 | regex_replace('[^a-z0-9_]', '') }}

  sha_heating_rate:      "number.sha_{{ room_id }}_heating_rate"
  sha_override_switch:   "switch.sha_{{ room_id }}_override"
  sha_preheat_notified:        "switch.sha_{{ room_id }}_preheat_notified"
  sha_schedule_notified:       "switch.sha_{{ room_id }}_schedule_notified"
  sha_standby_notified:        "switch.sha_{{ room_id }}_standby_notified"
  sha_window_timeout_notified: "switch.sha_{{ room_id }}_window_timeout_notified"
  sha_notify_preheat_enabled:   "switch.sha_{{ room_id }}_preheat_notifications_enabled"
  sha_notify_schedule_enabled:  "switch.sha_{{ room_id }}_schedule_notifications_enabled"
  sha_notify_window_enabled:    "switch.sha_{{ room_id }}_window_notifications_enabled"
  sha_notify_override_enabled:  "switch.sha_{{ room_id }}_override_notifications_enabled"

  room_temp:    "{{ states(temperature_sensor) | float(18) }}"
  heating_rate: "{{ states(sha_heating_rate) | float(0.15) }}"

  override_active: "{{ is_state(sha_override_switch, 'on') }}"
  windows_open:    "{{ is_state('switch.sha_' ~ room_id ~ '_airing_mode', 'on') }}"
  preheat_notified_state:        "{{ states(sha_preheat_notified) }}"
  schedule_notified_state:       "{{ states(sha_schedule_notified) }}"
  standby_notified_state:        "{{ states(sha_standby_notified) }}"
  window_timeout_notified_state: "{{ states(sha_window_timeout_notified) }}"
  preheat_notified_available:        "{{ preheat_notified_state not in ['unknown', 'unavailable'] }}"
  schedule_notified_available:       "{{ schedule_notified_state not in ['unknown', 'unavailable'] }}"
  standby_notified_available:        "{{ standby_notified_state not in ['unknown', 'unavailable'] }}"
  window_timeout_notified_available: "{{ window_timeout_notified_state not in ['unknown', 'unavailable'] }}"
  preheat_notified_on:        "{{ preheat_notified_state == 'on' }}"
  schedule_notified_on:       "{{ schedule_notified_state == 'on' }}"
  standby_notified_on:        "{{ standby_notified_state == 'on' }}"
  window_timeout_notified_on: "{{ window_timeout_notified_state == 'on' }}"

  notify_preheat_effective: >
    {% set s = states(sha_notify_preheat_enabled) %}
    {{ notify_preheat and s != 'off' }}

  notify_schedule_effective: >
    {% set s = states(sha_notify_schedule_enabled) %}
    {{ notify_schedule and s != 'off' }}

  notify_window_effective: >
    {% set s = states(sha_notify_window_enabled) %}
    {{ notify_window and s != 'off' }}

  notify_override_effective: >
    {% set s = states(sha_notify_override_enabled) %}
    {{ notify_override and s != 'off' }}

  vacation_active: >
    {% if not vacation_enabled or not vacation_calendar %}
      false
    {% else %}
      {% set message = state_attr(vacation_calendar, 'message') | default('') | string %}
      {{ is_state(vacation_calendar, 'on') and
         message | lower | regex_search('^' ~ vacation_keyword | lower) }}
    {% endif %}

  active_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='') %}
    {% for s in schedules %}
      {% if not ns.found and is_state(s, 'on') %}
        {% set fname = state_attr(s, 'friendly_name') | default('') %}
        {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
        {% set ns.found = true %}
        {% set ns.temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
        {% set ns.name = fname %}
      {% endif %}
    {% endfor %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name} | tojson }}

  in_comfort:          "{{ (active_schedule | from_json).active }}"
  comfort_temp:        "{{ (active_schedule | from_json).temp | float(0) }}"
  active_schedule_name: "{{ (active_schedule | from_json).name | default('') }}"

  preheat_schedule: >
    {% set ns = namespace(found=false, temp=0.0, name='', mins_needed=0) %}
    {% if not (in_comfort | bool(false)) %}
      {% for s in schedules %}
        {% if not ns.found and is_state(s, 'off') %}
          {% set fname = state_attr(s, 'friendly_name') | default('') %}
          {% set nev = state_attr(s, 'next_event') %}
          {% if nev %}
            {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
            {% set target_temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float %}
            {% set temp_delta = target_temp - room_temp %}
            {% set mins_needed = [(temp_delta / heating_rate) | int(10), 5] | max %}
            {% set mins_to_start = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
            {% if temp_delta > 0.5 and 0 <= mins_to_start <= mins_needed %}
              {% set ns.found = true %}
              {% set ns.temp = target_temp %}
              {% set ns.name = fname %}
              {% set ns.mins_needed = mins_needed %}
            {% endif %}
          {% endif %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ {'active': ns.found, 'temp': ns.temp, 'name': ns.name, 'mins_needed': ns.mins_needed} | tojson }}

  in_preheat:           "{{ (preheat_schedule | from_json).active }}"
  preheat_temp:         "{{ (preheat_schedule | from_json).temp | float(0) }}"
  preheat_schedule_name: "{{ (preheat_schedule | from_json).name | default('') }}"
  preheat_schedule_mins: "{{ (preheat_schedule | from_json).mins_needed | int(10) }}"
  in_comfort_bool:      "{{ in_comfort | bool(false) }}"
  in_preheat_bool:      "{{ in_preheat | bool(false) }}"
  windows_open_bool:    "{{ windows_open | bool(false) }}"
  override_active_bool: "{{ override_active | bool(false) }}"
  vacation_active_bool: "{{ vacation_active | bool(false) }}"

  target_temperature: >
    {% if vacation_active_bool and vacation_mode == 'frost' %}
      {{ [vacation_temperature | float, 4.0] | max }}
    {% elif in_comfort_bool %}
      {{ [comfort_temp | float, 4.0] | max }}
    {% elif in_preheat_bool %}
      {{ [preheat_temp | float, 4.0] | max }}
    {% else %}
      {{ [default_temp | float, 4.0] | max }}
    {% endif %}

  target_mode: >
    {% if windows_open_bool %}
      off
    {% elif vacation_active_bool and vacation_mode == 'off' %}
      off
    {% elif not in_comfort_bool and not in_preheat_bool and default_hvac_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

  target_reached: "{{ in_comfort_bool and room_temp >= (comfort_temp - 0.3) }}"

triggers:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: state
    entity_id: !input schedules
    id: schedule_changed

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "on"
      - "open"
    for: !input window_open_reaction_time
    id: window_airing_start

  - trigger: state
    entity_id: !input window_sensors
    to:
      - "off"
      - "closed"
    id: window_airing_end

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input radiator_thermostats
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: sha_override_ended
    id: override_ended

conditions: []

action:

  - choose:

      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'override_ended' and
                 trigger.event.data.get('room_id') != room_id }}
        sequence:
          - stop: "Override ended for a different room — ignoring."

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_start' }}"
        sequence:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] WINDOW OPEN — HEATING SUSPENDED
                Open sensor(s): {{ expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='name') | list | join(', ') }}
                Room: {{ room_temp | round(1) }}°C
                TRVs commanded off.
                Heating will resume automatically when all windows close.
              level: info
              logger: custom_components.smart_heating_advisor
          - action: switch.turn_on
            target:
              entity_id: "switch.sha_{{ room_id }}_airing_mode"
          - action: climate.set_hvac_mode
            target:
              entity_id: !input radiator_thermostats
            data:
              hvac_mode: "off"
          - if:
              - condition: template
                value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
            then:
              - action: climate.set_hvac_mode
                target:
                  entity_id: "{{ fixed_radiator_thermostats }}"
                data:
                  hvac_mode: "off"
          - if:
              - condition: template
                value_template: "{{ notify_window_effective and not window_timeout_notified_on }}"
            then:
              - action: system_log.write
                data:
                  message: >-
                    SHA [{{ room_name }}] Notification sent: window_paused
                    (effective={{ notify_window_effective }},
                    already_sent={{ window_timeout_notified_on }}).
                  level: debug
                  logger: custom_components.smart_heating_advisor
              - action: notify.notify
                data:
                  title: >
                    {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                    {% set tpl = tpl_window_header | trim %}
                    {% set base = tpl if tpl else "🪟 {{ room_name }} — {{ window_name }} is {{ status }}" %}
                    {{ base
                       | replace('{{ room_name }}', room_name)
                       | replace('{{ window_name }}', win_name)
                       | replace('{{ status }}', 'Open') }}
                  message: >
                    {% set body_tpl = tpl_window_timeout_body | trim %}
                    {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                    {% set body_base = body_tpl if body_tpl else "Heating in {{ room_name }} has been paused because a window is open. It will resume when all windows are closed. Current temperature: {{ room_temp }}°C." %}
                    {{ body_base
                       | replace('{{ room_name }}', room_name)
                       | replace('{{ window_name }}', win_name)
                       | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_window_timeout_notified }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'window_airing_end' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ expand(window_sensors)
                     | selectattr('state', 'in', ['on', 'open'])
                     | list | count == 0 }}
            then:
              - action: switch.turn_off
                target:
                  entity_id: "switch.sha_{{ room_id }}_airing_mode"
              - if:
                  - condition: template
                    value_template: "{{ notify_window_effective and window_timeout_notified_on }}"
                then:
                  - action: system_log.write
                    data:
                      message: >-
                        SHA [{{ room_name }}] Notification sent: window_closed
                        (effective={{ notify_window_effective }},
                        previously_sent={{ window_timeout_notified_on }}).
                      level: debug
                      logger: custom_components.smart_heating_advisor
                  - action: notify.notify
                    data:
                      title: >
                        {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                        {% set tpl = tpl_window_header | trim %}
                        {% set base = tpl if tpl else "🪟 {{ room_name }} — {{ window_name }} is {{ status }}" %}
                        {{ base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ window_name }}', win_name)
                           | replace('{{ status }}', 'Closed') }}
                      message: >
                        {% set body_tpl = tpl_window_closed_body | trim %}
                        {% set win_name = trigger.to_state.attributes.friendly_name | default('Window') %}
                        {% set resume_mode = 'Pre-heat' if in_preheat_bool else ('Schedule' if in_comfort_bool else 'Standby') %}
                        {% set phase_detail = ('Schedule "' ~ active_schedule_name ~ '" active — target ' ~ (comfort_temp | round(1) | string) ~ '°C.') if in_comfort_bool else ('Pre-heating for "' ~ preheat_schedule_name ~ '" — target ' ~ (preheat_temp | round(1) | string) ~ '°C.' if in_preheat_bool else ('Returning to standby at ' ~ (default_temp | string) ~ '°C.')) %}
                        {% set body_base = body_tpl if body_tpl else "All windows in {{ room_name }} are now closed. Heating resumed ({{ resume_mode }}). Current temperature: {{ room_temp }}°C." %}
                        {{ body_base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ window_name }}', win_name)
                           | replace('{{ resume_mode }}', resume_mode)
                           | replace('{{ phase_detail }}', phase_detail)
                           | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}
                  - if:
                      - condition: template
                        value_template: "{{ window_timeout_notified_available }}"
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ sha_window_timeout_notified }}"
              - action: system_log.write
                data:
                  message: |
                    SHA [{{ room_name }}] WINDOW CLOSED — HEATING RESUMED
                    Room: {{ room_temp | round(1) }}°C
                    Resume mode: {{ 'PRE-HEAT' if in_preheat_bool else ('SCHEDULE' if in_comfort_bool else 'STANDBY') }}
                    Resume target: {{ target_temperature | round(1) }}°C
                    {{ 'In comfort phase: ' ~ active_schedule_name if in_comfort_bool else ('In pre-heat for: ' ~ preheat_schedule_name if in_preheat_bool else 'Returning to standby.') }}
                  level: info
                  logger: custom_components.smart_heating_advisor
              - if:
                  - condition: template
                    value_template: "{{ not override_active_bool }}"
                then:
                  - variables:
                      resume_target_mode: >
                        {% if vacation_active_bool and vacation_mode == 'off' %}
                          off
                        {% elif in_comfort_bool or in_preheat_bool or (vacation_active_bool and vacation_mode == 'frost') %}
                          heat
                        {% elif default_hvac_mode == 'heat' %}
                          heat
                        {% else %}
                          off
                        {% endif %}
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ resume_target_mode == 'off' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              hvac_mode: "off"
                      - conditions:
                          - condition: template
                            value_template: "{{ resume_target_mode == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: !input radiator_thermostats
                            data:
                              temperature: "{{ target_temperature | float }}"
                          - if:
                              - condition: template
                                value_template: >
                                  {{ fixed_radiator_thermostats | list | count > 0 }}
                            then:
                              - action: system_log.write
                                data:
                                  message: |
                                    SHA [{{ room_name }}] Fixed TRV — commanding heat on window close resume
                                    Target: {{ fixed_radiator_temperature | float(30) }}°C
                                    Entities: {{ fixed_radiator_thermostats }}
                                  level: info
                                  logger: custom_components.smart_heating_advisor
                              - action: climate.set_hvac_mode
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  hvac_mode: heat
                              - action: climate.set_temperature
                                target:
                                  entity_id: "{{ fixed_radiator_thermostats }}"
                                data:
                                  temperature: "{{ fixed_radiator_temperature | float(30) }}"
                  - if:
                      - condition: template
                        value_template: "{{ fixed_radiator_thermostats | list | count > 0 and resume_target_mode == 'off' }}"
                    then:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: "{{ fixed_radiator_thermostats }}"
                        data:
                          hvac_mode: "off"
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'schedule_changed' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'on' }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ standby_notified_available }}"
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id:
                            - "{{ sha_standby_notified }}"
                  - variables:
                      slot_end_time: >
                        {% set nev = state_attr(trigger.entity_id, 'next_event') %}
                        {% if nev %}
                          {{ (as_datetime(nev) | as_local).strftime('%H:%M') }}
                        {% else %}
                          unknown
                        {% endif %}
                  - if:
                      - condition: template
                        value_template: >
                          {{ not windows_open_bool and
                             notify_schedule_effective and
                             not schedule_notified_on }}
                    then:
                      - action: system_log.write
                        data:
                          message: |
                            SHA [{{ room_name }}] STARTING COMFORT PHASE
                            Schedule: "{{ state_attr(trigger.entity_id, 'friendly_name') | default('n/a') }}"
                            Target: {{ comfort_temp }}°C
                            Active until: {{ slot_end_time }}
                            Room now: {{ room_temp | round(1) }}°C
                            {{ 'Target already reached — maintaining.' if target_reached else 'Heating to reach target.' }}
                            TRVs commanding: {{ radiator_thermostats }}
                            Fixed TRVs at {{ fixed_radiator_temperature }}°C: {{ fixed_radiator_thermostats if fixed_radiator_thermostats | list | count > 0 else 'none' }}
                          level: info
                          logger: custom_components.smart_heating_advisor
                      - action: notify.notify
                        data:
                          title: >
                            {% set tpl = tpl_schedule_header | trim %}
                            {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                            {{ base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ status }}', 'Comfort Phase') }}
                          message: >
                            {% set body_tpl = tpl_schedule_started_body | trim %}
                            {% set body_base = body_tpl if body_tpl else "Comfort Phase started in {{ room_name }}. \"{{ schedule_name }}\" active until {{ slot_end_time }}. Target: {{ target_temp }}°C — Current: {{ room_temp }}°C." %}
                            {% set triggered_name = state_attr(trigger.entity_id, 'friendly_name') | default('n/a') %}
                            {{ body_base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ room_temp }}', (room_temp | round(1) | string))
                               | replace('{{ schedule_name }}', triggered_name)
                               | replace('{{ target_temp }}', (comfort_temp | string))
                               | replace('{{ slot_end_time }}', slot_end_time) }}
                      - if:
                          - condition: template
                            value_template: "{{ schedule_notified_available }}"
                        then:
                          - action: switch.turn_on
                            target:
                              entity_id: "{{ sha_schedule_notified }}"
                  - if:
                      - condition: template
                        value_template: >
                          {{ windows_open_bool and
                             notify_window_effective and
                             not schedule_notified_on }}
                    then:
                      - action: system_log.write
                        data:
                          message: |
                            SHA [{{ room_name }}] HEATING BLOCKED — WINDOW OPEN
                            Schedule: "{{ state_attr(trigger.entity_id, 'friendly_name') | default('n/a') }}"
                            Target: {{ comfort_temp }}°C
                            Open window(s): {{ expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='name') | list | join(', ') }}
                            Heating will begin when all windows are closed.
                          level: info
                          logger: custom_components.smart_heating_advisor
                      - action: notify.notify
                        data:
                          title: >
                            {% set win_name = expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='attributes.friendly_name') | list | first | default('a window') %}
                            {% set tpl = tpl_window_header | trim %}
                            {% set base = tpl if tpl else "🪟 {{ room_name }} — {{ window_name }} is {{ status }}" %}
                            {{ base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ window_name }}', win_name)
                               | replace('{{ status }}', 'Blocking Heat') }}
                          message: >
                            {% set body_tpl = tpl_window_blocked_body | trim %}
                            {% set win_name = expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='attributes.friendly_name') | list | first | default('a window') %}
                            {% set triggered_name = state_attr(trigger.entity_id, 'friendly_name') | default('n/a') %}
                            {% set body_base = body_tpl if body_tpl else "Heating cannot start in {{ room_name }} — {{ window_name }} is open. Schedule \"{{ schedule_name }}\" is ready but blocked. Close {{ window_name }} to allow heating to begin. Current: {{ room_temp }}°C." %}
                            {{ body_base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ window_name }}', win_name)
                               | replace('{{ schedule_name }}', triggered_name)
                               | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}
                  - if:
                      - condition: template
                        value_template: "{{ preheat_notified_available }}"
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ sha_preheat_notified }}"
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.to_state.state == 'off' }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: >
                          {{ notify_schedule_effective and
                             not standby_notified_on and
                             schedule_notified_on and
                             not vacation_active_bool and
                             not windows_open_bool and
                             (schedules | select('string') | list
                              | select('match', '.+')
                              | map('states') | select('eq', 'on')
                              | list | count == 0) }}
                    then:
                      - action: system_log.write
                        data:
                          message: >-
                            SHA [{{ room_name }}] Notification sent: schedule_ended
                            (effective={{ notify_schedule_effective }},
                            already_sent={{ standby_notified_on }}).
                          level: debug
                          logger: custom_components.smart_heating_advisor
                      - action: notify.notify
                        data:
                          title: >
                            {% set tpl = tpl_schedule_header | trim %}
                            {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                            {{ base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ status }}', 'Heating Ended') }}
                          message: >
                            {% set body_tpl = tpl_schedule_finished_body | trim %}
                            {% set ended_name = trigger.to_state.attributes.friendly_name | default('n/a') %}
                            {% set mode_detail = 'Heating off — maintaining ' ~ (default_temp | string) ~ '°C.' if default_hvac_mode == 'off' else 'Returning to heat at ' ~ (default_temp | string) ~ '°C.' %}
                            {% set body_base = body_tpl if body_tpl else "\"{{ schedule_name }}\" ended in {{ room_name }}. {{ mode_detail }} Current: {{ room_temp }}°C." %}
                            {{ body_base
                               | replace('{{ room_name }}', room_name)
                               | replace('{{ room_temp }}', (room_temp | round(1) | string))
                               | replace('{{ schedule_name }}', ended_name)
                               | replace('{{ mode_detail }}', mode_detail)
                               | replace('{{ default_hvac_mode }}', default_hvac_mode)
                               | replace('{{ default_temp }}', (default_temp | string)) }}
                      - if:
                          - condition: template
                            value_template: "{{ standby_notified_available }}"
                        then:
                          - action: switch.turn_on
                            target:
                              entity_id: "{{ sha_standby_notified }}"
                  - if:
                      - condition: template
                        value_template: "{{ schedule_notified_available }}"
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ sha_schedule_notified }}"
                  - if:
                      - condition: template
                        value_template: >
                          {{ preheat_notified_available and not in_preheat_bool }}
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ sha_preheat_notified }}"
          - if:
              - condition: template
                value_template: "{{ not override_active_bool }}"
            then:
              - variables:
                  schedule_trigger_mode: >
                    {% set new_state = trigger.to_state.state %}
                    {% if windows_open_bool %}
                      off
                    {% elif vacation_active_bool and vacation_mode == 'off' %}
                      off
                    {% elif new_state == 'on' %}
                      heat
                    {% elif in_comfort_bool %}
                      heat
                    {% elif default_hvac_mode == 'heat' %}
                      heat
                    {% else %}
                      off
                    {% endif %}
                  schedule_trigger_temp: >
                    {% if trigger.to_state.state == 'on' %}
                      {% set fname = state_attr(trigger.entity_id, 'friendly_name') | default('') %}
                      {% set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) %}
                      {{ temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float }}
                    {% else %}
                      {{ default_temp | float }}
                    {% endif %}
              - if:
                  - condition: template
                    value_template: >
                      {{ trigger.to_state.state == 'on' or
                         schedule_notified_on }}
                then:
                  - action: system_log.write
                    data:
                      message: |
                        SHA [{{ room_name }}] {{ 'SCHEDULE STARTED' if trigger.to_state.state == 'on' else 'SCHEDULE ENDED' }}
                        Schedule: "{{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }}"
                        Room: {{ room_temp | round(1) }}°C
                        {{ 'Commanding heat to ' ~ schedule_trigger_temp ~ '°C (mode: ' ~ schedule_trigger_mode ~ ').' if trigger.to_state.state == 'on' else 'Returning to ' ~ default_hvac_mode ~ ' at ' ~ default_temp ~ '°C.' }}
                      level: info
                      logger: custom_components.smart_heating_advisor
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ schedule_trigger_mode == 'off' }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          hvac_mode: "off"
                  - conditions:
                      - condition: template
                        value_template: "{{ schedule_trigger_mode == 'heat' }}"
                    sequence:
                      - action: climate.set_hvac_mode
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          hvac_mode: heat
                      - action: climate.set_temperature
                        target:
                          entity_id: !input radiator_thermostats
                        data:
                          temperature: "{{ schedule_trigger_temp | float }}"
              - if:
                  - condition: template
                    value_template: "{{ fixed_radiator_thermostats | list | count > 0 }}"
                then:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ schedule_trigger_mode == 'off' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              hvac_mode: "off"
                      - conditions:
                          - condition: template
                            value_template: "{{ schedule_trigger_mode == 'heat' }}"
                        sequence:
                          - action: climate.set_hvac_mode
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              hvac_mode: heat
                          - action: climate.set_temperature
                            target:
                              entity_id: "{{ fixed_radiator_thermostats }}"
                            data:
                              temperature: "{{ fixed_radiator_temperature | float(30) }}"

      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ not windows_open_bool and
                     not override_active_bool and
                     is_state(sha_override_switch, 'off') and
                     trigger.to_state is not none and
                     trigger.to_state.context.parent_id is none and
                     trigger.from_state is not none and (
                       (trigger.attribute == 'temperature' and
                        (trigger.to_state.attributes.temperature | float(-1)) != (target_temperature | float(0))) or
                       (trigger.attribute == 'hvac_mode' and
                        trigger.to_state.attributes.hvac_mode != target_mode)
                     ) }}
            then:
              - action: system_log.write
                data:
                  message: |
                    SHA [{{ room_name }}] MANUAL OVERRIDE ACTIVATED
                    Changed by user on: {{ trigger.to_state.attributes.friendly_name | default(trigger.entity_id) }}
                    Duration: {{ override_minutes }} min
                    Auto-resume at: {{ (now() + timedelta(minutes=override_minutes | int)).strftime('%H:%M') }}
                    Room: {{ room_temp | round(1) }}°C
                    SHA heating suspended for {{ override_minutes }} min.
                  level: info
                  logger: custom_components.smart_heating_advisor
              - action: smart_heating_advisor.start_override
                data:
                  room_name: "{{ room_name }}"
                  duration_minutes: "{{ override_minutes | int(120) }}"
              - if:
                  - condition: template
                    value_template: "{{ notify_override_effective }}"
                then:
                  - action: system_log.write
                    data:
                      message: >-
                        SHA [{{ room_name }}] Notification sent: override_active
                        (effective={{ notify_override_effective }},
                        parent_id={{ trigger.to_state.context.parent_id | default('none') }}).
                      level: debug
                      logger: custom_components.smart_heating_advisor
                  - action: notify.notify
                    data:
                      title: >
                        {% set tpl = tpl_override_header | trim %}
                        {% set base = tpl if tpl else "✋ {{ room_name }} — {{ status }}" %}
                        {{ base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ status }}', 'Override Active') }}
                      message: >
                        {% set body_tpl = tpl_override_active_body | trim %}
                        {% set resume = (now() + timedelta(minutes=override_minutes | int)).strftime('%H:%M') %}
                        {% set body_base = body_tpl if body_tpl else "Manual override on {{ device_name }} in {{ room_name }}. Resumes in {{ override_minutes }} min ({{ resume_time }}). Current: {{ room_temp }}°C." %}
                        {{ body_base
                           | replace('{{ room_name }}', room_name)
                           | replace('{{ device_name }}', trigger.to_state.attributes.friendly_name | default('device'))
                           | replace('{{ override_minutes }}', (override_minutes | string))
                           | replace('{{ resume_time }}', resume)
                           | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}

      - conditions:
          - condition: template
            value_template: >
              {{ override_active_bool and
                 trigger.id not in ['override_ended', 'manual_override',
                                    'window_airing_start', 'window_airing_end',
                                    'schedule_changed'] }}
        sequence:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] Control loop skipped — override active.
                Room: {{ room_temp | round(1) }}°C
              level: debug
              logger: custom_components.smart_heating_advisor
          - stop: "Override active — skipping control loop."

    default:

      - action: system_log.write
        data:
          message: |
            {%- set _scheds = schedules | select('match', '.+') | list -%}
            {%- set _ns = namespace(slines=[]) -%}
            {%- for s in _scheds -%}
              {%- set _nev = state_attr(s, 'next_event') -%}
              {%- set _nev_str = (_nev | string)[:16] if _nev else '—' -%}
              {%- set _ns.slines = _ns.slines + ['  ' ~ s ~ ': ' ~ states(s) | upper ~ ' (next: ' ~ _nev_str ~ ')'] -%}
            {%- endfor -%}
            SHA [{{ room_name }}] ─── Control loop ──────────────────────────────────────
            Room: {{ room_temp | round(1) }}°C
            Mode: {{ target_mode | upper }}  Target: {{ target_temperature | round(1) }}°C
            Schedules ({{ _scheds | count }}):
            {{ _ns.slines | join('\n') }}
            Active now: {{ active_schedule_name if in_comfort_bool else ('Pre-heating for ' ~ preheat_schedule_name if in_preheat_bool else 'none') }}
            Pre-heat: {{ 'yes — ' ~ preheat_schedule_mins ~ ' min needed' if in_preheat_bool else 'no' }}
            Override: {{ 'yes' if override_active_bool else 'no' }}
            Windows: {{ 'open' if windows_open_bool else 'closed' }}
            Vacation: {{ 'yes' if vacation_active_bool else 'no' }}
            Heating rate: {{ heating_rate }}°C/min
            ──────────────────────────────────────────────────────────────────────────────
          level: debug
          logger: custom_components.smart_heating_advisor

      - action: system_log.write
        data:
          message: |
            SHA [{{ room_name }}] Notification gates:
            preheat_started={{ 'SEND' if (notify_preheat_effective and in_preheat_bool and not windows_open_bool and not preheat_notified_on) else 'skip' }}
            heating_blocked={{ 'SEND' if (notify_window_effective and in_preheat_bool and windows_open_bool and not preheat_notified_on) else 'skip' }}
            window_paused={{ 'SEND' if (notify_window_effective and windows_open_bool and not window_timeout_notified_on) else 'skip' }}
            override={{ 'SEND' if (notify_override_effective and override_active_bool) else 'skip' }}
          level: debug
          logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: >
              {% if in_preheat_bool or in_comfort_bool %}
                {{ false }}
              {% else %}
                {% set ns = namespace(found=false) %}
                {% for s in schedules if s != '' and is_state(s, 'off') %}
                  {% set nev = state_attr(s, 'next_event') %}
                  {% if nev and not ns.found %}
                    {% set m = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) %}
                    {% if 0 <= m <= 60 %}
                      {% set ns.found = true %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.found }}
              {% endif %}
        then:
          - action: system_log.write
            data:
              message: |
                {%- set ns = namespace(mins=9999, name='', temp=0.0) -%}
                {%- for s in schedules if s != '' and is_state(s, 'off') -%}
                  {%- set nev = state_attr(s, 'next_event') -%}
                  {%- if nev -%}
                    {%- set m = ((as_datetime(nev) - now()).total_seconds() / 60) | int(0) -%}
                    {%- if 0 <= m <= 60 and m < ns.mins -%}
                      {%- set fname = state_attr(s, 'friendly_name') | default('') -%}
                      {%- set temps = fname | regex_findall('(\d+(?:\.\d+)?)C$', ignorecase=True) -%}
                      {%- set ns.mins = m -%}
                      {%- set ns.name = fname -%}
                      {%- set ns.temp = temps | first | float(schedule_fallback_temp) if temps else schedule_fallback_temp | float -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set gap = (ns.temp - room_temp) | round(1) -%}
                {%- set mins_needed = [(gap / heating_rate) | int(10), 5] | max if gap > 0.5 else 0 -%}
                SHA [{{ room_name }}] Pre-heat countdown — {{ ns.mins }} min to schedule start
                Schedule: "{{ ns.name }}"
                Target: {{ ns.temp }}°C  Room now: {{ room_temp | round(1) }}°C  Gap: {{ gap }}°C
                Heating rate: {{ heating_rate }}°C/min  Est. pre-heat needed: {{ mins_needed }} min
                Status: {{ 'no pre-heat needed (room warm enough)' if gap <= 0.5 else ('overdue — pre-heat was due at ' ~ (now() - timedelta(minutes=(mins_needed - ns.mins))).strftime('%H:%M') if ns.mins < mins_needed else 'Pre-heat will start at: ' ~ (now() + timedelta(minutes=(ns.mins - mins_needed))).strftime('%H:%M')) }}
              level: info
              logger: custom_components.smart_heating_advisor

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: "off"
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input radiator_thermostats
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input radiator_thermostats
                data:
                  temperature: "{{ target_temperature | float }}"
              - if:
                  - condition: template
                    value_template: >
                      {{ fixed_radiator_thermostats | list | count > 0 }}
                then:
                  - action: system_log.write
                    data:
                      message: |
                        SHA [{{ room_name }}] Fixed TRV — commanding heat (control loop)
                        Phase: {{ 'comfort' if in_comfort_bool else ('pre-heat' if in_preheat_bool else 'default') }}
                        Target: {{ fixed_radiator_temperature | float(30) }}°C
                        Entities: {{ fixed_radiator_thermostats }}
                      level: info
                      logger: custom_components.smart_heating_advisor
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_radiator_thermostats }}"
                    data:
                      temperature: "{{ fixed_radiator_temperature | float(30) }}"

      - if:
          - condition: template
            value_template: "{{ fixed_radiator_thermostats | list | count > 0 and target_mode == 'off' }}"
        then:
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ fixed_radiator_thermostats }}"
            data:
              hvac_mode: "off"

      - if:
          - condition: template
            value_template: >
              {{ in_preheat_bool and
                 not windows_open_bool and
                 not preheat_notified_on }}
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] PRE-HEAT STARTED
                Schedule: "{{ preheat_schedule_name }}"
                Target: {{ preheat_temp }}°C
                Room now: {{ room_temp | round(1) }}°C
                Gap to close: {{ (preheat_temp - room_temp) | round(1) }}°C
                Heating rate: {{ heating_rate }}°C/min
                Estimated time needed: {{ preheat_schedule_mins }} min
                TRVs commanding: {{ radiator_thermostats }}
                Fixed TRVs: {{ fixed_radiator_thermostats if fixed_radiator_thermostats | list | count > 0 else 'none' }}
              level: info
              logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: >
              {{ notify_preheat_effective and
                 in_preheat_bool and
                 not windows_open_bool and
                 not preheat_notified_on }}
        then:
          - action: system_log.write
            data:
              message: >-
                SHA [{{ room_name }}] Notification sent: preheat_started
                (effective={{ notify_preheat_effective }}, in_preheat={{ in_preheat_bool }},
                windows_open={{ windows_open_bool }}, already_sent={{ preheat_notified_on }}).
              level: debug
              logger: custom_components.smart_heating_advisor
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_schedule_header | trim %}
                {% set base = tpl if tpl else "🔔 {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Pre-heat Started') }}
              message: >
                {% set body_tpl = tpl_preheat_started_body | trim %}
                {% set body_base = body_tpl if body_tpl else "Pre-heat started at {{ start_time }} in {{ room_name }} for \"{{ schedule_name }}\". Room: {{ room_temp }}°C → target {{ target_temp }}°C. Ready in approx. {{ eta_minutes }} min." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ target_temp }}', (preheat_temp | string))
                   | replace('{{ schedule_name }}', preheat_schedule_name if preheat_schedule_name else 'n/a')
                   | replace('{{ eta_minutes }}', preheat_schedule_mins | string)
                   | replace('{{ start_time }}', now().strftime('%H:%M')) }}

      - if:
          - condition: template
            value_template: >
              {{ in_preheat_bool and
                 not windows_open_bool and
                 preheat_notified_available and
                 not preheat_notified_on }}
        then:
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_preheat_notified }}"

      - if:
          - condition: template
            value_template: >
              {{ notify_window_effective and
                 in_preheat_bool and
                 windows_open_bool and
                 not preheat_notified_on }}
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] HEATING BLOCKED — WINDOW OPEN (pre-heat)
                Schedule: "{{ preheat_schedule_name }}"
                Target: {{ preheat_temp }}°C
                Room now: {{ room_temp | round(1) }}°C
                Open window(s): {{ expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='name') | list | join(', ') }}
                Heating will begin when all windows are closed.
              level: info
              logger: custom_components.smart_heating_advisor
          - action: notify.notify
            data:
              title: >
                {% set win_name = expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='attributes.friendly_name') | list | first | default('a window') %}
                {% set tpl = tpl_window_header | trim %}
                {% set base = tpl if tpl else "🪟 {{ room_name }} — {{ window_name }} is {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ window_name }}', win_name)
                   | replace('{{ status }}', 'Blocking Heat') }}
              message: >
                {% set body_tpl = tpl_window_blocked_body | trim %}
                {% set win_name = expand(window_sensors) | selectattr('state', 'in', ['on', 'open']) | map(attribute='attributes.friendly_name') | list | first | default('a window') %}
                {% set body_base = body_tpl if body_tpl else "Heating cannot start in {{ room_name }} — {{ window_name }} is open. Schedule \"{{ schedule_name }}\" is ready but blocked. Close {{ window_name }} to allow heating to begin. Current: {{ room_temp }}°C." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ window_name }}', win_name)
                   | replace('{{ schedule_name }}', preheat_schedule_name if preheat_schedule_name else 'n/a')
                   | replace('{{ room_temp }}', (room_temp | round(1) | string)) }}

      - if:
          - condition: template
            value_template: >
              {{ in_preheat_bool and
                 windows_open_bool and
                 preheat_notified_available and
                 not preheat_notified_on }}
        then:
          - action: switch.turn_on
            target:
              entity_id: "{{ sha_preheat_notified }}"

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' }}"
        then:
          - action: system_log.write
            data:
              message: |
                SHA [{{ room_name }}] OVERRIDE ENDED — RESUMING
                Room: {{ room_temp | round(1) }}°C
                Resuming: {{ 'comfort phase' if in_comfort_bool else ('pre-heat' if in_preheat_bool else 'standby') }}
                Target: {{ target_temperature | round(1) }}°C
                Mode: {{ target_mode | upper }}
              level: info
              logger: custom_components.smart_heating_advisor

      - if:
          - condition: template
            value_template: "{{ notify_override_effective and trigger.id == 'override_ended' }}"
        then:
          - action: system_log.write
            data:
              message: >-
                SHA [{{ room_name }}] Notification sent: override_ended.
              level: debug
              logger: custom_components.smart_heating_advisor
          - action: notify.notify
            data:
              title: >
                {% set tpl = tpl_override_header | trim %}
                {% set base = tpl if tpl else "✋ {{ room_name }} — {{ status }}" %}
                {{ base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ status }}', 'Override Ended') }}
              message: >
                {% set body_tpl = tpl_override_ended_body | trim %}
                {% set body_base = body_tpl if body_tpl else "Override in {{ room_name }} has ended. Resuming scheduled heating. Current: {{ room_temp }}°C." %}
                {{ body_base
                   | replace('{{ room_name }}', room_name)
                   | replace('{{ room_temp }}', (room_temp | round(1) | string))
                   | replace('{{ target_temp }}', (target_temperature | string)) }}


mode: queued
max: 10
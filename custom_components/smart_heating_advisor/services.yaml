run_daily_analysis:
  name: Run Daily Analysis
  description: >
    Manually trigger the daily AI heating rate analysis for all rooms.
    Discovers rooms from SHA blueprint automations, queries InfluxDB
    for the last 7 days, and updates heating rate helpers via Ollama AI.

run_weekly_analysis:
  name: Run Weekly Analysis
  description: >
    Manually trigger the weekly AI heating report for all rooms.
    Queries InfluxDB for the last 30 days and generates a persistent
    notification report. Does not automatically adjust heating rates.

start_override:
  name: Start Override
  description: >
    Start the manual override switch for a room for a given duration.
    Called by the SHA blueprint to begin a timed heating override.
    The override switch will automatically turn off when the duration expires
    and fire a sha_override_ended event.
  fields:
    room_name:
      name: Room Name
      description: The room name as defined in the SHA blueprint automation.
      required: true
      example: "Living Room"
      selector:
        text:
    duration_minutes:
      name: Duration (minutes)
      description: How long the override should stay active. Defaults to 120 minutes.
      required: false
      default: 120
      example: 60
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: min

unregister_room:
  name: Remove Room
  description: >
    Remove a room from Smart Heating Advisor. This will:
    - Stop SHA from analysing and managing that room
    - Disable the room's blueprint automation
    - Remove all SHA helper entities for that room
    The room's automation is disabled but not deleted —
    you can delete it manually from Settings → Automations.
  fields:
    room_name:
      name: Room Name
      description: >
        Exact room name as shown in SHA.
        Examples: Bathroom, Office, Bedroom Alessio
      required: true
      example: "Bathroom"
      selector:
        text:

register_room:
  name: Register Room (deprecated)
  description: >
    Deprecated. Rooms are now configured via the SHA setup wizard
    (Settings → Integrations → Smart Heating Advisor → Configure).
    This service is kept for backwards compatibility only.
  fields:
    room_name:
      name: Room Name
      description: The room name configured in the blueprint.
      required: true
      example: "Living Room"
      selector:
        text:
    temperature_sensor:
      name: Temperature Sensor
      description: Entity ID of the room temperature sensor.
      required: true
      example: "sensor.living_room_temperature"
      selector:
        entity:
          filter:
            - domain: sensor
    schedules:
      name: Schedules
      description: One or more schedule helper entity IDs for this room.
      required: false
      example:
        - "schedule.morning_shower_26c"
        - "schedule.evening_bath_28c"
      selector:
        entity:
          filter:
            - domain: schedule
          multiple: true
    daily_report_enabled:
      name: Daily Report Enabled
      description: Enable daily persistent report notifications for this room.
      required: false
      default: true
      selector:
        boolean:
    weekly_report_enabled:
      name: Weekly Report Enabled
      description: Enable weekly persistent report notifications for this room.
      required: false
      default: true
      selector:
        boolean:

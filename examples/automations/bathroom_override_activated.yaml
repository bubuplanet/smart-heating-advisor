# ============================================================
# Bathroom - Manual Override Activated
# ============================================================
# Detects any manual TRV change and pauses the smart heating
# automation for 2 hours. Ignores changes made by the
# automation itself or when windows are open.
# Runs 24/7 all week.
# ============================================================

alias: Bathroom - Manual Override Activated
description: Any thermostat change pauses smart heating for 2 hours
triggers:
  - trigger: state
    entity_id:
      - climate.bathroom_radiator
      - climate.bathroom_heated_towel_rail
    attribute: temperature
  - trigger: state
    entity_id:
      - climate.bathroom_radiator
      - climate.bathroom_heated_towel_rail
    attribute: hvac_mode
conditions:
  # Ignore if automation is currently changing TRVs
  - condition: state
    entity_id: input_boolean.bathroom_automation_running
    state: "off"
  # Ignore if a window is open
  - condition: template
    value_template: >
      {{ is_state('binary_sensor.bathroom_window', 'off') and
         is_state('binary_sensor.bathroom_window_small', 'off') }}
  # Ignore if override already active
  - condition: state
    entity_id: input_boolean.bathroom_heating_override
    state: "off"
actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.bathroom_heating_override
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.bathroom_override_until
    data:
      datetime: "{{ (now() + timedelta(hours=2)).strftime('%Y-%m-%d %H:%M:%S') }}"
  - action: notify.notify
    data:
      title: "🖐️ Bathroom Override Active"
      message: >
        Thermostat changed on {{ trigger.to_state.attributes.friendly_name }}.
        Smart heating paused until {{ (now() + timedelta(hours=2)).strftime('%H:%M') }}.
mode: single
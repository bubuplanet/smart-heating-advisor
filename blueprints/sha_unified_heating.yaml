blueprint:
  name: "Smart Heating Advisor - Unified Room Heating"
  author: bubuplanet
  description: |
    🌡️ Unified room heating control in one blueprint.

    ✨ Features
    - 📅 Two independent schedules (e.g. weekdays + weekend)
    - 🔥 Fixed-temperature TRVs for towel rails or floor heating
    - 🏖️ Vacation handling via calendar keyword
    - 🪟 Window-open pause logic
    - ✋ Manual override with automatic resume

    🛠️ During setup, this blueprint asks for:
    - 🏷️ Room name
    - 🌡️ Room temperature sensor
    - 🔥 Schedule TRVs (follow room target temperature)
    - 📌 Fixed TRVs with their own temperature (e.g. towel rail)
    - 📅 Up to two schedule slots with different days and times
    - 🪟 Optional window sensors
    - 🗓️ Vacation calendar + keyword
    - ⏱️ Override duration (up to 24 hours)

    📝 Notes
    - Create one automation instance per room.
    - Schedule B is optional — useful for different weekend times.
    - Fixed TRVs always heat to their fixed temperature when heating is active.
    - Manual TRV changes pause automation for the override duration.
    - When override ends, schedule control resumes automatically.
  source_url: https://github.com/bubuplanet/smart-heating-advisor/blob/master/blueprints/sha_unified_heating.yaml
  domain: automation
  input:
    basics_section:
      name: Room Basics
      icon: mdi:radiator
      input:
        room_name:
          name: Room Name
          description: Like Bathroom or Parents or Office
          default: Room
          selector:
            text:

        temperature_sensor:
          name: Room Temperature Sensor
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature

    trvs_section:
      name: Thermostats / TRVs
      icon: mdi:thermostat
      input:
        schedule_trvs:
          name: Schedule TRVs
          description: >-
            TRVs that follow the calculated room target temperature.
            Select all radiators that heat the room to the comfort setpoint.
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trvs:
          name: Fixed Temperature TRVs
          description: >-
            Optional. TRVs that always heat to a fixed temperature when
            the heating window is active (e.g. towel rail, floor heating).
            Leave empty if not needed.
          default: []
          selector:
            entity:
              filter:
                - domain: climate
              multiple: true

        fixed_trv_temperature:
          name: Fixed TRV Temperature
          description: >-
            Temperature applied to fixed TRVs whenever heating is active.
            Has no effect if no fixed TRVs are selected above.
          default: 35
          selector:
            number:
              min: 20
              max: 60
              step: 0.5
              unit_of_measurement: "°C"

    schedule_a_section:
      name: "Schedule A — Primary"
      icon: mdi:clock-outline
      input:
        schedule_a_days:
          name: Schedule A — Active Days
          default:
            - mon
            - tue
            - wed
            - thu
            - fri
          selector:
            select:
              multiple: true
              options:
                - label: Monday
                  value: mon
                - label: Tuesday
                  value: tue
                - label: Wednesday
                  value: wed
                - label: Thursday
                  value: thu
                - label: Friday
                  value: fri
                - label: Saturday
                  value: sat
                - label: Sunday
                  value: sun

        schedule_a_preheat_start:
          name: Schedule A — Pre-Heat Start
          description: Earliest time pre-heat can begin.
          default: "05:00:00"
          selector:
            time:

        schedule_a_comfort_start:
          name: Schedule A — Comfort Start
          description: Room should be warm by this time.
          default: "06:30:00"
          selector:
            time:

        schedule_a_comfort_end:
          name: Schedule A — Comfort End
          description: Switches to standby after this time.
          default: "08:30:00"
          selector:
            time:

        schedule_a_comfort_temp:
          name: Schedule A — Comfort Temperature
          default: 22
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

        schedule_a_standby_temp:
          name: Schedule A — Standby Temperature
          default: 17
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    schedule_b_section:
      name: "Schedule B — Optional (e.g. Weekend)"
      icon: mdi:clock-outline
      collapsed: true
      input:
        schedule_b_enabled:
          name: Enable Schedule B
          default: false
          selector:
            boolean:

        schedule_b_days:
          name: Schedule B — Active Days
          default:
            - sat
            - sun
          selector:
            select:
              multiple: true
              options:
                - label: Monday
                  value: mon
                - label: Tuesday
                  value: tue
                - label: Wednesday
                  value: wed
                - label: Thursday
                  value: thu
                - label: Friday
                  value: fri
                - label: Saturday
                  value: sat
                - label: Sunday
                  value: sun

        schedule_b_preheat_start:
          name: Schedule B — Pre-Heat Start
          description: Earliest time pre-heat can begin on schedule B days.
          default: "08:00:00"
          selector:
            time:

        schedule_b_comfort_start:
          name: Schedule B — Comfort Start
          default: "09:00:00"
          selector:
            time:

        schedule_b_comfort_end:
          name: Schedule B — Comfort End
          default: "11:00:00"
          selector:
            time:

        schedule_b_comfort_temp:
          name: Schedule B — Comfort Temperature
          default: 22
          selector:
            number:
              min: 12
              max: 30
              step: 0.5
              unit_of_measurement: "°C"

        schedule_b_standby_temp:
          name: Schedule B — Standby Temperature
          default: 17
          selector:
            number:
              min: 8
              max: 24
              step: 0.5
              unit_of_measurement: "°C"

    vacation_section:
      name: Vacation
      icon: mdi:calendar
      collapsed: true
      input:
        vacation_calendar:
          name: Vacation Calendar
          description: Calendar entity that contains your vacation events.
          default: calendar.home
          selector:
            entity:
              filter:
                - domain: calendar

        vacation_keyword:
          name: Vacation Keyword
          description: Event title prefix that enables vacation mode.
          default: VACATION
          selector:
            text:

        vacation_mode:
          name: Vacation Behavior
          description: Off disables heating. Frost keeps a low anti-freeze target.
          default: "off"
          selector:
            select:
              options:
                - label: Off (no heating)
                  value: "off"
                - label: Frost protection
                  value: "frost"

        vacation_temperature:
          name: Vacation Frost Temperature
          description: Used only when Vacation Behavior = Frost protection.
          default: 8
          selector:
            number:
              min: 5
              max: 16
              step: 0.5
              unit_of_measurement: "°C"

    windows_section:
      name: Windows
      icon: mdi:window-open-variant
      collapsed: true
      input:
        window_sensors:
          name: Window Sensors
          description: Optional. If any window opens, heating is paused.
          default: []
          selector:
            entity:
              filter:
                - domain: binary_sensor
                  device_class: window
              multiple: true

    override_section:
      name: Manual Override
      icon: mdi:hand-back-right
      collapsed: true
      input:
        override_timer:
          name: Override Timer Helper
          description: Timer used to block automation after manual TRV changes.
          selector:
            entity:
              filter:
                - domain: timer

        override_minutes:
          name: Override Duration
          description: How long to pause automation after a manual TRV change (up to 24 hours).
          default: 120
          selector:
            number:
              min: 5
              max: 1440
              step: 5
              unit_of_measurement: min

        automation_guard_boolean:
          name: Automation Guard Boolean
          description: Set by automation to ignore its own TRV writes.
          selector:
            entity:
              filter:
                - domain: input_boolean

    notifications_section:
      name: Notifications
      icon: mdi:message-text
      collapsed: true
      input:
        send_notifications:
          name: Send Notifications
          default: true
          selector:
            boolean:

trigger:
  - trigger: time_pattern
    minutes: "/5"
    id: control_loop

  - trigger: time
    at: !input schedule_a_preheat_start
    id: boundary_a_preheat

  - trigger: time
    at: !input schedule_a_comfort_start
    id: boundary_a_comfort_start

  - trigger: time
    at: !input schedule_a_comfort_end
    id: boundary_a_comfort_end

  - trigger: time
    at: !input schedule_b_preheat_start
    id: boundary_b_preheat

  - trigger: time
    at: !input schedule_b_comfort_start
    id: boundary_b_comfort_start

  - trigger: time
    at: !input schedule_b_comfort_end
    id: boundary_b_comfort_end

  - trigger: state
    entity_id: !input window_sensors
    id: windows_changed

  - trigger: state
    entity_id: !input vacation_calendar
    id: vacation_changed

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: temperature
    id: manual_override

  - trigger: state
    entity_id: !input schedule_trvs
    attribute: hvac_mode
    id: manual_override

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input override_timer
    id: override_ended

variables:
  room_name: !input room_name
  temperature_sensor: !input temperature_sensor
  schedule_trvs: !input schedule_trvs
  fixed_trvs: !input fixed_trvs
  fixed_trv_temperature: !input fixed_trv_temperature
  schedule_a_days: !input schedule_a_days
  schedule_a_preheat_start: !input schedule_a_preheat_start
  schedule_a_comfort_start: !input schedule_a_comfort_start
  schedule_a_comfort_end: !input schedule_a_comfort_end
  schedule_a_comfort_temp: !input schedule_a_comfort_temp
  schedule_a_standby_temp: !input schedule_a_standby_temp
  schedule_b_enabled: !input schedule_b_enabled
  schedule_b_days: !input schedule_b_days
  schedule_b_preheat_start: !input schedule_b_preheat_start
  schedule_b_comfort_start: !input schedule_b_comfort_start
  schedule_b_comfort_end: !input schedule_b_comfort_end
  schedule_b_comfort_temp: !input schedule_b_comfort_temp
  schedule_b_standby_temp: !input schedule_b_standby_temp
  vacation_calendar: !input vacation_calendar
  vacation_keyword: !input vacation_keyword
  vacation_mode: !input vacation_mode
  vacation_temperature: !input vacation_temperature
  window_sensors: !input window_sensors
  override_timer: !input override_timer
  override_minutes: !input override_minutes
  automation_guard_boolean: !input automation_guard_boolean
  send_notifications: !input send_notifications

  room_temp: "{{ states(temperature_sensor) | float(0) }}"
  today: "{{ now().strftime('%a') | lower }}"

  active_schedule: >
    {% if today in schedule_a_days %}
      a
    {% elif schedule_b_enabled and today in schedule_b_days %}
      b
    {% else %}
      none
    {% endif %}

  active_preheat_start: >
    {{ schedule_a_preheat_start if active_schedule == 'a' else schedule_b_preheat_start }}

  active_comfort_start: >
    {{ schedule_a_comfort_start if active_schedule == 'a' else schedule_b_comfort_start }}

  active_comfort_end: >
    {{ schedule_a_comfort_end if active_schedule == 'a' else schedule_b_comfort_end }}

  active_comfort_temp: >
    {{ (schedule_a_comfort_temp | float) if active_schedule == 'a'
       else (schedule_b_comfort_temp | float) }}

  active_standby_temp: >
    {{ (schedule_a_standby_temp | float) if active_schedule == 'a'
       else (schedule_b_standby_temp | float) }}

  windows_open: >
    {{ expand(window_sensors)
       | selectattr('state', 'in', ['on', 'open'])
       | list
       | count > 0 }}

  vacation_active: >
    {% set message = state_attr(vacation_calendar, 'message') | string %}
    {% set kw = vacation_keyword | lower %}
    {{ is_state(vacation_calendar, 'on') and message | lower | regex_search('^' ~ kw) }}

  override_active: "{{ is_state(override_timer, 'active') }}"

  in_preheat: >
    {% if active_schedule == 'none' %}
      {{ false }}
    {% else %}
      {% set now_t = now() %}
      {% set start = today_at(active_preheat_start) %}
      {% set comfort = today_at(active_comfort_start) %}
      {{ now_t >= start and now_t < comfort }}
    {% endif %}

  in_comfort: >
    {% if active_schedule == 'none' %}
      {{ false }}
    {% else %}
      {% set now_t = now() %}
      {% set start = today_at(active_comfort_start) %}
      {% set stop = today_at(active_comfort_end) %}
      {{ now_t >= start and now_t < stop }}
    {% endif %}

  target_temperature: >
    {% if vacation_active %}
      {{ iif(vacation_mode == 'frost', vacation_temperature | float, 0) }}
    {% elif active_schedule != 'none' and (in_preheat or in_comfort) %}
      {{ active_comfort_temp }}
    {% elif active_schedule != 'none' %}
      {{ active_standby_temp }}
    {% else %}
      {{ schedule_a_standby_temp | float }}
    {% endif %}

  target_mode: >
    {% if windows_open %}
      off
    {% elif vacation_active and vacation_mode == 'off' %}
      off
    {% else %}
      heat
    {% endif %}

condition: []

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual_override' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ is_state(automation_guard_boolean, 'off') }}"
              - condition: template
                value_template: "{{ not windows_open }}"
            then:
              - action: timer.start
                target:
                  entity_id: !input override_timer
                data:
                  duration: >
                    {% set m = override_minutes | int(120) %}
                    {{ '%02d:%02d:00' | format((m // 60), (m % 60)) }}
              - if:
                  - condition: template
                    value_template: "{{ send_notifications }}"
                then:
                  - action: notify.notify
                    data:
                      title: "Manual Override: {{ room_name }}"
                      message: >
                        Manual TRV change detected in {{ room_name }}.
                        Automation paused for {{ override_minutes }} minutes.

      - conditions:
          - condition: template
            value_template: "{{ override_active and trigger.id != 'override_ended' and trigger.id != 'manual_override' }}"
        sequence:
          - stop: "Override timer active; skip automation changes."

    default:
      - action: input_boolean.turn_on
        target:
          entity_id: !input automation_guard_boolean

      # --- Schedule TRVs: follow calculated target temperature ---
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'off' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: "off"

          - conditions:
              - condition: template
                value_template: "{{ target_mode == 'heat' }}"
            sequence:
              - action: climate.set_hvac_mode
                target:
                  entity_id: !input schedule_trvs
                data:
                  hvac_mode: heat
              - action: climate.set_temperature
                target:
                  entity_id: !input schedule_trvs
                data:
                  temperature: "{{ target_temperature | float }}"

      # --- Fixed TRVs: always heat to fixed_trv_temperature when active ---
      - if:
          - condition: template
            value_template: "{{ fixed_trvs | list | count > 0 }}"
        then:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'off' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: "off"

              - conditions:
                  - condition: template
                    value_template: "{{ target_mode == 'heat' }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      hvac_mode: heat
                  - action: climate.set_temperature
                    target:
                      entity_id: "{{ fixed_trvs }}"
                    data:
                      temperature: "{{ fixed_trv_temperature | float }}"

      - action: input_boolean.turn_off
        target:
          entity_id: !input automation_guard_boolean

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'override_ended' and send_notifications }}"
        then:
          - action: notify.notify
            data:
              title: "Override Ended: {{ room_name }}"
              message: >
                Manual override ended.
                Room temperature is {{ room_temp | round(1) }}°C.
                Schedule control resumed.

mode: queued
max: 10
